<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenFit - Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A10;color:#FFFFFF;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{text-align:center;max-width:400px}
.icon{font-size:64px;margin-bottom:16px;display:block}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;color:#7B5EFF}
p{color:rgba(255,255,255,0.7);font-size:15px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:#7B5EFF;color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{background:#5A3ECC;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="wrap">
<span class="icon">📡</span>
<h1>You're Offline</h1>
<p>ZenFit can't reach the network right now. Your progress is saved locally and will sync when you're back online.</p>
<button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
