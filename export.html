<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenFit Export</title>
  <style>
    body {
      background: #0d0f14;
      color: #e2e8f8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      text-align: center;
      background: #1a1f2e;
      padding: 40px;
      border-radius: 12px;
      max-width: 400px;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 20px;
    }
    p {
      color: #8a94b8;
      margin: 0;
      font-size: 14px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a3050;
      border-top: 3px solid #4cdb8a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h2>Processing Export...</h2>
  <p>Preparing your backup for download.</p>
</div>
<script>
;(function(){
  var msg = document.querySelector('.container p');
  var h2 = document.querySelector('.container h2');
  try{
    // Try sessionStorage first (set by the app before opening this page)
    var stored = sessionStorage.getItem('zenfit_export_data');
    if(stored){
      sessionStorage.removeItem('zenfit_export_data');
      try{ JSON.parse(stored); }catch(e){ throw new Error('Invalid JSON data.'); }
      if(stored.length > 52428800){ throw new Error('Data too large (max 50MB).'); }
      var blob = new Blob([stored], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "zenfit_backup.json";
      h2.textContent = "Downloading...";
      msg.textContent = "Your backup file is being downloaded.";
      a.click();
      setTimeout(function(){
        document.body.innerHTML = "<div class='container'><h2>✓ Success!</h2><p>Backup downloaded. You can close this tab.</p></div>";
      }, 1000);
      return;
    }
    // No data found — show instructions
    h2.textContent = "No data received";
    msg.innerHTML = "Use the <strong>Export</strong> feature inside the ZenFit app to create a backup. This page is not used directly.";
    document.querySelector('.spinner').style.display = 'none';
  }catch(err){
    var safeMsg = String(err && err.message ? err.message : 'Unknown error').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c;});
    document.body.innerHTML = "<div class='container'><h2>✗ Export Failed</h2><p>Error: " + safeMsg + "</p></div>";
  }
})();
</script>
</body>
</html>
