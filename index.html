// TASKS SYSTEM
// ════════════════════════════════════════════════════
const TASK_XP={easy:30,medium:70,hard:130,extreme:220};
const TASK_XP_LOSS={easy:15,medium:35,hard:65,extreme:110};
const TASK_DIFF_LABELS={easy:'Easy',medium:'Medium',hard:'Hard',extreme:'Extreme'};
const TASK_DIFF_COLORS={easy:'#4cdb8a',medium:'#f5a623',hard:'#ff5a5a',extreme:'#c084fc'};

function getTasksDueToday(){
  var today=getTodayStr();
  var todayDate=new Date();
  var dow=todayDate.getDay();
  return (S.tasks||[]).filter(function(t){
    if(t.completedAt){var age=Date.now()-t.completedAt;if(age<86400000)return false;}
    var repeat=t.repeat||'once';
    if(repeat==='once') return t.createdDate===today||(!t.createdDate);
    if(repeat==='daily') return true;
    if(repeat==='weekdays') return dow>=1&&dow<=5;
    if(repeat==='altdays'){
      if(!t.createdDate) return true;
      var start=new Date(t.createdDate);
      var diff=Math.floor((todayDate-start)/(1000*60*60*24));
      return diff%2===0;
    }
    if(repeat==='mon_sat') return dow>=1&&dow<=6;
    if(repeat==='custom'&&t.customDays&&t.customDays.length){return t.customDays.includes(dow);}
    return true;
  });
}

function checkOverdueTasks(){
  var today=getTodayStr();
  var now=Date.now();
  var due=getTasksDueToday();
  (S.tasks||[]).forEach(function(t){
    if(t.overdueCharged) return;
    if(t.completedAt) return;
    if(!t.deadlineTs) return;
    var isDue=due.find(function(x){return x.id===t.id;});
    if(!isDue) return;
    if(now>t.deadlineTs){
      t.overdueCharged=true;
      var loss=TASK_XP_LOSS[t.difficulty]||35;
      S.player.xp=Math.max(0,S.player.xp-loss);
      persistSave();
      showNotif('[ DISCIPLINE PENALTY ] -'+loss+' XP — "'+t.title+'" overdue','⚠️');
    }
  });
  (S.tasks||[]).forEach(function(t){
    if(t.repeat&&t.repeat!=='once'&&t.lastResetDate!==today){
      t.overdueCharged=false;t.completedAt=null;t.lastResetDate=today;
      if(t.allocatedHours){var midnight=new Date();midnight.setHours(0,0,0,0);t.deadlineTs=midnight.getTime()+(t.allocatedHours*3600000);}
    }
  });
}

function addTask(){
  var title=(document.getElementById('task-title')||{}).value||'';
  if(!title.trim()){showNotif('Enter a task name','!');return;}
  var diff=(document.getElementById('task-diff')||{}).value||'medium';
  var hours=parseFloat((document.getElementById('task-hours')||{}).value||0)||0;
  var repeat=(document.getElementById('task-repeat')||{}).value||'once';
  var customDays=[];
  if(repeat==='custom'){
    [0,1,2,3,4,5,6].forEach(function(d){var cb=document.getElementById('task-day-'+d);if(cb&&cb.checked)customDays.push(d);});
  }
  var today=getTodayStr();
  var now=Date.now();
  var deadlineTs=null;
  if(hours>0){var midnight=new Date();midnight.setHours(0,0,0,0);deadlineTs=midnight.getTime()+(hours*3600000);if(deadlineTs<now)deadlineTs=now+(hours*3600000);}
  var task={id:'t'+now,title:title.trim(),difficulty:diff,allocatedHours:hours,deadlineTs:deadlineTs,repeat:repeat,customDays:customDays,createdDate:today,completedAt:null,overdueCharged:false,lastResetDate:today,createdTs:now};
  if(!S.tasks) S.tasks=[];
  S.tasks.push(task);persistSave();
  showNotif('[ TASK ADDED ] "'+task.title+'"','⚔️');
  scheduleTaskReminder(task);
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function completeTask(taskId){
  var t=(S.tasks||[]).find(function(x){return x.id===taskId;});
  if(!t)return;
  if(t.completedAt&&Date.now()-t.completedAt<86400000){showNotif('Already completed!','✓');return;}
  var now=Date.now();
  var overdue=t.deadlineTs&&now>t.deadlineTs;
  t.completedAt=now;t.overdueCharged=false;
  var xpEarned=overdue?Math.floor(TASK_XP[t.difficulty]*0.5):TASK_XP[t.difficulty];
  addXP(xpEarned,'Task: '+t.title);updStat('discipline',overdue?1:3);persistSave();
  if(overdue)showNotif('[ TASK COMPLETE ] Late — +'+xpEarned+' XP (half reward)','⚡');
  else showNotif('[ TASK COMPLETE ] +'+xpEarned+' XP — Discipline +3','⚔️');
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function deleteTask(taskId){
  S.tasks=(S.tasks||[]).filter(function(t){return t.id!==taskId;});
  persistSave();
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function toggleCustomDays(){
  var sel=document.getElementById('task-repeat');
  var box=document.getElementById('task-custom-days');
  if(sel&&box)box.style.display=sel.value==='custom'?'block':'none';

    if(!t.deadlineTs)return '';

    if(diff<=0)return '<span class="task-timer-badge task-timer-over">⏰ OVERDUE</span>';

  function repeatLabel(t){

// LOCAL NOTIFICATION SYSTEM
// ════════════════════════════════════════════════════
var NOTIF_DEFAULTS={
  water:{enabled:false,intervalMins:90},
  task:{enabled:false,offsetMins:30},
  study:{enabled:false,hour:20},
  streak:{enabled:false,hour:21}
};

function getNotifSettings(){
  if(!S.notifSettings)S.notifSettings=JSON.parse(JSON.stringify(NOTIF_DEFAULTS));
  return S.notifSettings;
}

var _notifTimers=[];
function clearAllNotifTimers(){
  _notifTimers.forEach(function(id){try{clearTimeout(id);clearInterval(id);}catch(e){}});
  _notifTimers=[];
}

function requestNotifPermission(){
  if(!('Notification' in window)){showNotif('Notifications not supported','!');return Promise.resolve(false);}
  if(Notification.permission==='granted')return Promise.resolve(true);
  if(Notification.permission==='denied'){showNotif('Notifications blocked in browser settings','!');return Promise.resolve(false);}
  return Notification.requestPermission().then(function(perm){
    if(perm==='granted'){showNotif('[ SYSTEM ] Notifications enabled ✓','🔔');return true;}
    showNotif('Notification permission denied','!');return false;
  });
}

function fireLocalNotif(title,body){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{new Notification(title,{body:body,silent:false,tag:title});}
  catch(e){try{new Notification(title);}catch(e2){}}
}

function scheduleWaterReminders(){
  var ns=getNotifSettings();
  if(!ns.water||!ns.water.enabled)return;
  var ms=(ns.water.intervalMins||90)*60000;
  var id=setInterval(function(){
    if(document.hidden)return;
    var pct=Math.min(100,Math.round(todayWater()/(S.water.dailyGoalMl||3000)*100));
    if(pct>=100)return;
    fireLocalNotif('[ SYSTEM ALERT ] Hydration Check','Water: '+pct+'% — Stay hydrated, hunter.');
  },ms);
  _notifTimers.push(id);
}

function scheduleTaskReminder(task){
  var ns=getNotifSettings();
  if(!ns.task||!ns.task.enabled)return;
  if(!task.deadlineTs)return;
  var warnAt=task.deadlineTs-((ns.task.offsetMins||30)*60000);
  var delay=warnAt-Date.now();
  if(delay<0)return;
  var id=setTimeout(function(){
    fireLocalNotif('[ TASK ALERT ] Deadline Approaching','"'+task.title+'" due in '+(ns.task.offsetMins||30)+'min. Complete it, hunter.');
  },delay);
  _notifTimers.push(id);
}

function scheduleDailyReminders(){
  var ns=getNotifSettings();
  if(ns.study&&ns.study.enabled){
    var sh=ns.study.hour||20;
    var now=new Date();var target=new Date();target.setHours(sh,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target-now;
    var id=setTimeout(function(){
      var mins=(S.study.sessions||[]).filter(function(s){return s.date===getTodayStr();}).reduce(function(a,b){return a+b.duration;},0);
      if(mins<30)fireLocalNotif('[ SYSTEM ALERT ] Daily Focus Session Pending','Your study session awaits. Knowledge is power, hunter.');
      scheduleDailyReminders();
    },delay);
    _notifTimers.push(id);
  }
  if(ns.streak&&ns.streak.enabled){
    var rh=ns.streak.hour||21;
    var now2=new Date();var target2=new Date();target2.setHours(rh,0,0,0);
    if(target2<=now2)target2.setDate(target2.getDate()+1);
    var delay2=target2-now2;
    var id2=setTimeout(function(){
      var today=getTodayStr();
      var undone=(S.habits||[]).filter(function(h){return !(h.completedDates&&h.completedDates.includes(today));}).length;
      if(undone>0)fireLocalNotif('[ STREAK ALERT ] '+undone+' Habit'+(undone>1?'s':'')+' Remaining','Protect your streak before midnight, hunter.');
    },delay2);
    _notifTimers.push(id2);
  }
}

function initNotifications(){
  clearAllNotifTimers();
  scheduleWaterReminders();
  scheduleDailyReminders();
  (getTasksDueToday()||[]).forEach(function(t){if(!t.completedAt)scheduleTaskReminder(t);});
}

function saveNotifSetting(type,key,val){
  if(!S.notifSettings)S.notifSettings=JSON.parse(JSON.stringify(NOTIF_DEFAULTS));
  if(!S.notifSettings[type])S.notifSettings[type]={};
  S.notifSettings[type][key]=val;
  persistSave();
}

      var file = e.target.files[0];

          var imported = JSON.parse(ev.target.result);

            showNotif('Invalid backup','!');
            return;
          }
          S = Object.assign({}, S, imported);
        } catch(err){
          console.error(err);
        }
      };
      reader.readAsText(file);
    };
  }

  wireImportInp();
})();
