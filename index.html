var NOTIF_DEFAULTS={
  water:{enabled:false,intervalMins:90},
  task:{enabled:false,offsetMins:30},
  study:{enabled:false,hour:20},
  streak:{enabled:false,hour:21}
};

function getNotifSettings(){
  if(!S.notifSettings)S.notifSettings=JSON.parse(JSON.stringify(NOTIF_DEFAULTS));
  return S.notifSettings;
}

var _notifTimers=[];
function clearAllNotifTimers(){
  _notifTimers.forEach(function(id){try{clearTimeout(id);clearInterval(id);}catch(e){}});
  _notifTimers=[];
}

function requestNotifPermission(){
  if(!('Notification' in window)){showNotif('Notifications not supported','!');return Promise.resolve(false);}
  if(Notification.permission==='granted')return Promise.resolve(true);
  if(Notification.permission==='denied'){showNotif('Notifications blocked in browser settings','!');return Promise.resolve(false);}
  return Notification.requestPermission().then(function(perm){
    if(perm==='granted'){showNotif('[ SYSTEM ] Notifications enabled ✓','🔔');return true;}
    showNotif('Notification permission denied','!');return false;
  });
}

function fireLocalNotif(title,body){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
   if(navigator.serviceWorker&&navigator.serviceWorker.controller){
     navigator.serviceWorker.controller.postMessage({
       type:'SHOW_NOTIFICATION',
       payload:{title:title,body:body,tag:title,url:'./'}
     });
     return;
   }
  try{new Notification(title,{body:body,silent:false,tag:title});}
  catch(e){try{new Notification(title);}catch(e2){}}
}

function scheduleWaterReminders(){
  var ns=getNotifSettings();
  if(!ns.water||!ns.water.enabled)return;
  var ms=(ns.water.intervalMins||90)*60000;
  var id=setInterval(function(){
    var pct=Math.min(100,Math.round(todayWater()/(S.water.dailyGoalMl||3000)*100));
    if(pct>=100)return;
    fireLocalNotif('[ ZenFit ] Hydration Check','💧 Water: '+pct+'% — Stay hydrated, hunter.');
  },ms);
  _notifTimers.push(id);
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({
      type:'SCHEDULE_REMINDER',
      payload:{
        title:'💧 Hydration Check',
        body:'Time to drink water, hunter! Stay hydrated.',
        tag:'zenfit-water',
        url:'/',
        delayMs:ms
      }
    });
  }
}

function scheduleTaskReminder(task){
  var ns=getNotifSettings();
  if(!ns.task||!ns.task.enabled)return;
  if(!task.deadlineTs)return;
  var warnAt=task.deadlineTs-((ns.task.offsetMins||30)*60000);
  var delay=warnAt-Date.now();
  if(delay<0)return;
  var id=setTimeout(function(){
    fireLocalNotif('[ TASK ALERT ] Deadline Approaching','"'+task.title+'" due in '+(ns.task.offsetMins||30)+'min. Complete it, hunter.');
  },delay);
  _notifTimers.push(id);
}

function scheduleDailyReminders(){
  var ns=getNotifSettings();
  if(ns.study&&ns.study.enabled){
    var sh=ns.study.hour||20;
    var now=new Date();var target=new Date();target.setHours(sh,0,0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target-now;
    var id=setTimeout(function(){
      var mins=(S.study.sessions||[]).filter(function(s){return s.date===getTodayStr();}).reduce(function(a,b){return a+b.duration;},0);
      if(mins<30)fireLocalNotif('[ SYSTEM ALERT ] Daily Focus Session Pending','Your study session awaits. Knowledge is power, hunter.');
      scheduleDailyReminders();
    },delay);
    _notifTimers.push(id);
  }
  if(ns.streak&&ns.streak.enabled){
    var rh=ns.streak.hour||21;
    var now2=new Date();var target2=new Date();target2.setHours(rh,0,0,0);
    if(target2<=now2)target2.setDate(target2.getDate()+1);
    var delay2=target2-now2;
    var id2=setTimeout(function(){
      var today=getTodayStr();
      var undone=(S.habits||[]).filter(function(h){return !(h.completedDates&&h.completedDates.includes(today));}).length;
      if(undone>0)fireLocalNotif('[ STREAK ALERT ] '+undone+' Habit'+(undone>1?'s':'')+' Remaining','Protect your streak before midnight, hunter.');
    },delay2);
    _notifTimers.push(id2);
  }
}

function initNotifications(){
  clearAllNotifTimers();
  scheduleWaterReminders();
  scheduleDailyReminders();
  (getTasksDueToday()||[]).forEach(function(t){if(!t.completedAt)scheduleTaskReminder(t);});
  // Ensure push subscription is active if permission granted
  if(Notification.permission==='granted'&&_swReg) subscribeToPush(_swReg);
}

  if(!S.notifSettings)S.notifSettings=JSON.parse(JSON.stringify(NOTIF_DEFAULTS));
  if(!S.notifSettings[type])S.notifSettings[type]={};
  S.notifSettings[type][key]=val;
  persistSave();
}

const SFX = (function(){
  let _ctx = null;
  let _unlocked = false;

  function ctx(){
    if(!_ctx) _ctx = new (window.AudioContext||window.webkitAudioContext)();
    return _ctx;
  }

  // Resume context on first user gesture (browser autoplay policy)
  function unlock(){
    if(_unlocked) return;
    try{ ctx().resume(); _unlocked=true; }catch(e){}
  }
  document.addEventListener('touchstart', unlock, {once:true, passive:true});
  document.addEventListener('click', unlock, {once:true, passive:true});

  function enabled(){ return S && S.soundEnabled !== false; }

  // Core: play a tone with envelope
  function tone(freq, type, startTime, dur, vol, attack, decay){
    const c=ctx();
    const osc=c.createOscillator();
    const gain=c.createGain();
    const filter=c.createBiquadFilter();
    filter.type='lowpass';
    filter.frequency.value=4000;
    osc.type=type||'sine';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol||0.18, startTime+(attack||0.008));
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime+(dur||0.3));
    osc.connect(filter); filter.connect(gain); gain.connect(c.destination);
    osc.start(startTime); osc.stop(startTime+(dur||0.3)+(decay||0.05));
    return osc;
  }

  // Filtered noise burst — for the "system" texture
  function noise(startTime, dur, vol, freq){
    const c=ctx();
    const buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=c.createBufferSource();
    src.buffer=buf;
    const filter=c.createBiquadFilter();
    filter.type='bandpass';
    filter.frequency.value=freq||800;
    filter.Q.value=8;
    const gain=c.createGain();
    gain.gain.setValueAtTime(vol||0.06, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime+dur);
    src.connect(filter); filter.connect(gain); gain.connect(c.destination);
    src.start(startTime); src.stop(startTime+dur+0.01);
  }

  // Sub-bass thud
  function thud(startTime, freq, dur, vol){
    const c=ctx();
    const osc=c.createOscillator();
    const gain=c.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(freq||80, startTime);
    osc.frequency.exponentialRampToValueAtTime((freq||80)*0.3, startTime+(dur||0.12));
    gain.gain.setValueAtTime(vol||0.4, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime+(dur||0.12));
    osc.connect(gain); gain.connect(c.destination);
    osc.start(startTime); osc.stop(startTime+(dur||0.12)+0.02);
  }

  return {
    // ── NAV TAP: ultra-brief crystalline ping ──────────────
    nav(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      tone(1800,'sine',t,0.08,0.07,0.003);
      tone(2400,'sine',t+0.01,0.05,0.04,0.002);
    },

    // ── NOTIFICATION: deep system alert — two-tone ──────────
    notif(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      thud(t, 90, 0.1, 0.22);
      tone(520,'sine',t+0.02,0.22,0.14,0.01);
      tone(780,'sine',t+0.05,0.18,0.09,0.008);
      noise(t+0.02, 0.06, 0.04, 1200);
    },

    // ── QUEST COMPLETE: sharp system confirm ──────────────
    quest(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      tone(440,'triangle',t,     0.1, 0.13,0.005);
      tone(660,'sine',    t+0.07,0.14,0.14,0.005);
      tone(880,'sine',    t+0.15,0.18,0.12,0.005);
      noise(t,0.05,0.03,600);
    },

    // ── ACHIEVEMENT: rising crystalline arpeggio ──────────
    achievement(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      thud(t,60,0.15,0.3);
      noise(t,0.08,0.06,900);
      // Rising arpeggio — minor + major blend (Solo Leveling feel)
      const notes=[330,415,495,660,830,990];
      notes.forEach((f,i)=>{
        tone(f,'sine',t+i*0.07, 0.28-i*0.02, 0.16-i*0.015, 0.006);
        if(i===notes.length-1){
          // Final sparkle chord
          tone(f*2,'sine',t+i*0.07+0.05,0.22,0.07,0.004);
          noise(t+i*0.07,0.1,0.05,2000);
        }
      });
    },

    // ── LEVEL UP: epic system awakening ──────────────────
    levelup(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      // Deep resonant strike
      thud(t,55,0.2,0.5);
      thud(t+0.02,110,0.15,0.25);
      noise(t,0.12,0.08,700);
      // Rising power chord sweep
      [[165,0],[220,0.12],[277,0.22],[330,0.30],[415,0.38],[494,0.45],[660,0.52]].forEach(([f,dt])=>{
        tone(f,'sawtooth',t+dt,0.35,0.08,0.01);
        tone(f,'sine',t+dt,0.35,0.12,0.01);
      });
      // Final triumphant chord
      [330,415,495,660].forEach((f,i)=>{
        tone(f,'sine',t+0.62,0.6,0.11,0.02);
      });
      tone(1320,'sine',t+0.68,0.4,0.06,0.015);
      noise(t+0.62,0.18,0.07,1800);
    },

    // ── RANK PROMOTION: the most epic — full awakening ───
    rankup(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      // Impact
      thud(t,40,0.25,0.7);
      thud(t+0.03,80,0.2,0.4);
      thud(t+0.06,160,0.15,0.2);
      noise(t,0.15,0.1,500);
      // The sweep — slow rising glide
      const osc=c.createOscillator();
      const g=c.createGain();
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(80,t+0.1);
      osc.frequency.exponentialRampToValueAtTime(800,t+0.8);
      g.gain.setValueAtTime(0,t+0.1);
      g.gain.linearRampToValueAtTime(0.12,t+0.25);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
      osc.connect(g); g.connect(c.destination);
      osc.start(t+0.1); osc.stop(t+0.9);
      // Arpeggio cascade
      [[165,0.3],[220,0.38],[277,0.45],[330,0.51],[415,0.56],[494,0.60],[660,0.64],[880,0.68],[1100,0.71]].forEach(([f,dt])=>{
        tone(f,'sine',t+dt,0.5,0.14,0.008);
      });
      // Final power chord
      [330,415,660,880].forEach((f,i)=>{tone(f,'sine',t+0.8,0.8,0.12,0.025);});
      tone(1760,'sine',t+0.85,0.5,0.05,0.01);
      noise(t+0.78,0.3,0.09,2200);
    },

    // ── WATER: gurgling splash sound ──────────────────────
    
	water(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      // Bubbling noise bursts
      [0,0.06,0.13,0.21].forEach(dt=>{
        const buf=c.createBuffer(1,Math.floor(c.sampleRate*0.08),c.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*8);
        const src=c.createBufferSource();src.buffer=buf;
        const filt=c.createBiquadFilter();filt.type='bandpass';filt.frequency.value=800+Math.random()*400;filt.Q.value=3;
        const g=c.createGain();g.gain.setValueAtTime(0.12,t+dt);g.gain.exponentialRampToValueAtTime(0.0001,t+dt+0.08);
        src.connect(filt);filt.connect(g);g.connect(c.destination);
        src.start(t+dt);src.stop(t+dt+0.1);
      });
      // Gentle low rumble
      const osc=c.createOscillator();const og=c.createGain();
      osc.type='sine';osc.frequency.value=180;
      og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(0.06,t+0.05);og.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
      osc.connect(og);og.connect(c.destination);osc.start(t);osc.stop(t+0.42);
    },
    xp(){
      if(!enabled()) return;
      const c=ctx(), t=c.currentTime;
      tone(660,'sine',t,0.1,0.08,0.004);
      tone(990,'sine',t+0.05,0.08,0.06,0.003);
    },
  };
})();

var _swReg = null;
var _swUpdatePending = false;
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      _swReg = reg;

      // Detect when a new SW finishes installing and takes over
      reg.addEventListener('updatefound', function(){
        var newWorker = reg.installing;
        if(!newWorker) return;
        newWorker.addEventListener('statechange', function(){
          if(newWorker.state==='installed' && navigator.serviceWorker.controller){
            _swUpdatePending = true;
            showNotif('⚡ New version available — updating...','OK');
            // SW already calls skipWaiting() on install, so it'll activate shortly
          }
          // Once activated, controllerchange will fire and reload
        });
      });

      // Subscribe to push if permission already granted
      if(Notification.permission==='granted') subscribeToPush(reg);

      // Register periodic sync for water reminders
      if(reg.periodicSync){
        reg.periodicSync.register('zenfit-water-reminder', {
          minInterval: 60 * 60 * 1000
        }).catch(function(){});
      }
    }).catch(function(e){ console.warn('SW registration failed:',e); });
  });

  // When network comes back online, tell SW to clean old caches
  window.addEventListener('online', function(){
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_OLD_CACHES' });
    }
  });

  // Listen for controller change to auto-reload
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(_swUpdatePending){
      _swUpdatePending = false;
      window.location.reload();
    }
  });
}

function subscribeToPush(reg) {
  if(!reg||!reg.pushManager) return;
  reg.pushManager.getSubscription().then(function(sub){
    if(sub) return;
    // For production, generate VAPID keys and pass applicationServerKey
    reg.pushManager.subscribe({userVisibleOnly:true}).then(function(subscription){
      console.log('Push subscription active:', JSON.stringify(subscription));
    }).catch(function(e){
      if(e.code===20||e.name==='AbortError') return; // VAPID required on HTTPS
    });
  });
}

function requestNotifAndSubscribe() {
  return requestNotifPermission().then(function(ok){
    if(ok&&_swReg) subscribeToPush(_swReg);
    return ok;
  });
}

(function initParticleSystem(){
  var canvas = document.getElementById('particles-canvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var particles = [];
  var mouseX = -9999, mouseY = -9999;
  var animId;
  
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  
  function getThemeHue(){
    var val = getComputedStyle(document.body).getPropertyValue('--particle-hue').trim();
    return val ? parseInt(val) : 220;
  }
  function Particle(){
    this.reset = function(){
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.4;
      this.speedY = (Math.random() - 0.5) * 0.4;
      this.opacity = Math.random() * 0.5 + 0.1;
      var baseHue = getThemeHue();
      this.hue = Math.random() * 40 + baseHue - 20;
      this.pulse = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.02 + 0.01;
    };
    this.reset();
    
    this.update = function(){
      this.x += this.speedX;
      this.y += this.speedY;
      this.pulse += this.pulseSpeed;
      
      var dx = this.x - mouseX;
      var dy = this.y - mouseY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if(dist < 200){
        var force = (200 - dist) / 200 * 0.3;
        this.x += dx / dist * force;
        this.y += dy / dist * force;
      }
      
      if(this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height){
        this.reset();
      }
    };
    
    this.draw = function(){
      var pulseOpacity = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 60%, ' + pulseOpacity + ')';
      ctx.fill();
      
      if(this.size > 1.5){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 60%, ' + (pulseOpacity * 0.15) + ')';
        ctx.fill();
      }
    };
  }
  
  function initParticles(){
    var count = Math.min(Math.floor(canvas.width * canvas.height / 6000), 120);
    particles = [];
    for(var i = 0; i < count; i++) particles.push(new Particle());
  }
  initParticles();
  
  function animate(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(var i = 0; i < particles.length; i++){
      particles[i].update();
      particles[i].draw();
    }
    for(var i = 0; i < particles.length; i++){
      for(var j = i + 1; j < particles.length; j++){
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dist = dx * dx + dy * dy;
        if(dist < 14400){
          var opacity = (1 - dist / 14400) * 0.12;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(124,111,255,' + opacity + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    animId = requestAnimationFrame(animate);
  }
  
  document.addEventListener('mousemove', function(e){
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  
  document.addEventListener('touchmove', function(e){
    var t = e.touches[0];
    mouseX = t.clientX;
    mouseY = t.clientY;
  }, { passive: true });
  
  animate();
})();

  bar.style.width = Math.min(100, Math.max(0, data.progress || 0)) + '%';
  bar.style.background = 'linear-gradient(90deg, ' + color + ', ' + color + '88)';
  
  card.classList.add('visible');
  
  var rect = e.target.closest('.aw-orb3').getBoundingClientRect();
  var orbCenterX = rect.left + rect.width / 2;
  var orbTop = rect.top;
  var cardW = 200;
  
  var left = orbCenterX - cardW / 2;
  var top = orbTop - card.offsetHeight - 16;
  
  if(top < 12){
    top = rect.bottom + 12;
  }
  if(left < 12) left = 12;
  if(left + cardW > window.innerWidth - 12){
    left = window.innerWidth - cardW - 12;
  }
  
  card.style.left = left + 'px';
  card.style.top = top + 'px';
};

window.hidePreviewCard = function(immediate){
  var card = document.getElementById('previewCard');
  if(!card) return;
  if(immediate){
    card.classList.remove('visible');
    return;
  }
  setTimeout(function(){
    var c = document.getElementById('previewCard');
    if(c) c.classList.remove('visible');
  }, 150);
};

persistLoad();
</script>

<script>
// Guaranteed splash removal fallbacks
[800, 2000, 4000].forEach(function(ms){
  setTimeout(function(){
    var s=document.getElementById('splash');
    if(!s)return;
    if(typeof hideSplash==='function'){hideSplash();}
    else{s.style.display='none';}
  }, ms);
});
</script>


<script>
(function(){
  function wireImportInp(){
    var si = document.getElementById('zenfit-import-inp-static');
    if(!si) return;

    si.onchange = function(e){
      var file = e.target.files[0];
      if(!file) return;

      var reader = new FileReader();
      reader.onload = function(ev){
        try{
          var imported = JSON.parse(ev.target.result);
          if(!imported.player || !imported.nutrition){
            showNotif('Invalid backup','!');
            return;
          }
          S = Object.assign({}, S, imported);
        } catch(err){
          console.error(err);
        }
      };
      reader.readAsText(file);
    };
  }

  wireImportInp();
})();
</script>
