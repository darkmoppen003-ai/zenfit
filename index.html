<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-base:#080A10;--bg-surface:#0F1118;--bg-raised:#161B26;--bg-overlay:#1E2435;
  --text-primary:#FFFFFF;--text-secondary:rgba(255,255,255,0.70);--text-muted:rgba(255,255,255,0.45);
  --border-subtle:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.10);--border-strong:rgba(255,255,255,0.16);
  --primary:#7B5EFF;--primary-dark:#5A3ECC;--primary-dim:#3A2099;
  --success:#22D98A;--warning:#F0A000;--danger:#FF4D6A;--water:#00C8FF;--energy:#FF7A1A;
  --info:#4a9eff;--pink:#f472b6;
  --shadow-sm:0 4px 10px rgba(0,0,0,0.25);--shadow-md:0 8px 24px rgba(0,0,0,0.35);--shadow-lg:0 16px 40px rgba(0,0,0,0.45);
  --glow-primary:0 0 20px rgba(123,94,255,.35);--glow-success:0 0 16px rgba(34,217,138,.25);
  --glow-water:0 0 20px rgba(0,200,255,.35);--glow-danger:0 0 16px rgba(255,77,106,.25);
  --font-display:'Syne',sans-serif;--font-ui:'Inter','Segoe UI',system-ui,sans-serif;
  --text-hero:40px;--text-xxl:30px;--text-xl:24px;--text-lg:20px;--text-md:17px;--text-base:15px;--text-sm:13px;--text-xs:11px;
  --rank-e:#888;--rank-d:var(--success);--rank-c:var(--info);--rank-b:var(--primary);--rank-a:var(--warning);--rank-s:var(--danger);
}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-ui);min-height:100vh;font-size:var(--text-base);overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1100px;margin:0 auto;padding:0 12px}
nav{display:flex;gap:2px;padding:4px 8px;border-bottom:1px solid var(--border-mid);overflow-x:auto;flex-shrink:0;background:var(--bg-surface);height:40px;align-items:center;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-btn{background:none;border:none;color:var(--text-secondary);padding:3px 8px;border-radius:6px;cursor:pointer;font-size:var(--text-xs);white-space:nowrap;transition:all .2s;display:inline-flex;align-items:center;gap:4px;height:30px;vertical-align:middle;line-height:1;font-family:var(--font-ui)}
.nav-btn:hover{background:var(--bg-raised);color:var(--text-primary)}
.nav-btn.active{background:var(--primary-dim);color:var(--primary);font-weight:600}
.screen{display:none;padding:16px 0 60px}
.screen.active{display:block;backface-visibility:hidden;opacity:1}
.screen.active.nav-enter>*{animation:fadeIn .22s ease-out}
.screen.active.nav-enter{overflow:hidden}
.aw-home{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-base)}
.aw-wrap{position:relative;width:380px;height:380px}
.aw-center{position:absolute;top:50%;left:50%;width:148px;height:148px;margin-top:-74px;margin-left:-74px;border-radius:50%;border:3px solid var(--primary);cursor:pointer;z-index:20;background:radial-gradient(circle at 35% 35%,#4a3a6a,#1a1030);box-shadow:0 0 36px rgba(123,94,255,.45),0 0 72px rgba(123,94,255,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease}
.aw-center:hover{transform:scale(1.1);box-shadow:0 0 54px rgba(123,94,255,.7),0 0 100px rgba(123,94,255,.3)}
.aw-ci{font-size:52px;line-height:1;filter:drop-shadow(0 0 8px rgba(123,94,255,.6))}
.aw-cl{font-size:var(--text-xs);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-primary);font-family:var(--font-ui)}
.aw-orb{position:absolute;width:112px;height:112px;border-radius:50%;border:2px solid;cursor:pointer;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.5;filter:grayscale(65%) brightness(.85);transition:opacity .45s cubic-bezier(.34,1.56,.64,1),filter .45s ease,transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .45s ease}
.aw-orb:hover{opacity:1;filter:grayscale(0%) brightness(1.05);z-index:30}
.aw-oi{font-size:28px;transition:transform .3s ease,filter .3s ease;line-height:1}
.aw-orb:hover .aw-oi{transform:scale(1.22) translateY(-2px)}
.aw-ol{font-size:11px;font-weight:600;text-align:center;color:var(--text-secondary);transition:color .3s;letter-spacing:.4px;font-family:var(--font-ui)}
.aw-orb:hover .aw-ol{color:var(--text-primary)}
.aw-o0{--oc:#4a9eff;border-color:#4a9eff;background:radial-gradient(circle at 35% 35%,#0d2a4d,#050f1a);left:50%;top:0;transform:translate(-50%,0%)}
.aw-o0:hover{transform:translate(-50%,-8px) scale(1.18);box-shadow:0 0 28px #4a9eff66}
.aw-o1{--oc:#f5a623;border-color:#f5a623;background:radial-gradient(circle at 35% 35%,#3d2000,#150a00);right:0;top:25%;transform:translate(0%,-50%)}
.aw-o1:hover{transform:translate(8px,-50%) scale(1.18);box-shadow:0 0 28px #f5a62366}
.aw-o2{--oc:#00d4aa;border-color:#00d4aa;background:radial-gradient(circle at 35% 35%,#053d2a,#011510);right:0;bottom:25%;transform:translate(0%,50%)}
.aw-o2:hover{transform:translate(8px,50%) scale(1.18);box-shadow:0 0 28px #00d4aa66}
.aw-o3{--oc:#4cdb8a;border-color:#4cdb8a;background:radial-gradient(circle at 35% 35%,#0a3d1a,#02100a);left:50%;bottom:0;transform:translate(-50%,0%)}
.aw-o3:hover{transform:translate(-50%,8px) scale(1.18);box-shadow:0 0 28px #4cdb8a66}
.aw-o4{--oc:#ff5a5a;border-color:#ff5a5a;background:radial-gradient(circle at 35% 35%,#3d0a0a,#150303);left:0;bottom:25%;transform:translate(0%,50%)}
.aw-o4:hover{transform:translate(-8px,50%) scale(1.18);box-shadow:0 0 28px #ff5a5a66}
.aw-o5{--oc:#c084fc;border-color:#c084fc;background:radial-gradient(circle at 35% 35%,#2a1050,#0d0520);left:0;top:25%;transform:translate(0%,-50%)}
.aw-o5:hover{transform:translate(-8px,-50%) scale(1.18);box-shadow:0 0 28px #c084fc66}
@keyframes awPulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.55);opacity:0}}
.aw-pulse{position:absolute;top:50%;left:50%;width:148px;height:148px;margin-top:-74px;margin-left:-74px;border-radius:50%;border:2px solid var(--primary);animation:awPulse 2.4s ease-out infinite;pointer-events:none;z-index:1}
@media(max-width:500px){.aw-wrap{width:300px;height:300px}.aw-center{width:118px;height:118px;margin-top:-59px;margin-left:-59px}.aw-orb{width:90px;height:90px}.aw-oi{font-size:22px}.aw-ol{font-size:11px}.aw-ci{font-size:40px}.aw-pulse{width:118px;height:118px;margin-top:-59px;margin-left:-59px}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes questPop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes levelUpSlide{0%{transform:translateY(100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-20px);opacity:0}}
.card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:14px;padding:16px}
.card-sm{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:12px;padding:12px}
.card-raised{background:var(--bg-raised);border:1px solid var(--border-subtle);border-radius:14px;padding:16px;box-shadow:var(--shadow-md)}
@keyframes glassBgFlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
body.glass-mode .screen.active{background:linear-gradient(135deg,#0d0f14,#100d1a,#0d0f14)!important;background-size:200% 200%!important;animation:glassBgFlow 14s ease infinite}
body.glass-mode .card,body.glass-mode .card-sm,body.glass-mode .card-raised{background:rgba(13,15,20,var(--glass-alpha,0.55))!important;backdrop-filter:blur(var(--glass-blur,12px));-webkit-backdrop-filter:blur(var(--glass-blur,12px));border-color:rgba(255,255,255,0.07)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 4px 12px rgba(0,0,0,.3);transition:background .15s ease,backdrop-filter .15s ease,-webkit-backdrop-filter .15s ease}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.section-title{font-size:var(--text-xs);font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;font-family:var(--font-ui)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:var(--text-xs);font-weight:500;font-family:var(--font-ui)}
.badge-purple,.badge-xp{background:var(--primary-dim);color:#C4BFFF}.badge-green,.badge-success{background:#0A3D22;color:var(--success)}
.badge-amber,.badge-warning{background:#3D2800;color:var(--warning)}.badge-red,.badge-danger{background:#3D0A0A;color:var(--danger)}
.badge-blue,.badge-info{background:#0a2a4d;color:var(--info)}.badge-teal,.badge-water{background:#002A3D;color:var(--water)}
.badge-energy{background:#3D1A00;color:var(--energy)}
.xp-bar-wrap{background:var(--bg-overlay);border-radius:20px;height:8px;overflow:hidden;margin:4px 0}
.xp-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--primary-dark),var(--primary));transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.stat-bar-wrap{background:var(--bg-overlay);border-radius:4px;height:6px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;transition:width .5s}
.btn{background:var(--bg-raised);border:1px solid var(--border-mid);color:var(--text-primary);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:var(--text-sm);font-family:var(--font-ui);font-weight:500;transition:all .2s}
.btn:hover{background:var(--bg-overlay);border-color:var(--primary)}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:var(--glow-primary)}
.btn-primary:hover{background:#6A4EE8;transform:translateY(-1px);box-shadow:0 0 28px rgba(123,94,255,.45)}
.btn-secondary{background:var(--bg-raised);border-color:var(--border-mid);color:var(--text-primary)}
.btn-secondary:hover{background:var(--bg-overlay);border-color:var(--border-strong)}
.btn-green,.btn-success{background:var(--success);border-color:var(--success);color:#000}
.btn-green:hover,.btn-success:hover{background:#1DC07A}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn-danger:hover{background:#E0405A}
.btn-ghost{background:transparent;border-color:var(--border-mid);color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-raised);border-color:var(--border-strong);color:var(--text-primary)}
.btn-sm{padding:5px 10px;font-size:var(--text-xs)}
.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px}
.btn-full{width:100%}
input[type=text],input[type=number],select,textarea{background:var(--bg-overlay);border:1px solid var(--border-mid);color:var(--text-primary);padding:8px 12px;border-radius:12px;font-size:var(--text-sm);font-family:var(--font-ui);width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:var(--glow-primary)}
textarea{resize:vertical;min-height:50px}
.rank-badge{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border:2px solid;font-family:var(--font-display)}
.quest-card{background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.quest-card.done{opacity:.65;border-color:var(--success);animation:questPop .25s cubic-bezier(.34,1.56,.64,1)}
.quest-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quest-check.done{background:var(--success);border-color:var(--success);color:#000;animation:questPop .25s cubic-bezier(.34,1.56,.64,1)}
.notif{position:fixed;top:16px;right:16px;background:var(--bg-surface);border:1px solid var(--border-mid);border-radius:12px;padding:12px 16px;font-size:var(--text-sm);font-family:var(--font-ui);z-index:9999;animation:slideIn .3s ease;max-width:280px;pointer-events:none;box-shadow:var(--shadow-md)}
.notif-xp{border-color:var(--primary);box-shadow:var(--shadow-md),var(--glow-primary)}
.notif-success{border-color:var(--success);box-shadow:var(--shadow-md),var(--glow-success)}
.notif-danger{border-color:var(--danger);box-shadow:var(--shadow-md),var(--glow-danger)}
@keyframes slideIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9998}
.overlay-box{background:var(--bg-surface);border:2px solid var(--primary);border-radius:16px;padding:28px;text-align:center;animation:popIn .4s ease;max-width:360px;width:90%;box-shadow:var(--shadow-lg)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.grade{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.grade-A{background:#0a3d22;color:#4cdb8a}.grade-B{background:#0a2a4d;color:#4a9eff}
.grade-C{background:#3d2800;color:#f5a623}.grade-D{background:#3d1a00;color:#ff8c42}.grade-E{background:#3d0a0a;color:#ff5a5a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--bg-raised);border:1px solid var(--border-mid)}
.cal-day.done{background:#0a3d22;border-color:#1a6d3a;color:#4cdb8a}
.cal-day.today{border-color:var(--primary);color:var(--primary)}
.insight{background:var(--bg-raised);border-left:3px solid var(--warning);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--text-secondary);margin-bottom:8px}
/* WATER WAVE */
.water-tank{position:relative;width:140px;height:220px;margin:0 auto;border-radius:12px;border:2px solid var(--border-strong);overflow:hidden;background:var(--bg-overlay);cursor:pointer}
.water-fill{position:absolute;bottom:0;left:0;right:0;transition:height 1s cubic-bezier(.4,0,.2,1);overflow:hidden}
.water-wave-svg{position:absolute;top:-14px;left:0;width:200%;animation:wavemove 2.2s linear infinite}
.water-body{position:absolute;top:14px;left:0;right:0;bottom:0;background:linear-gradient(180deg,#00DFFF 0%,#00B6FF 45%,#009CFF 100%);}
.water-pct-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;font-family:var(--font-display);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);z-index:2;pointer-events:none}
@keyframes wavemove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.bonus-card{background:var(--bg-raised);border:1px solid var(--warning);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-family:var(--font-ui)}
.bonus-card.done{opacity:.5;border-color:var(--border-mid)}
hr{border:none;border-top:1px solid var(--border-mid);margin:16px 0}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.text-center{text-align:center}
.flex-wrap{flex-wrap:wrap}
/* TIMER */
.timer-ring{transform:rotate(-90deg)}
.timer-display{font-size:42px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-primary);letter-spacing:2px;font-family:var(--font-display)}
/* CHARACTER */
.char-wrap{position:relative;width:140px;height:200px;margin:0 auto}
/* CHARACTER CARD NEW */
/* CHARACTER CARD */
.char-card-box{border-radius:14px;border:1px solid var(--border-mid);background:var(--bg-surface);overflow:hidden;padding:0}
.char-top-row{display:grid;grid-template-columns:1fr 1.4fr}
.char-avatar-col{background:var(--bg-raised);border-right:1px solid var(--border-mid);display:flex;flex-direction:column;align-items:center;padding:0px 0px 0px}
.char-panel-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;text-align:center}
.char-avatar-frame{position:relative;width:100%;max-width:250px;aspect-ratio:480/853;border-radius:10px;overflow:hidden;border:1px solid var(--border-mid);background:var(--bg-overlay);cursor:pointer;flex-shrink:0}
#charAvatarImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:filter .3s}
@keyframes avatarGlow{0%,100%{filter:drop-shadow(0 0 8px var(--primary))}50%{filter:drop-shadow(0 0 22px var(--primary)) brightness(1.15)}}
.avatar-acting #charAvatarImg{animation:avatarGlow .6s ease}
.char-name-block{margin-top:12px;text-align:center}
.char-name-text{font-size:15px;font-weight:700;color:var(--text-primary);line-height:1.2}
.char-rank-sub{font-size:11px;color:var(--text-muted);margin-top:3px}
.char-class-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.char-stats-col{background:var(--bg-surface);display:flex;flex-direction:column;padding:16px 18px}
.char-stat-bar-wrap{background:var(--bg-overlay);border-radius:4px;height:5px;margin-top:4px;overflow:hidden}
.char-stat-bar-fill{height:100%;border-radius:4px}
.char-bottom-row{border-top:1px solid var(--border-mid);padding:11px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.char-evo-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;width:100%}
.char-evo-step{background:var(--bg-overlay);border:1px solid var(--border-mid);border-radius:7px;padding:6px 4px;text-align:center;opacity:.32;transition:all .3s;min-width:0;overflow:hidden}
.char-evo-step.evo-past{opacity:.42}
.char-evo-step.evo-current{opacity:1;background:var(--bg-raised)}
.char-evo-rank{font-size:13px;font-weight:700;line-height:1;margin-bottom:3px;white-space:nowrap}
.char-evo-name{font-size:8px;color:var(--text-muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ANALYTICS SECTIONS */
.an-sec-bar{display:flex;gap:3px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.an-sec-bar::-webkit-scrollbar{display:none}
.an-sec-btn{background:var(--bg-raised);border:1px solid var(--border-mid);color:var(--text-muted);padding:5px 11px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .2s}
.an-sec-btn.active{background:var(--primary-dark);border-color:var(--primary);color:#fff}
/* HEATMAP */
.hm-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px;margin-top:8px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg-overlay);border:1px solid var(--border-mid);transition:background .2s}
.hm-0{background:var(--bg-overlay)}
.hm-1{background:#4cdb8a33;border-color:#4cdb8a44}
.hm-2{background:#4cdb8a77;border-color:#4cdb8a88}
.hm-3{background:#4cdb8a;border-color:#4cdb8a}
/* ACHIEVEMENTS */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ach-card{background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:10px;padding:10px 8px;text-align:center;transition:all .3s}
.ach-card.earned{border-color:var(--warning);background:linear-gradient(135deg,#3d280011,var(--bg-raised))}
.ach-card.locked{opacity:.45;filter:grayscale(60%)}
.ach-icon{font-size:22px;margin-bottom:4px;line-height:1}
.ach-name{font-size:10px;font-weight:600;color:var(--text-primary);line-height:1.2;margin-bottom:2px}
.ach-xp{font-size:9px;color:var(--warning)}
.ach-desc{font-size:9px;color:var(--text-muted);margin-top:2px;line-height:1.3}
/* FITNESS SCORE RING */
.fs-ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;width:120px;height:120px;flex-shrink:0}
.fs-score{font-size:28px;font-weight:800;font-family:var(--font-display);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-primary)}
/* PLAN CARD */
.plan-card{background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:10px;padding:14px;margin-bottom:10px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg-base)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
@media(max-width:600px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}

/* TUTORIAL SYSTEM */
.tutorial-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.88);

  z-index: 999999;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 16px;

  animation: fadeInOverlay 0.3s ease;

  overflow-y: auto;
}

@keyframes fadeInOverlay {
  from { opacity: 0; backdrop-filter: blur(0px); }
  to { opacity: 1; backdrop-filter: blur(6px); }
}

.tutorial-card {
  background: linear-gradient(135deg, #13161e 0%, #1a1e2a 100%);
  border: 2px solid var(--primary);
  border-radius: 16px;
  padding: 0;
  max-width: 420px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
              0 0 40px rgba(124, 111, 255, 0.3);
  animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tutorial-progress {
  height: 4px;
  background: var(--bg-overlay);
  border-radius: 4px 4px 0 0;
  overflow: hidden;
}

.tutorial-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--info));
  transition: width 0.6s ease;
  border-radius: 4px;
}

.tutorial-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border-mid);
  position: relative;
}

.tutorial-icon {
  font-size: 36px;
  line-height: 1;
  flex-shrink: 0;
}

.tutorial-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

.tutorial-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.tutorial-close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  background: var(--bg-raised);
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.tutorial-close-btn:hover {
  background: var(--bg-overlay);
  color: var(--text-primary);
  border-color: var(--primary);
}

.tutorial-content {
  padding: 20px 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tutorial-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  word-wrap: break-word;
}

.tutorial-nav {
  padding: 16px;
  border-top: 1px solid var(--border-mid);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tutorial-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.tutorial-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border-strong);
  transition: all 0.3s;
  cursor: pointer;
}

.tutorial-dot.active {
  background: var(--primary);
  width: 24px;
  border-radius: 4px;
}

.tutorial-dot:hover {
  background: #9b8fff;
}

.tutorial-tip {
  padding: 10px 16px;
  background: rgba(245, 166, 35, 0.1);
  border-top: 1px solid rgba(245, 166, 35, 0.3);
  font-size: 12px;
  color: #f5a623;
  line-height: 1.5;
}

.tutorial-highlight {
  animation: tutorialPulse 2s ease-in-out infinite;
}

@keyframes tutorialPulse {
  0%, 100% {
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(124,111,255,0.3);
  }
  50% {
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(124,111,255,0.5);
  }
}

@media (max-width: 500px) {
  .tutorial-card {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 12px 12px 0 0;
  }

  .tutorial-header {
    padding: 12px;
    gap: 10px;
  }

  .tutorial-icon {
    font-size: 28px;
  }

  .tutorial-title {

  }

  .tutorial-content {

  }

  .tutorial-text {
    font-size: 13px;
  }

/* ── TASKS SCREEN ── */
.task-card{background:var(--bg-raised);border:1px solid var(--border-mid);border-radius:10px;padding:12px;margin-bottom:8px;transition:all .2s}
.task-card.task-overdue{border-color:#ff5a5a44;background:#3d0a0a18}
.task-card.task-completed{opacity:.55;border-color:var(--success);background:#0a3d2218}
.task-diff-easy{border-left:3px solid #4cdb8a}
.task-diff-medium{border-left:3px solid #f5a623}
.task-diff-hard{border-left:3px solid #ff5a5a}
.task-diff-extreme{border-left:3px solid #c084fc}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-strong);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.task-check:hover{border-color:var(--success)}
.task-check.done{background:var(--success);border-color:var(--success);color:#000;font-size:13px}
.task-timer-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.task-timer-ok{background:#0a2a4d22;color:#4a9eff;border:1px solid #4a9eff44}
.task-timer-warn{background:#3d280022;color:#f5a623;border:1px solid #f5a62344}
.task-timer-over{background:#3d0a0a22;color:#ff5a5a;border:1px solid #ff5a5a44}
.task-repeat-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:12px;font-size:10px;background:#2a105022;color:#c084fc;border:1px solid #c084fc33}

/* ── NOTIFICATION PERMISSION BANNER ── */
.notif-perm-banner{background:linear-gradient(135deg,#1a1230,#0d0a20);border:1px solid #c084fc44;border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}

/* ── CHANGELOG POPUP ── */
.changelog-overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:center;justify-content:center;z-index:99990;backdrop-filter:blur(4px)}
.changelog-box{background:linear-gradient(135deg,var(--bg-surface),var(--bg-raised));border:2px solid var(--primary);border-radius:16px;padding:0;max-width:360px;width:90%;animation:popIn .4s ease;overflow:hidden;box-shadow:var(--shadow-lg)}
.changelog-header{background:linear-gradient(135deg,#1e1a40,#0d0a1a);padding:16px 20px;border-bottom:1px solid var(--border-mid)}
.changelog-body{padding:16px 20px;max-height:60vh;overflow-y:auto}
.changelog-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px;color:var(--text-secondary)}
.changelog-item::before{content:'▸';color:var(--primary);flex-shrink:0;margin-top:1px}
.changelog-footer{padding:12px 20px;border-top:1px solid var(--border-mid)}
.splash{position:fixed;inset:0;background:var(--bg-base);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999}
.splash-img{width:120px;height:120px;object-fit:contain;border-radius:50%;margin-bottom:16px;box-shadow:var(--glow-primary);animation:splashPulse 1.5s ease-in-out infinite}
.splash-title{font-size:var(--text-xxl);font-weight:800;color:var(--text-primary);letter-spacing:4px;font-family:var(--font-display)}
.splash-sub{font-size:var(--text-sm);color:var(--primary);margin-top:6px;letter-spacing:3px;text-transform:uppercase;font-family:var(--font-ui)}
.splash-ver{font-size:var(--text-xs);color:var(--border-strong);margin-top:2px;letter-spacing:1px;font-family:var(--font-ui)}
.splash-bar-wrap{margin-top:24px;width:140px;height:3px;background:var(--bg-raised);border-radius:2px;overflow:hidden}
.splash-bar{height:100%;border-radius:2px;width:0;transition:width .08s linear}

/* ══════════════════════════════════════════════════════════════
   ZENFIT VISUAL ENHANCEMENTS — Glassmorphism, Animations, Polish
   ══════════════════════════════════════════════════════════════ */

/* ── Animated ambient background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, color-mix(in srgb, var(--primary) 10%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 60%, color-mix(in srgb, var(--glow2, #00c8ff) 7%, transparent) 0%, transparent 50%),
    radial-gradient(ellipse 70% 40% at 50% 80%, color-mix(in srgb, var(--glow1, #f5a635) 6%, transparent) 0%, transparent 50%),
    var(--bg-base);
  background-image:
    linear-gradient(color-mix(in srgb, var(--primary) 5%, transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb, var(--primary) 5%, transparent) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: center center;
  background-attachment: fixed;
}

body.home-active::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, color-mix(in srgb, var(--primary) 13%, transparent) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 60%, color-mix(in srgb, var(--glow2, #00c8ff) 9%, transparent) 0%, transparent 50%),
    radial-gradient(ellipse 70% 40% at 50% 80%, color-mix(in srgb, var(--glow1, #f5a635) 7%, transparent) 0%, transparent 50%),
    var(--bg-base);
}

/* ── Animated gradient orb (subtle) ── */
@keyframes ambientOrb {
  0% { transform: translate(0,0) scale(1); opacity: .3; }
  25% { transform: translate(30px,-20px) scale(1.1); opacity: .45; }
  50% { transform: translate(-10px,30px) scale(.95); opacity: .35; }
  75% { transform: translate(-30px,-15px) scale(1.05); opacity: .4; }
  100% { transform: translate(0,0) scale(1); opacity: .3; }
}

body::after {
  content: '';
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, color-mix(in srgb, var(--primary) 8%, transparent) 0%, transparent 70%);
  top: -200px;
  right: -200px;
  z-index: -1;
  pointer-events: none;
  animation: ambientOrb 18s ease-in-out infinite;
}

/* ── Glassmorphism card enhancement ── */
.card, .card-sm, .card-raised, .plan-card {
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1),
              box-shadow .3s ease,
              border-color .3s ease,
              background .3s ease;
}

.card:hover, .card-raised:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(123,94,255,.08);
  border-color: rgba(123,94,255,.15);
}

.card-sm:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(0,0,0,.3);
  border-color: rgba(123,94,255,.1);
}

@media (prefers-reduced-motion: reduce) {
  .card:hover, .card-raised:hover, .card-sm:hover {
    transform: none;
  }
}

/* ── Improved button micro-interactions ── */
.btn {
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.08);
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}

.btn:hover::after { opacity: 1; }

.btn:active {
  transform: scale(.96);
}

.btn-primary::after { background: rgba(255,255,255,.12); }

.btn-primary {
  text-shadow: 0 1px 2px rgba(0,0,0,.3);
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(123,94,255,.4), 0 0 0 1px rgba(123,94,255,.2);
}

.btn-success:hover, .btn-green:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(34,217,138,.35);
}

.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255,77,106,.35);
}

/* ── XP bar shimmer effect ── */
.xp-bar {
  position: relative;
  overflow: hidden;
}

.xp-bar::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  animation: xpShimmer 2.8s ease-in-out infinite;
}

@keyframes xpShimmer {
  0% { left: -100%; }
  100% { left: 200%; }
}

/* ── Stat bar smooth fill ── */
.stat-bar {
  background-image: linear-gradient(90deg, rgba(255,255,255,.1) 0%, transparent 100%);
  background-size: 200% 100%;
}

/* ── Bottom nav enhancement ── */
.bottom-nav {
  backdrop-filter: blur(12px) saturate(1.3);
  -webkit-backdrop-filter: blur(12px) saturate(1.3);
  background: rgba(15,17,24,.85) !important;
  box-shadow: 0 -4px 20px rgba(0,0,0,.3);
  transition: transform .3s ease;
}

.bottom-nav-item {
  position: relative;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}

.bottom-nav-item:hover {
  transform: translateY(-2px);
}

.bottom-nav-item.active {
  transform: translateY(-2px);
}

.bottom-nav-item.active .bni-icon {
  filter: drop-shadow(0 0 8px rgba(123,94,255,.5));
}

.bottom-nav-item:active {
  transform: scale(.92);
}

/* ── Navigation top bar ── */
nav {
  backdrop-filter: blur(10px) saturate(1.2);
  -webkit-backdrop-filter: blur(10px) saturate(1.2);
  background: rgba(15,17,24,.8) !important;
}

.nav-btn {
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}

.nav-btn.active {
  box-shadow: inset 0 -2px 0 var(--primary);
  text-shadow: 0 0 12px rgba(123,94,255,.4);
}

/* ── Quest card enhancement ── */
.quest-card {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.quest-card:not(.done):hover {
  transform: translateX(4px);
  background: var(--bg-overlay);
  border-color: rgba(123,94,255,.2);
}

.quest-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: var(--primary);
  opacity: 0;
  transition: opacity .3s;
  border-radius: 0 2px 2px 0;
}

.quest-card:not(.done):hover::before {
  opacity: 1;
}

.quest-check {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
}

.quest-check:hover {
  border-color: var(--primary);
  box-shadow: 0 0 12px rgba(123,94,255,.3);
}

/* ── Section title glow ── */
.section-title {
  position: relative;
  display: inline-block;
}

.section-title::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 24px;
  height: 2px;
  background: var(--primary);
  border-radius: 1px;
  opacity: .5;
}

/* ── Water tank refinement ── */
.water-tank {
  transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
}

.water-tank:hover {
  transform: scale(1.03);
  box-shadow: 0 0 30px rgba(0,200,255,.15), inset 0 0 30px rgba(0,200,255,.05);
  border-color: rgba(0,200,255,.35);
}

.water-tank:active {
  transform: scale(.97);
}

/* ── Chart container glass effect ── */
canvas {
  border-radius: 8px;
}

/* ── Overlay/Modal enhancement ── */
.overlay-box {
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  background: rgba(15,17,24,.92) !important;
}

/* ── Level up animation ── */
@keyframes rankUpGlow {
  0% { box-shadow: 0 0 20px rgba(123,94,255,.3); }
  50% { box-shadow: 0 0 40px rgba(123,94,255,.5), 0 0 80px rgba(123,94,255,.15); }
  100% { box-shadow: 0 0 20px rgba(123,94,255,.3); }
}

.overlay-box {
  animation: popIn .45s cubic-bezier(.34,1.56,.64,1), rankUpGlow 2s ease-in-out infinite;
}

/* ── Achievement card refinement ── */
.ach-card.earned {
  position: relative;
  overflow: hidden;
}

.ach-card.earned::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(245,166,53,.06), transparent, rgba(245,166,53,.06), transparent);
  animation: earnSpin 6s linear infinite;
  pointer-events: none;
}

@keyframes earnSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ── Progress bar enhancements ── */
.xp-bar-wrap {
  position: relative;
  overflow: hidden;
}

/* ── Cal balance banner glow ── */
.cal-balance-banner {
  position: relative;
  overflow: hidden;
  transition: transform .3s ease, box-shadow .3s ease;
}

.cal-balance-banner:hover {
  transform: scale(1.01);
}

.cal-balance-banner.deficit {
  box-shadow: 0 4px 16px rgba(34,217,138,.12);
}

.cal-balance-banner.surplus {
  box-shadow: 0 4px 16px rgba(245,166,53,.12);
}

.cal-balance-banner.balanced {
  box-shadow: 0 4px 16px rgba(74,158,255,.12);
}

/* ── Avatar refinement ── */
.char-avatar-frame {
  transition: transform .3s ease, box-shadow .3s ease;
}

.char-avatar-frame:hover {
  transform: scale(1.02);
  box-shadow: 0 0 24px rgba(123,94,255,.2);
}

/* ── Scrollbar enhancement ── */
::-webkit-scrollbar {
  width: 5px;
  height: 5px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(123,94,255,.3);
  border-radius: 4px;
  transition: background .2s;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(123,94,255,.5);
}

/* ── Input focus glow ── */
input:focus, select:focus, textarea:focus {
  border-color: var(--primary) !important;
  box-shadow: 0 0 0 3px rgba(123,94,255,.15), var(--glow-primary) !important;
}

/* ── Badge subtle hover ── */
.badge {
  transition: all .2s ease;
}

.badge:hover {
  filter: brightness(1.2);
}

/* ── Timer display refinement ── */
.timer-ring circle {
  transition: stroke .3s ease;
}

.timer-display {
  font-variant-numeric: tabular-nums;
  letter-spacing: 3px;
  background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Habit card refinement ── */
.habit-card-0, .habit-card-1, .habit-card-2, .habit-card-3,
.habit-card-4, .habit-card-5, .habit-card-6, .habit-card-7 {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  cursor: pointer;
}

.habit-card-0:hover, .habit-card-1:hover, .habit-card-2:hover, .habit-card-3:hover,
.habit-card-4:hover, .habit-card-5:hover, .habit-card-6:hover, .habit-card-7:hover {
  transform: translateX(3px);
  box-shadow: 0 8px 20px rgba(0,0,0,.2);
}

/* ── Task card enhancement ── */
.task-card {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  overflow: hidden;
}

.task-card:not(.task-completed):hover {
  transform: translateX(3px);
  border-color: rgba(123,94,255,.2);
}

.task-card.task-overdue {
  animation: overduePulse 2s ease-in-out infinite;
}

@keyframes overduePulse {
  0%, 100% { border-color: rgba(255,90,90,.25); }
  50% { border-color: rgba(255,90,90,.5); }
}

/* ── Plan card refinement ── */
.plan-card {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  cursor: pointer;
}

.plan-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(0,0,0,.3);
  border-color: rgba(123,94,255,.15);
}

/* ── Insight card ── */
.insight {
  transition: all .2s ease;
}

.insight:hover {
  background: var(--bg-overlay);
  border-left-color: var(--primary);
}

/* ── Minimal scroll snap for sections ── */
#screens {
  scroll-behavior: smooth;
}

/* ── Nav editor icon sizing ── */
.bni-icon svg, [onclick*="toggleNavTab"] svg {
  width: 22px;
  height: 22px;
}

/* ── Gradient text utility ── */
.gradient-text {
  background: linear-gradient(135deg, var(--primary), var(--info));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Notif refinement ── */
.notif {
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(15,17,24,.9) !important;
  border: 1px solid rgba(123,94,255,.2) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(123,94,255,.1) !important;
}

.notif-xp {
  border-color: var(--primary) !important;
}

/* ── Fitness score ring hover ── */
.fs-ring-wrap {
  transition: transform .3s ease;
  cursor: pointer;
}

.fs-ring-wrap:hover {
  transform: scale(1.08);
}

/* ── Rank badge hover ── */
.rank-badge {
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  cursor: pointer;
}

.rank-badge:hover {
  transform: scale(1.15) rotate(-5deg);
  box-shadow: 0 0 20px rgba(123,94,255,.2);
}

/* ── Loading shimmer for dynamic content ── */
@keyframes skeletonPulse {
  0% { opacity: .6; }
  50% { opacity: 1; }
  100% { opacity: .6; }
}

.skeleton {
  background: var(--bg-overlay);
  border-radius: 8px;
  animation: skeletonPulse 1.5s ease-in-out infinite;
}

/* ── Character card evolution glow ── */
.char-evo-step.evo-current {
  animation: currentEvoPulse 2s ease-in-out infinite;
  border-color: var(--primary) !important;
}

@keyframes currentEvoPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(123,94,255,.2); }
  50% { box-shadow: 0 0 16px rgba(123,94,255,.4); }
}

/* ── Button group refinement ── */
.chart-tab-bar {
  background: rgba(22,27,38,.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.chart-tab {
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
}

.chart-tab:hover {
  background: rgba(123,94,255,.1);
  color: var(--text-primary);
}

.chart-tab.active {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
}

/* ── Top nav scroll indicator ── */
nav::-webkit-scrollbar {
  height: 0;
}

/* ── Responsive polish ── */
@media (max-width: 400px) {
  .timer-display {
    font-size: 32px;
  }
  .aw-hero-stats {
    gap: 6px;
  }
  .bni-label {
    font-size: 8px;
    max-width: 40px;
  }
  .section-title {
    font-size: 10px !important;
  }
}

@media (min-width: 768px) {
  .card:hover, .card-raised:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,.4);
  }
  .card-sm:hover {
    transform: translateY(-2px);
  }
}

/* ── Honour reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══════════════════════════════════════════════════════════════
   NEON HOME SCREEN — Orbital Redesign
   ══════════════════════════════════════════════════════════════ */

/* ── Ambient glow backgrounds ── */
.aw-home3 {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  width: 100vw; height: 100vh; height: 100dvh;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; padding: 0; margin: 0; z-index: 1;
}

.bg-glow-orb {
  position: fixed; border-radius: 50%; filter: blur(120px);
  opacity: 0.12; pointer-events: none; z-index: 0;
  animation: bgPulse 8s ease-in-out infinite alternate;
}
.bg-glow-orb:nth-of-type(1) {
  width: 500px; height: 500px;
  background: var(--glow1, #39ff14); top: -150px; left: -150px;
  animation-delay: 0s;
}
.bg-glow-orb:nth-of-type(2) {
  width: 400px; height: 400px;
  background: var(--glow2, #bf00ff); bottom: -100px; right: -100px;
  animation-delay: 2s;
}
.bg-glow-orb:nth-of-type(3) {
  width: 350px; height: 350px;
  background: var(--glow3, #00ffff); top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: 4s; opacity: 0.05;
}
.bg-glow-orb:nth-of-type(4) {
  width: 280px; height: 280px;
  background: var(--glow1, #39ff14); top: 10%; right: -60px;
  animation-delay: 1s; opacity: 0.07;
}
.bg-glow-orb:nth-of-type(5) {
  width: 300px; height: 300px;
  background: var(--glow2, #bf00ff); bottom: 5%; left: -80px;
  animation-delay: 3s; opacity: 0.08;
}
.bg-glow-orb:nth-of-type(6) {
  width: 200px; height: 200px;
  background: var(--glow3, #00ffff); top: 30%; right: 15%;
  animation-delay: 5s; opacity: 0.06;
}

@keyframes bgPulse {
  0% { transform: scale(1); opacity: 0.08; }

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const CAN_FETCH = (function(){
  try{
    return window.location.protocol !== 'file:' || 
           !!(window.AndroidInterface) ||  
           navigator.userAgent.includes('wv'); 
  }catch(e){return false;}
})();
const safeFetch = async function(url, opts){
  if(!CAN_FETCH) return null;

  }

(function(){

    // Run pending schema migrations step-wise

        if (typeof schemaMigrations[v] === 'function') {
          schemaMigrations[v]();
          console.log('[ZF] Schema migrated v' + (v-1) + ' → v' + v);
        }
      } catch (e) {
        console.warn('[ZF] Schema migration v' + v + ' failed:', e);
      }

    // Persist new versions
    localStorage.setItem('zf_build', APP_BUILD);
    localStorage.setItem('zf_schema', String(currentSchema));

    // Tell active SW about the update
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({
        type: 'BUILD_UPDATED',
        build: APP_BUILD,
        schemaVersion: currentSchema
      });
      console.log('[ZF] Notified SW of build ' + APP_BUILD);
    }
  }
})();

let tutorialStep = 0;
let tutorialActive = false;

function showTutorial() {
  if (!S.featureFlags?.tutorial_main) {
    return;
  }
  
  tutorialActive = true;
  tutorialStep = 0;
  renderTutorialCard();
}

function renderTutorialCard() {
  const step = TUTORIAL_STEPS[tutorialStep];
  if (!step) return;

  const totalSteps = TUTORIAL_STEPS.length;
  const pct = Math.round((tutorialStep / totalSteps) * 100);

  let overlay = document.getElementById('tutorial-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tutorial-overlay';
    overlay.className = 'tutorial-overlay';
    document.body.appendChild(overlay);
  }

  overlay.innerHTML = `
    <div class="tutorial-card">
      <!-- Progress bar -->
      <div class="tutorial-progress">
        <div class="tutorial-progress-bar" style="width: ${pct}%"></div>
      </div>

      <!-- Icon & Header -->
      <div class="tutorial-header">
        <div class="tutorial-icon">${step.icon}</div>
        <div>
          <div class="tutorial-title">${step.title}</div>
          <div class="tutorial-subtitle">${step.subtitle}</div>
        </div>
        <button class="tutorial-close-btn" onclick="skipTutorial()">✕</button>
      </div>

      <!-- Content -->
      <div class="tutorial-content">
        ${step.content.split('\n').map(line => `<div class="tutorial-text">${line}</div>`).join('')}
      </div>

      <!-- Navigation -->
      <div class="tutorial-nav">
        <div style="display: flex; gap: 8px; flex: 1; margin-bottom: 8px">
          ${tutorialStep > 0 ? `<button class="btn btn-sm" onclick="prevTutorial()" style="flex: 1">← Back</button>` : ''}
          <button class="btn btn-primary btn-sm" onclick="nextTutorial()" style="flex: ${tutorialStep > 0 ? '1' : '1'}">${step.action}</button>
          ${step.action === 'Complete' ? `<button class="btn btn-sm" onclick="skipTutorial()" style="flex: 1">Skip</button>` : ''}
        </div>
        
        <!-- Dot indicators -->
        <div class="tutorial-dots">
          ${TUTORIAL_STEPS.map((_, i) => `
            <div class="tutorial-dot${i === tutorialStep ? ' active' : ''}" 
              onclick="jumpToStep(${i})"
              style="cursor: pointer"></div>
          `).join('')}
        </div>
      </div>

      <!-- Tips -->
      ${step.id === 'welcome' ? `
        <div class="tutorial-tip">
          💡 <strong>Tip:</strong> You can always restart the tutorial from Settings.
        </div>
      ` : ''}
    </div>
  `;

  if (step.highlights.length > 0) {
    highlightElement(step.highlights[0]);
  } else {
    removeHighlight();
  }
}

function highlightElement(selector) {
  removeHighlight();
  const el = document.querySelector(selector);
  if (!el) return;

  const rect = el.getBoundingClientRect();
  const highlight = document.createElement('div');
  highlight.id = 'tutorial-highlight';
  highlight.className = 'tutorial-highlight';
  highlight.style.cssText = `
    position: fixed;
    top: ${rect.top - 10}px;
    left: ${rect.left - 10}px;
    width: ${rect.width + 20}px;
    height: ${rect.height + 20}px;
    border: 3px solid var(--primary);
    border-radius: 12px;
    pointer-events: none;
    z-index: 9997;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(124,111,255,0.3);
    animation: tutorialPulse 2s ease-in-out infinite;
  `;
  document.body.appendChild(highlight);
}

function removeHighlight() {
  const hl = document.getElementById('tutorial-highlight');
  if (hl) hl.remove();
}

function nextTutorial() {
  if (tutorialStep < TUTORIAL_STEPS.length - 1) {
    tutorialStep++;
    renderTutorialCard();
  } else {
    completeTutorial();
  }
}

function prevTutorial() {
  if (tutorialStep > 0) {
    tutorialStep--;
    renderTutorialCard();
  }
}

function jumpToStep(step) {
  tutorialStep = step;

// DEVICE FINGERPRINTING FOR PERSISTENT USER ID
// ════════════════════════════════════════════════════════════════════════════
function generateDeviceFingerprint(){
  const data=navigator.userAgent+navigator.language+screen.width+'x'+screen.height+new Date().getTimezoneOffset();
  let hash=0;
  for(let i=0;i<data.length;i++){
    const char=data.charCodeAt(i);
    hash=((hash<<5)-hash)+char;
    hash=hash&hash;
  }
  return Math.abs(hash).toString(16).slice(0,8);
}

function getDeviceId(){
  // Priority: existing localStorage ID > existing S.deviceId > generate new
  let stored=localStorage.getItem(STORAGE_KEYS.DEVICE_ID);
  if(stored&&stored.startsWith('zenfit-user-')) return stored;
  // Generate once and lock it permanently
  const newId='zenfit-user-'+generateDeviceFingerprint()+'-'+Math.random().toString(36).slice(2,8);
  localStorage.setItem(STORAGE_KEYS.DEVICE_ID,newId);
  return newId;
}

function migrateData(saved){
  const version=saved.dataVersion||1;
  
  if(version<2){
    // Preserve existing tutorial state, don't override it
    saved.featureFlags=saved.featureFlags||{
      tutorial_main:false, // Default to false
      tutorial_nutrition:true,
      tutorial_workout:true,
      tutorial_habits:true
    };
    saved.dataVersion=2;
  }
  
  return saved;
}  
function validateAndMergeData(saved,def){
  const merged=Object.assign({},def);
  
  if(!saved) return merged;
  
  for(let key in saved){
    if(SCHEMA.hasOwnProperty(key)){
      const schemaType=SCHEMA[key];
      if(schemaType==='array'){
        merged[key]=Array.isArray(saved[key])?saved[key]:[];
      }else if(schemaType==='object'){
        merged[key]=Object.assign({},def[key]||{},saved[key]||{});
      }else{
        merged[key]=saved[key];
      }
    }
  }
  
  for(let key in SCHEMA){
    if(!merged.hasOwnProperty(key)){
      if(SCHEMA[key]==='array') merged[key]=[];
      else if(SCHEMA[key]==='object') merged[key]={};
    }
  }
  
  return merged;
}

function trimOldData(){
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const KEEP_DAYS=14;
  const cutoff=new Date();cutoff.setHours(0,0,0,0);cutoff.setDate(cutoff.getDate()-KEEP_DAYS);
  const cutoffStr=localDs(cutoff);
  if(!S.analyticsArchive)S.analyticsArchive=[];
  function archiveAndTrim(entries,dateFn,valueFns){
    const old=entries.filter(e=>(dateFn(e)||'')<cutoffStr);
    if(!old.length)return entries;
    const byDay={};
    old.forEach(e=>{
      const d=dateFn(e)||'';if(!d)return;
      if(!byDay[d])byDay[d]={date:d,cal:0,burned:0,waterMl:0,studyMins:0};
      valueFns.forEach(fn=>fn(byDay[d],e));
    });
    Object.values(byDay).forEach(day=>{
      const ex=S.analyticsArchive.findIndex(a=>a.date===day.date);
      if(ex>=0){const a=S.analyticsArchive[ex];a.cal+=day.cal;a.burned+=day.burned;a.waterMl+=day.waterMl;a.studyMins+=day.studyMins;}
      else S.analyticsArchive.push(day);
    });
    return entries.filter(e=>(dateFn(e)||'')>=cutoffStr);
  }
  S.nutrition.entries=archiveAndTrim(S.nutrition.entries,e=>e.date,[(a,e)=>{a.cal+=(e.nutrients&&e.nutrients.cal||0);}]);
  S.workouts=archiveAndTrim(S.workouts||[],e=>e.date,[(a,e)=>{a.burned+=(e.caloriesBurned||0);}]);
  S.burned=archiveAndTrim(S.burned||[],e=>e.date,[(a,e)=>{a.burned+=(e.calories||0);}]);
  if(S.water&&S.water.entries)S.water.entries=archiveAndTrim(S.water.entries,e=>e.date,[(a,e)=>{a.waterMl+=(e.ml||0);}]);
  if(S.study&&S.study.sessions)S.study.sessions=archiveAndTrim(S.study.sessions,e=>e.date,[(a,e)=>{a.studyMins+=(e.duration||0);}]);
  // Habit completedDates — keep 90 days only
  const hCutoff=new Date();hCutoff.setDate(hCutoff.getDate()-90);
  const hCutoffStr=localDs(hCutoff);
  (S.habits||[]).forEach(h=>{if(h.completedDates&&h.completedDates.length>90)h.completedDates=h.completedDates.filter(d=>d>=hCutoffStr);});
}

function saveState(){
  try{
    S.lastSaved=Date.now();
    // Auto-trim when entries grow large
    const totalEntries=(S.nutrition.entries||[]).length+(S.workouts||[]).length+(S.burned||[]).length+(S.water&&S.water.entries||[]).length;
    if(totalEntries>600)trimOldData();
    localStorage.setItem(STORAGE_KEYS.STATE, JSON.stringify(S));
  }catch(e){
    if(e.name==='QuotaExceededError'){
      const backup={...S, profilePic:null};
      try{ localStorage.setItem(STORAGE_KEYS.STATE, JSON.stringify(backup)); }catch(e2){}
      showNotif('Storage full — profile pic not saved. Try a smaller image.','!');
    }
  }
}
function persistSave(){saveState();}

function checkAchievements(){
  if(!S.achievements)S.achievements=[];
  const earnedIds=new Set(S.achievements.map(a=>a.id));
  const newOnes=[];
  function localDs(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');}

  ACHIEVEMENTS.forEach(a=>{
    if(earnedIds.has(a.id))return;
    let met=false;
    const today=getTodayStr();
    switch(a.id){
      case 'lvl5':  met=S.player.level>=5; break;
      case 'lvl10': met=S.player.level>=10; break;
      case 'lvl20': met=S.player.level>=20; break;
      case 'lvl30': met=S.player.level>=30; break;
      case 'str3':  met=(S.habits||[]).some(h=>(h.streak||0)>=3); break;
      case 'str7':  met=(S.habits||[]).some(h=>(h.streak||0)>=7); break;
      case 'str14': met=(S.habits||[]).some(h=>(h.streak||0)>=14); break;
      case 'str30': met=(S.habits||[]).some(h=>(h.streak||0)>=30); break;
      case 'str60': met=(S.habits||[]).some(h=>(h.streak||0)>=60); break;
      case 'wk1':   met=(S.workouts||[]).length>=1; break;
      case 'wk10':  met=(S.workouts||[]).length>=10; break;
      case 'wk50':  met=(S.workouts||[]).length>=50; break;
      case 'wk100': met=(S.workouts||[]).length>=100; break;
      case 'burn500': met=todayBurned()>=500; break;
      case 'burn1000':met=todayBurned()>=1000; break;
      case 'meal3': met=S.nutrition.entries.filter(e=>e.date===today).length>=3; break;
      case 'meal30days': met=new Set(S.nutrition.entries.map(e=>e.date)).size>=30; break;
      case 'protein7':{
        let s=0;
        for(let i=0;i<7;i++){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);const ds=localDs(d);
          const p=S.nutrition.entries.filter(e=>e.date===ds).reduce((a,e)=>a+(e.nutrients&&e.nutrients.protein||0),0);
          if(p>=(S.nutrition.dailyGoal.protein||150))s++;else break;}
        met=s>=7;break;
      }
      case 'water1': met=todayWater()>=(S.water.dailyGoalMl||3000); break;
      case 'water7':{
        let s=0;
        for(let i=0;i<7;i++){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);const ds=localDs(d);
          const w=(S.water.entries||[]).filter(e=>e.date===ds).reduce((a,e)=>a+e.ml,0);
          if(w>=(S.water.dailyGoalMl||3000))s++;else break;}
        met=s>=7;break;
      }
      case 'water30':{
        const wDays=new Set();
        (S.water.entries||[]).forEach(e=>{
          const ds=e.date;
          const dayTotal=(S.water.entries||[]).filter(x=>x.date===ds).reduce((a,x)=>a+x.ml,0);
          if(dayTotal>=(S.water.dailyGoalMl||3000))wDays.add(ds);
        });
        met=wDays.size>=30;break;
      }
      case 'study60':{
        const sm=(S.study.sessions||[]).filter(s=>s.date===today).reduce((a,b)=>a+b.duration,0);
        met=sm>=60;break;
      }
      case 'study10h': met=(S.study.sessions||[]).reduce((a,b)=>a+b.duration,0)>=600; break;
      case 'study50h': met=(S.study.sessions||[]).reduce((a,b)=>a+b.duration,0)>=3000; break;
      case 'quest10':  met=(S.questsDoneTotal||0)>=10; break;
      case 'quest50':  met=(S.questsDoneTotal||0)>=50; break;
      case 'quest100': met=(S.questsDoneTotal||0)>=100; break;
      case 'stat50':   met=Object.values(S.player.stats||{}).some(v=>v>=50); break;
      case 'stat100':  met=Object.values(S.player.stats||{}).some(v=>v>=100); break;
      case 'weightlog1': met=(S.weightLog||[]).length>=1; break;
      case 'weightlog7': met=(S.weightLog||[]).length>=7; break;
    }
    if(met)newOnes.push(a);
  });

  if(newOnes.length){
    newOnes.forEach(a=>{
      S.achievements.push({id:a.id,ts:Date.now()});
      // Award XP without recursion - directly increment
      S.player.xp+=a.xp;
      let lvl=S.player.level;
      while(S.player.xp>=xpForLevel(lvl)){S.player.xp-=xpForLevel(lvl);lvl++;showLevelUp(lvl);}
      S.player.level=lvl;S.player.rank=calcRank(S.player);
      showNotif('🏆 Achievement: '+a.name+'! +'+a.xp+' XP','★');
    });
    persistSave();
  }
}

function xpForLevel(l){return Math.floor(100*Math.pow(l,1.5));}
function addXP(amount,reason){
  S.player.xp+=amount;

  S.player.level=lvl;
  S.player.rank=calcRank(S.player);
  showNotif(`+${amount} XP — ${reason}`,'XP');
  trackChallengeProgress();persistSave();
}

function showNotif(msg,icon='+'){
  const el=document.createElement('div');el.className='notif';
  const iconClass = icon==='XP'?'notif-xp':(icon==='★'?'notif-success':(icon==='!'||icon==='×')?'notif-danger':'');
  if(iconClass) el.classList.add(iconClass);
  el.innerHTML=`<span style="margin-right:8px;font-size:16px">${icon==='XP'?'⚡':icon==='★'?'🏆':icon==='OK'?'✓':icon==='!'?'⚠️':icon}</span><span>${escapeHtml(msg)}</span>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='translateX(40px)';setTimeout(()=>el.remove(),350);},2600);
  if(icon==='XP') SFX.xp();
  else if(icon==='★') SFX.achievement();
  else SFX.notif();
}
function showLevelUp(lvl){
  const newRank=calcRank({level:lvl});
  const oldRank=calcRank({level:lvl-1});
  const isRankUp=newRank!==oldRank;
  if(isRankUp) SFX.rankup(); else SFX.levelup();
  const ov=document.createElement('div');ov.className='overlay';
  const rc=RANK_COLORS[newRank]||'var(--primary)';
  ov.innerHTML=`<div class="overlay-box" style="border-color:${rc};box-shadow:0 0 40px ${rc}44,0 0 80px ${rc}22,var(--shadow-lg)">
    <div style="position:relative">
      ${isRankUp?`<div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:48px;animation:levelUpBounce .6s cubic-bezier(.34,1.56,.64,1)">${newRank==='S'?'👑':newRank==='A'?'⚡':newRank==='B'?'🛡️':newRank==='C'?'🏹':'🗡️'}</div>`:''}
      <div style="font-size:44px;margin-bottom:4px;margin-top:${isRankUp?'10px':'0'}">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="${isRankUp?rc:'#f5a623'}">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;font-weight:600">${isRankUp?'RANK UP':'LEVEL UP'}</div>
    <div style="font-size:52px;font-weight:700;font-family:var(--font-display);color:${isRankUp?rc:'var(--primary)'};margin:8px 0;text-shadow:0 0 20px ${isRankUp?rc+'88':'rgba(123,94,255,.5)'}">Lv.${lvl}</div>
    ${isRankUp?`<div style="font-size:18px;font-weight:800;font-family:var(--font-display);color:${rc};margin-bottom:2px;letter-spacing:2px">RANK ${newRank} UNLOCKED</div>
    <div style="font-size:12px;color:${rc}88">${RANK_CLASS_NAMES?.[newRank]||'Hunter'}</div>`:''}
    <div style="color:var(--text-secondary);font-size:13px;margin:${isRankUp?'12px':'16px'} 0 20px">You grow stronger, Hunter.</div>
    <button class="btn btn-primary" onclick="this.closest('.overlay').remove()" style="${isRankUp?`background:${rc};border-color:${rc};box-shadow:0 0 20px ${rc}66`:''}">Continue</button>
  </div>`;
  document.body.appendChild(ov);
  // Add particle burst effect for rank up
  if(isRankUp) setTimeout(()=>{try{createParticles(ov);}catch(e){}}, 100);
}

function createParticles(container){
  const box=container.querySelector('.overlay-box');
  if(!box)return;
  const colors=['#7B5EFF','#F5A623','#4CDB8A','#FF4D6A','#00C8FF','#C084FC'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    const size=4+Math.random()*8;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const x=20+Math.random()*60;
    const y=20+Math.random()*60;
    const tx=(Math.random()-0.5)*120;
    const ty=-40-Math.random()*120;
    p.style.cssText=`position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:${color};left:${x}%;top:${y}%;pointer-events:none;z-index:1;opacity:0;animation:particleBurst .8s ease-out forwards;--tx:${tx}px;--ty:${ty}px`;
    p.style.animationDelay=(Math.random()*0.15)+'s';
    box.appendChild(p);
    setTimeout(()=>p.remove(),1200);
  }
}

// Dynamically add particle animation keyframe
(function(){
  const style=document.createElement('style');
  style.textContent=`@keyframes levelUpBounce{0%{transform:translateX(-50%) scale(0) rotate(-20deg);opacity:0}60%{transform:translateX(-50%) scale(1.3) rotate(5deg);opacity:1}100%{transform:translateX(-50%) scale(1) rotate(0);opacity:1}}
@keyframes particleBurst{0%{opacity:0;transform:translate(0,0) scale(0)}20%{opacity:1;transform:translate(calc(var(--tx)*.3),calc(var(--ty)*.3)) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2)}}`;
  document.head.appendChild(style);
})();

function parseFood(text){
  text=text.toLowerCase().trim().replace(/\b(ki|ka|ke|with|and|&)\b/g,' ').replace(/\s+/g,' ').trim();
  let qty=1;
  const nm=text.match(/^(\d+\.?\d*)\s+/);
  if(nm){qty=parseFloat(nm[1]);text=text.slice(nm[0].length).trim();}
  else{const qw={'half':0.5,'one':1,'two':2,'three':3,'four':4,'a ':1,'an ':1};for(const[w,v]of Object.entries(qw)){if(text.startsWith(w)){qty=v;text=text.slice(w.length).trim();break;}}}
  text=text.replace(/\b(bowl|piece|cup|glass|serving|plate|small|large|medium|full)\b/g,'').trim().replace(/\s+/g,' ');
  // Check user's personal food database first
  const cf=S.customFoods||[];
  const userMatch=cf.find(f=>f.name.toLowerCase()===text||text.includes(f.name.toLowerCase())||f.name.toLowerCase().includes(text));
  if(userMatch)return{name:userMatch.name,qty,nutrients:{cal:userMatch.cal*qty,protein:userMatch.protein*qty,carbs:userMatch.carbs*qty,fat:userMatch.fat*qty,fiber:(userMatch.fiber||0)*qty}};
  if(ALIASES[text]&&INGR_DB[ALIASES[text]]) return bE(ALIASES[text],text,qty);
  if(INGR_DB[text]) return bE(text,text,qty);
  let best=null,bs=0;
  for(const k of Object.keys(ALIASES)){if(text.includes(k)&&k.length>bs){best=k;bs=k.length;}}
  if(best&&INGR_DB[ALIASES[best]]) return bE(ALIASES[best],text,qty);
  best=null;bs=0;
  for(const k of Object.keys(INGR_DB)){if(text.includes(k)&&k.length>bs){best=k;bs=k.length;}}
  if(best) return bE(best,text,qty);
  for(const w of text.split(' ')){if(ALIASES[w]&&INGR_DB[ALIASES[w]]) return bE(ALIASES[w],text,qty);if(INGR_DB[w]) return bE(w,text,qty);}
  return null;
}
function bE(dbKey,orig,qty){
  const b=INGR_DB[dbKey];
  return{name:orig||dbKey,qty,nutrients:{cal:Math.round(b.cal*qty),protein:Math.round(b.p*qty*10)/10,carbs:Math.round(b.c*qty*10)/10,fat:Math.round(b.f*qty*10)/10,fiber:Math.round(b.fi*qty*10)/10}};
}
function gradeFood(n){
  const s=(n.protein*4)/(n.cal||1)*100+(n.fiber*5)-(n.fat*0.3);
  return s>60?'A':s>40?'B':s>20?'C':s>5?'D':'E';
}
function todayNutrition(){
  return S.nutrition.entries.filter(e=>e.date===getTodayStr()).reduce((a,e)=>{
    const n=e.nutrients||{};
    a.cal  += +n.cal  ||0;
    a.protein += +(n.protein||n.prot)||0;  // handle both field names
    a.carbs+= +n.carbs ||0;
    a.fat  += +n.fat   ||0;
    a.fiber+= +n.fiber ||0;
    return a;
  },{cal:0,protein:0,carbs:0,fat:0,fiber:0});
}
function todayWater(){return (S.water.entries||[]).filter(e=>e.date===getTodayStr()).reduce((a,e)=>a+e.ml,0);}
function todayBurned(){return(S.burned||[]).filter(e=>e.date===getTodayStr()).reduce((a,e)=>a+e.calories,0);}

function parseActivityNLP(text){
  const t=text.toLowerCase();
  let duration=0;
  const dm=t.match(/(\d+\.?\d*)\s*(min|minute|minutes|mins|hr|hour|hours|h\b)/);
  if(dm){duration=parseFloat(dm[1]);if(dm[2].startsWith('h'))duration*=60;}
  let inclineDeg=0;
  const im=t.match(/(\d+\.?\d*)\s*(degree|deg|%|percent)?\s*(incline|grade|slope)/);
  if(im){inclineDeg=parseFloat(im[1]);if(im[2]==='%')inclineDeg=Math.atan(inclineDeg/100)*(180/Math.PI);}
  let speedKmh=0;
  const sm=t.match(/(\d+\.?\d*)\s*(km\/h|kmh|kph|mph)/);
  if(sm){speedKmh=parseFloat(sm[1]);if(sm[2]==='mph')speedKmh*=1.609;}
  let met=4.0,actName='activity',bl=0;
  for(const[k,v]of Object.entries(MET_DB)){if(t.includes(k)&&k.length>bl){met=v;actName=k;bl=k.length;}}
  if(actName.includes('walk')){
    if(speedKmh>=7)met=6.0;else if(speedKmh>=5.5)met=5.0;else if(speedKmh>=4.5)met=4.3;else if(speedKmh>0)met=2.5;
  }
  if(actName.includes('run')||actName.includes('jog')){
    if(speedKmh>=16)met=16.0;else if(speedKmh>=13)met=12.5;else if(speedKmh>=10)met=10.0;else if(speedKmh>=8)met=8.5;else if(speedKmh>=6)met=7.0;
  }
  if(inclineDeg>0)met=Math.min(met*(1+(inclineDeg*0.1)/5),20);
  return{actName,duration,met,inclineDeg,speedKmh};
}
function calcBurn(met,durationMin,weightKg){return Math.round(met*weightKg*(durationMin/60));}

function calcBMI(weightKg,heightCm){
  if(!weightKg||!heightCm)return 0;
  return Math.round((weightKg/Math.pow(heightCm/100,2))*10)/10;
}
function bmiCategory(bmi){
  if(bmi<18.5)return{label:'Underweight',color:'var(--info)'};
  if(bmi<25)return{label:'Normal',color:'var(--success)'};
  if(bmi<30)return{label:'Overweight',color:'var(--warning)'};
  return{label:'Obese',color:'var(--danger)'};
}
function calcBMR(w,h,age,gender){
  if(!w||!h||!age)return 0;
  if(gender==='male')return Math.round(10*w+6.25*h-5*age+5);
  return Math.round(10*w+6.25*h-5*age-161);
}
function calcTDEE(bmr,level){
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
  return Math.round(bmr*(mult[level]||1.55));
}
function calcBodyFat(bmi,age,gender){
  if(!bmi||!age)return 0;
  const s=gender==='male'?1:0;
  return Math.round((1.20*bmi+0.23*age-10.8*s-5.4)*10)/10;
}
function calcIdealWeight(heightCm,gender){
  const h=heightCm-100;
  return gender==='male'?Math.round((h-h*0.1)*10)/10:Math.round((h-h*0.15)*10)/10;
}
function calcWHR(waist,hip){
  if(!waist||!hip)return 0;
  return Math.round((waist/hip)*100)/100;
}
function macroSplit(tdee,goal){
  // Body Recomposition: maintenance cals, very high protein
  if(goal==='recomp'){return{cal:tdee,
    protein:Math.round(tdee*0.38/4),
    carbs:Math.round(tdee*0.40/4),
    fat:Math.round(tdee*0.22/9)};}
  // Aggressive cut: -750 kcal/day for higher BF%
  if(goal==='lose_aggressive'){var cal=Math.round(Math.max(tdee-750,1200));return{cal,
    protein:Math.round(cal*0.40/4),
    carbs:Math.round(cal*0.35/4),
    fat:Math.round(cal*0.25/9)};}
  // Standard weight loss: -500 kcal/day
  if(goal==='lose'){var cal=Math.round(tdee-500);return{cal,
    protein:Math.round(cal*0.35/4),
    carbs:Math.round(cal*0.40/4),
    fat:Math.round(cal*0.25/9)};}
  // Lean bulk / muscle gain: +350 kcal surplus
  if(goal==='gain'){var cal=Math.round(tdee+350);return{cal,
    protein:Math.round(cal*0.28/4),
    carbs:Math.round(cal*0.50/4),
    fat:Math.round(cal*0.22/9)};}
  // Athletic performance: +150 kcal, carb-dominant
  if(goal==='performance'){var cal=Math.round(tdee+150);return{cal,
    protein:Math.round(cal*0.25/4),
    carbs:Math.round(cal*0.55/4),
    fat:Math.round(cal*0.20/9)};}
  // Cardiovascular health: maintenance, balanced
  if(goal==='heart'){return{cal:tdee,
    protein:Math.round(tdee*0.20/4),
    carbs:Math.round(tdee*0.55/4),
    fat:Math.round(tdee*0.25/9)};}
  // Maintenance default
  return{cal:tdee,
    protein:Math.round(tdee*0.25/4),
    carbs:Math.round(tdee*0.50/4),
    fat:Math.round(tdee*0.25/9)};
}
function goalLabel(g){
  return{
    lose:'Weight Loss (-500 kcal/day)',
    lose_aggressive:'Aggressive Cut (-750 kcal/day)',
    gain:'Muscle Gain (+350 kcal/day)',
    recomp:'Body Recomposition (TDEE)',
    performance:'Athletic Performance (+150 kcal)',
    heart:'Cardiovascular Health',
    maintain:'Maintenance'
  }[g]||'Maintenance';
}

    var c=document.getElementById('screens');
    c.innerHTML='<div class="screen active nav-enter" id="screen-home"></div>';

function renderNav(){
  var homeB='<button class="nav-btn" onclick="switchScreen(\x27home\x27)" style="color:var(--primary);border:1px solid var(--primary-dim);margin-right:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>';
  var tabs=SCREENS.map(function(s){
    var a=currentScreen===s.id?' active':'';
    return '<button class="nav-btn'+a+'" onclick="switchScreen(\x27'+s.id+'\x27)">'+s.label+'</button>';
  }).join('');
  document.getElementById('nav').innerHTML=homeB+tabs;
}
function switchScreen(id,subTab){
  hidePreviewCard(true);
  if(id!==currentScreen) SFX.nav();
  currentScreen=id;
  if(id==='nutrition')nutritionTab=subTab||'today';
  if(id==='workout')workoutTab=subTab||'log';
  if(id==='home'){
    _toggleHomeBody(true);
    document.getElementById('nav').style.display='none';
    var c=document.getElementById('screens');
    c.innerHTML='<div class="screen active nav-enter" id="screen-home"></div>';
    renderAWHome(document.getElementById('screen-home'));
  }else{
    _toggleHomeBody(false);
    document.getElementById('nav').style.display='flex';
    renderNav();renderScreens(true);renderBottomNav();
    // Auto-scroll active nav tab into view
    setTimeout(function(){
      var nav=document.getElementById('nav');
      if(!nav)return;
      var active=nav.querySelector('.nav-btn.active');
      if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    },60);
  }
}
function ensureScreenContainers(){
  const c=document.getElementById('screens');
  if(!c) return;
  if(document.getElementById(`screen-${SCREENS[0].id}`)) return;
  c.innerHTML='';
  SCREENS.forEach(s=>{
    const d=document.createElement('div');
    d.className='screen';
    d.id=`screen-${s.id}`;
    c.appendChild(d);
  });
}
const RENDER_FNS={dashboard:renderHome,nutrition:renderNutrition,water:renderWater,workout:renderWorkout,habits:renderHabits,tasks:renderTasks,study:renderStudy,quests:renderQuests,analytics:renderAnalytics,profile:renderProfile,leaderboard:renderLeaderboard,screentime:renderScreenTime};
function renderScreens(navigating){
  ensureScreenContainers();
  SCREENS.forEach(s=>{
    const el=document.getElementById(`screen-${s.id}`);
    if(el){
      el.classList.toggle('active', s.id===currentScreen);
      el.classList.remove('nav-enter');
    }
  });
  const target=document.getElementById(`screen-${currentScreen}`);
  if(target && RENDER_FNS[currentScreen]) RENDER_FNS[currentScreen](target);
  if(navigating && target){
    void target.offsetWidth;
    target.classList.add('nav-enter');
  }
}

function dashCompleteQuest(listKey,idx){
  const list=listKey==='bonusTasks'?(S.bonusTasks&&S.bonusTasks.list||[]):S.quests.list;
  const q=list[idx];
  if(!q||q.done)return;
  q.done=true;
  S.questsDoneTotal=(S.questsDoneTotal||0)+1;
  SFX.quest();
  addXP(q.xp,'Quest: '+q.title);
  checkAchievements();
  persistSave();
  const el=document.getElementById('screen-dashboard');
  if(el&&currentScreen==='dashboard')renderHome(el);
  else renderScreens();
}

async function doBC(){
  const bc=document.getElementById('bc-input')?.value?.trim();if(!bc)return;
  const r=document.getElementById('bc-res');if(r)r.innerHTML=`<div style="color:var(--text-secondary)">Looking up...</div>`;
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${bc}.json`);
    const d=await res.json();
    if(d.status!==1){if(r)r.innerHTML=`<div style="color:var(--danger)">Not found.</div>`;return;}
    const p=d.product,n=p.nutriments||{};
    const e={name:p.product_name||'Product',qty:1,nutrients:{cal:Math.round(n['energy-kcal_100g']||0),protein:Math.round((n['proteins_100g']||0)*10)/10,carbs:Math.round((n['carbohydrates_100g']||0)*10)/10,fat:Math.round((n['fat_100g']||0)*10)/10,fiber:Math.round((n['fiber_100g']||0)*10)/10}};
    if(r)r.innerHTML=`<div class="card-sm flex gap12"><div class="grade grade-${gradeFood(e.nutrients)}">${gradeFood(e.nutrients)}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${escapeHtml(e.name)}</div><div style="font-size:11px;color:var(--text-secondary)">${nn(e.nutrients.cal)} kcal</div></div><button class="btn btn-primary btn-sm" onclick='logBCE(${JSON.stringify(e).replace(/'/g,"&#39;")})'>Log</button></div>`;
  }catch(ex){if(r)r.innerHTML=`<div style="color:var(--danger)">Lookup failed.</div>`;}
}
let _bcStream=null,_bcDetecting=false;
async function startBCCamera(){
  const wrap=document.getElementById('bc-camera-wrap');
  const video=document.getElementById('bc-video');
  const btn=document.getElementById('bc-camera-btn');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showNotif('Camera not supported on this browser','!');return;
  }
  try{
    // Request camera permission
    _bcStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=_bcStream;
    wrap.style.display='block';
    if(btn)btn.style.display='none';
    _bcDetecting=true;
    _runBCDetect(video);
    showNotif('Point camera at barcode','📷');
  }catch(e){
    if(e.name==='NotAllowedError')showNotif('Camera permission denied. Please allow camera access.','!');
    else showNotif('Camera error: '+e.message,'!');
  }
}
async function _runBCDetect(video){
  // Try native BarcodeDetector API (Chrome/Android WebView)
  if('BarcodeDetector' in window){
    const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code']});
    const scan=async()=>{
      if(!_bcDetecting)return;
      try{
        const codes=await detector.detect(video);
        if(codes&&codes.length>0){
          const code=codes[0].rawValue;
          stopBCCamera();
          document.getElementById('bc-input').value=code;
          showNotif('Barcode detected: '+code,'✅');
          doBC();return;
        }
      }catch(e){}
      if(_bcDetecting)requestAnimationFrame(scan);
    };
    video.addEventListener('playing',()=>requestAnimationFrame(scan),{once:true});
  } else {

// Live workout preview - called on every input change
function wLivePreview(){
  const name=(document.getElementById('w-name')||{}).value||'';
  const type=(document.getElementById('w-type')||{}).value||'Strength';
  const sets=+(document.getElementById('w-sets')||{}).value||0;
  const reps=+(document.getElementById('w-reps')||{}).value||0;
  const weight=+(document.getElementById('w-weight')||{}).value||0;
  const dur=+(document.getElementById('w-duration')||{}).value||0;
  const wt=S.player.weightKg||S.profile?.weightKg||70;

  const preview=document.getElementById('w-preview');
  if(!preview) return;
  if(!name&&!sets&&!dur){preview.style.display='none';return;}
  preview.style.display='block';

  // Find MET for this exercise
  const nameLow=name.toLowerCase();
  let met=MET_DB[nameLow];
  if(!met){
    for(const[k,v] of Object.entries(MET_DB)){
      if(nameLow.includes(k)||k.includes(nameLow)){met=v;break;}
    }
  }
  if(!met) met=type==='Cardio'?7:type==='HIIT'?10:type==='Yoga'?3:3.5;

  // Estimate effective duration: if no explicit duration, estimate from sets/reps
  let effectiveDur=dur;
  if(!dur&&sets>0){
    // ~3 min per set for strength (rest+work), ~1.5 min for bodyweight
    effectiveDur=sets*(weight>0?2.5:1.5);
  }

  const cal=effectiveDur>0?Math.round(calcBurn(met,effectiveDur,wt)):0;
  const vol=sets*reps*weight;
  const tdee=getTDEEfromProfile();
  const pct=tdee>0?Math.min(100,Math.round(cal/tdee*100)):0;

  const calEl=document.getElementById('wp-cal');
  const volEl=document.getElementById('wp-vol');
  const metEl=document.getElementById('wp-met');
  const barEl=document.getElementById('wp-bar-fill');
  const lnkEl=document.getElementById('wp-link');

  if(calEl) calEl.innerHTML=cal+'<span style="font-size:12px;color:var(--text-muted);font-weight:400"> kcal est.</span>';
  if(volEl) volEl.textContent=vol>0?'Volume: '+(vol>=1000?(vol/1000).toFixed(1)+'k':vol)+' kg·reps':'';
  if(metEl) metEl.textContent='MET: '+met.toFixed(1)+(dur?'':' · '+effectiveDur.toFixed(1)+'min est.');
  if(barEl) barEl.style.width=pct+'%';
  if(lnkEl) lnkEl.textContent=cal>0?'Will add '+cal+' kcal to Burned tab → tap to view':'';
}
function lookupMET(name,type){
  const n=name.toLowerCase();
  let met=MET_DB[n];
  if(!met){for(const[k,v]of Object.entries(MET_DB)){if(n.includes(k)||k.includes(n)){met=v;break;}}}
  if(!met)met=type==='Cardio'?7:type==='HIIT'?10:type==='Yoga'?3:type==='Dance'?5.5:3.5;
  return met;
}
function logWorkout(override=null){
  const name=override?.name||document.getElementById('w-name')?.value?.trim();
  if(!name)return showNotif('Enter exercise name','!');
  const type=override?.type||document.getElementById('w-type')?.value||'Strength';
  const sets=override?.sets||+document.getElementById('w-sets')?.value||0;
  const wt=override?.weight||+document.getElementById('w-weight')?.value||0;
  let duration=override?.duration||+document.getElementById('w-duration')?.value||0;
  // Estimate duration from sets if not provided
  if(!duration&&sets>0) duration=Math.round(sets*(wt>0?2.5:1.5));
  const met=lookupMET(name,type);
  const caloriesBurned=duration>0?calcBurn(met,duration,S.player.weightKg||70):0;
  const entry={
    name,type,sets,
    reps:override?.reps||+document.getElementById('w-reps')?.value||0,
    weight:wt,duration,
    notes:override?.notes||document.getElementById('w-notes')?.value||'',
    date:getTodayStr(),ts:Date.now(),caloriesBurned
  };
  S.workouts.push(entry);
  if(S._pendingWorkout) S._pendingWorkout='';
  if(!S.burned)S.burned=[];
  if(caloriesBurned>0){
    S.burned.push({activity:name,duration,met,weightKg:S.player.weightKg||70,calories:caloriesBurned,date:getTodayStr(),ts:Date.now(),source:'workout'});
  }
  updStat('strength',5);updStat('endurance',2);
  trackChallengeProgress();persistSave();
  checkAchievements();
  const el=document.getElementById('screen-workout');
  if(el&&currentScreen==='workout'){renderWorkout(el);}
  else{renderScreens();}
  addXP(caloriesBurned>0?15:8,'Exercise logged');
  return entry;
}

  S.workouts.splice(i,1);persistSave();
  var el=document.getElementById('screen-workout');

function burnCalcPreview(){
  const actEl=document.getElementById('calc-act');
  const durEl=document.getElementById('calc-dur');
  const intEl=document.getElementById('calc-int');
  const metRow=document.getElementById('calc-met-row');
  const resEl=document.getElementById('calc-result');
  const wtEl=document.getElementById('calc-wt');
  if(!actEl||!resEl) return;

  const act=actEl.value;
  const isCustom=act==='custom';
  if(metRow) metRow.style.display=isCustom?'block':'none';

  const dur=parseFloat((durEl||{}).value)||0;
  const intMult=parseFloat((intEl||{}).value)||1.0;
  const wt=parseFloat((wtEl||{}).value)||S.player.weightKg||70;
  let met=MET_DB[act]||MET_DB[act.toLowerCase()]||4;
  if(isCustom) met=parseFloat((document.getElementById('calc-met-val')||{}).value)||4;
  met*=intMult;

  if(dur<=0){
    resEl.innerHTML='<div style="font-size:12px;color:var(--text-muted)">Enter duration above ↑</div>';
    return;
  }

  const cal=Math.round(calcBurn(met,dur,wt));
  const tdee=getTDEEfromProfile();
  const pct=tdee>0?Math.min(100,Math.round(cal/tdee*100)):0;
  const perMin=Math.round(cal/dur);
