function miniCal(dates){
  const days=[],today=new Date();
  for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);days.push(`<div class="cal-day${dates.includes(ds)?' done':''}${i===0?' today':''}">${d.getDate()}</div>`);}
  return`<div class="cal-grid" style="margin-top:8px">${days.join('')}</div>`;
}
function addHabit(){
  const name=document.getElementById('h-name')?.value?.trim();if(!name)return;
  S.habits.push({name,difficulty:document.getElementById('h-diff')?.value||'easy',category:document.getElementById('h-cat')?.value?.trim()||'',icon:document.getElementById('h-icon')?.value?.trim()||'✅',description:document.getElementById('h-desc')?.value?.trim()||'',streak:0,completedDates:[],createdAt:getTodayStr()});
  persistSave();var _hel=document.getElementById('screen-habits');if(_hel&&currentScreen==='habits')renderHabits(_hel);else renderScreens();
}
function toggleHabit(i){
  const today=getTodayStr();
  const h=S.habits[i];
  if(!h) return;
  if(!h.completedDates) h.completedDates=[];
  const wasDone=h.completedDates.includes(today);
  if(wasDone){
    h.completedDates=h.completedDates.filter(d=>d!==today);
  } else {
    h.completedDates.push(today);
    const xM={easy:20,medium:40,hard:70};
    addXP(xM[h.difficulty]||20,'Habit: '+h.name);
    updStat('discipline',2);
  }
  // Recalculate streak accurately from dates
  h.streak=calcHabitStreak(h.completedDates);
  trackChallengeProgress();persistSave();
  const el=document.getElementById('screen-habits');
  if(el&&currentScreen==='habits') renderHabits(el);
  else renderScreens();
}
function calcHabitStreak(dates){
  if(!dates||!dates.length) return 0;
  // Deduplicate first, then sort descending
  const sorted=[...new Set(dates)].sort().reverse();
  let streak=0;
  const today=new Date(); today.setHours(0,0,0,0);
  let check=new Date(today);
  for(let i=0;i<sorted.length;i++){
    const d=new Date(sorted[i]); d.setHours(0,0,0,0);
    const diff=Math.round((check-d)/86400000);
    if(diff===0){streak++;check=d;}
    else if(diff===1){streak++;check=d;}
    else break;
  }
  return streak;
}
function delHabit(i){S.habits.splice(i,1);persistSave();var _hel=document.getElementById('screen-habits');if(_hel&&currentScreen==='habits')renderHabits(_hel);else renderScreens();}

// TIMER FUNCTIONS
function startTimer(){
  const subj=document.getElementById('t-subject')?.value?.trim();
  if(!subj&&timerSeconds===0)return showNotif('Enter a subject first','!');
  timerSubject=document.getElementById('t-subject')?.value?.trim()||timerSubject;
  timerTopic=document.getElementById('t-topic')?.value?.trim()||timerTopic;
  timerDiff=document.getElementById('t-diff')?.value||timerDiff;
  if(timerInterval) clearInterval(timerInterval);
  timerRunning=true;
  // Update button states immediately
  var startBtn=document.querySelector('[onclick="startTimer()"]');
  var pauseBtn=document.querySelector('[onclick="pauseTimer()"]');
  if(startBtn)startBtn.style.display='none';
  if(pauseBtn)pauseBtn.style.display='inline-flex';
  timerInterval=setInterval(()=>{
    timerSeconds++;
    // update display elements if they exist (won't after re-render but that's OK)
    const td=document.querySelector('.timer-display');
    const mins=Math.floor(timerSeconds/60).toString().padStart(2,'0');
    const secs=(timerSeconds%60).toString().padStart(2,'0');
    if(td) td.textContent=`${mins}:${secs}`;
    // Update ring every 10s to avoid too many DOM ops
    if(timerSeconds%10===0){
      const ring=document.querySelector('.timer-ring-fill');
      if(ring){
        const circ=2*Math.PI*54;
        const prog=Math.min(timerSeconds/3600,1);
        ring.style.strokeDashoffset=circ*(1-prog);
      }
    }
  },1000);
  // Just update button visibility, not full re-render
  renderScreens();
}
function pauseTimer(){
  timerRunning=false;
  clearInterval(timerInterval);
  renderScreens();
}
function resetTimer(){
  timerRunning=false;clearInterval(timerInterval);timerSeconds=0;renderScreens();
}
function stopTimer(){
  timerRunning=false;clearInterval(timerInterval);
  const dur=Math.max(1,Math.round(timerSeconds/60));
  const subj=timerSubject||'Study';
  const xp=calcStudyXP(dur,timerDiff);
  const session={subject:subj,topic:timerTopic,duration:dur,difficulty:timerDiff,notes:'Timer session',date:getTodayStr(),ts:Date.now(),xp,timerBased:true};
  if(!S.study.sessions)S.study.sessions=[];
  if(!S.study.subjects)S.study.subjects=[];
  S.study.sessions.push(session);
  if(!S.study.subjects.includes(subj))S.study.subjects.push(subj);
  updStat('discipline',3);if(timerDiff==='hard')updStat('discipline',2);
  addXP(xp,`${subj} study session!`);
  checkAutoQuests();persistSave();
  timerSeconds=0;timerSubject='';timerTopic='';timerDiff='medium';
  showNotif(`Session saved: ${dur} min of ${subj} (+${xp} XP)`,'📚');
  renderScreens();
}

function previewSXP(){
  const dur=+document.getElementById('s-duration')?.value||0;
  const diff=document.getElementById('s-diff')?.value||'medium';
  const el=document.getElementById('s-xp-prev');
  if(el&&dur>0)el.innerHTML=`Estimated: <span style="color:var(--warning);font-weight:600">+${calcStudyXP(dur,diff)} XP</span>`;
}
function calcStudyXP(dur,diff){
  const m={easy:1,medium:1.5,hard:2.2};
  return Math.round(dur*1.5*(m[diff]||1.5));
}
function logStudySession(){
  const subject=document.getElementById('s-subject')?.value?.trim();
  const dur=+document.getElementById('s-duration')?.value||0;
  if(!subject)return showNotif('Enter a subject','!');
  if(dur<=0)return showNotif('Enter duration','!');

  const xp=calcStudyXP(dur,diff);

}

  ${S.quests.list.map(q=>`<div class="quest-card${q.done?' done':''}"><span style="font-size:18px;width:24px">${q.icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${q.title}</div><div style="font-size:11px;color:var(--text-muted)">+${q.xp} XP</div></div><div class="quest-check${q.done?' done':''}" onclick="manualQ('${q.id}')">${q.done?'✓':''}</div></div>`).join('')}
  <div class="insight mt8">💡 Most quests auto-complete as you track. Manual complete only if needed.</div>
  <hr>
  <div class="section-title" style="margin-top:16px">Bonus Tasks — ${(S.bonusTasks.list||[]).filter(b=>b.done).length}/${(S.bonusTasks.list||[]).length} done</div>
  ${(S.bonusTasks.list||[]).map(b=>`<div class="bonus-card${b.done?' done':''}"><span style="font-size:20px;width:28px">${b.icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${b.title}</div><div style="font-size:11px;color:var(--warning)">+${b.xp} Bonus XP</div></div><button class="btn btn-sm${b.done?'':' btn-primary'}" onclick="completeBonus('${b.id}')" ${b.done?'disabled':''} style="${b.done?'opacity:.5':''}">${b.done?'✓ Done':'Complete'}</button></div>`).join('')}`;
}
function manualQ(id){const q=S.quests.list.find(x=>x.id===id);if(q&&!q.done){q.done=true;addXP(q.xp,'Quest done!');persistSave();renderScreens();}}
function completeBonus(id){const b=(S.bonusTasks.list||[]).find(x=>x.id===id);if(b&&!b.done){b.done=true;addXP(b.xp,'Bonus!');persistSave();renderScreens();}}

// ANALYTICS
// ════════════════════════════
function setAnalyticsSection(s){analyticsSection=s;S._analyticsSection=s;persistSave();renderScreens();}
function setAnalyticsPeriod(p){analyticsPeriod=p;S._analyticsPeriod=p;persistSave();renderScreens();}

function renderAnalytics(el){
  const sections=[
    {id:'overview',label:'Overview'},
    {id:'nutrition',label:'Nutrition'},
    {id:'training',label:'Training'},
    {id:'health',label:'Health'},
    {id:'progress',label:'Progress'},
    {id:'insights',label:'Insights'},
    {id:'gamification',label:'Gamification'},
  ];
  const periodTabs=`
  <div class="chart-tab-bar">
    <div class="chart-tab${analyticsPeriod==='7d'?' active':''}" onclick="setAnalyticsPeriod('7d')">7 Days</div>
    <div class="chart-tab${analyticsPeriod==='30d'?' active':''}" onclick="setAnalyticsPeriod('30d')">30 Days</div>
    <div class="chart-tab${analyticsPeriod==='1y'?' active':''}" onclick="setAnalyticsPeriod('1y')">12 Months</div>
  </div>`;

  el.innerHTML=`
  <div class="an-sec-bar">
    ${sections.map(s=>`<div class="an-sec-btn${analyticsSection===s.id?' active':''}" onclick="setAnalyticsSection('${s.id}')">${s.label}</div>`).join('')}
  </div>
  <div id="an-section-content"></div>`;

  const content=document.getElementById('an-section-content');
  if(!content)return;

  switch(analyticsSection){
    case 'overview':    renderAnOverview(content,periodTabs); break;
    case 'nutrition':   renderAnNutrition(content,periodTabs); break;
    case 'training':    renderAnTraining(content,periodTabs); break;
    case 'health':      renderAnHealth(content,periodTabs); break;
    case 'progress':    renderAnProgress(content); break;
    case 'insights':    renderAnInsights(content,periodTabs); break;
    case 'gamification':renderAnGamification(content); break;
    default:            renderAnOverview(content,periodTabs);
  }
}

// ── HELPER FUNCTIONS ────────────────────────────────────────────
function calcFitnessScore(){
  const data=getAnalyticsData('7d');
  const tdee=getTDEEfromProfile();
  let score=0;
  // Consistency (0-25): days with any log in last 7
  const activeDays=data.filter(d=>d.cal>0||d.burned>0||d.water>0).length;
  score+=Math.round((activeDays/7)*25);
  // Hydration (0-20): avg water vs goal
  const goalL=(S.water.dailyGoalMl||3000)/1000;
  const avgWater=data.reduce((a,d)=>a+d.water,0)/7;
  score+=Math.round(Math.min(1,avgWater/goalL)*20);
  // Calorie balance (0-20): how close avg cal is to TDEE
  const daysWithCal=data.filter(d=>d.cal>0);
  if(daysWithCal.length>0){
    const avgCal=daysWithCal.reduce((a,d)=>a+d.cal,0)/daysWithCal.length;
    const diff=Math.abs(avgCal-tdee)/tdee;
    score+=Math.round(Math.max(0,1-diff*2)*20);
  }
  // Habits (0-20): avg habits per day vs total habits
  const totalHabits=(S.habits||[]).length;
  if(totalHabits>0){const avgH=data.reduce((a,d)=>a+d.habits,0)/7;score+=Math.round(Math.min(1,avgH/totalHabits)*20);}
  else score+=10;
  // Workout (0-15): workout days this week
  const wkDays=new Set(data.flatMap(d=>d.slotDates).filter(ds=>(S.workouts||[]).some(w=>w.date===ds))).size;
  score+=Math.round(Math.min(1,wkDays/3)*15);
  return Math.min(100,score);
}

function calcNutritionScore(){
  const days=analyticsPeriod==='7d'?7:analyticsPeriod==='30d'?30:365;
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  let calHits=0,protHits=0,logDays=0;
  for(let i=0;i<days;i++){
    const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);
    const ds=localDs(d);
    const entries=S.nutrition.entries.filter(e=>e.date===ds);
    if(entries.length===0)continue;
    logDays++;
    const cal=entries.reduce((a,e)=>a+(e.nutrients&&e.nutrients.cal||0),0);
    const prot=entries.reduce((a,e)=>a+(e.nutrients&&e.nutrients.protein||0),0);
    const tdee=getTDEEfromProfile();
    if(cal>=tdee*0.85&&cal<=tdee*1.15)calHits++;
    if(prot>=(S.nutrition.dailyGoal.protein||150)*0.8)protHits++;
  }
  if(logDays===0)return 0;
  return Math.round(((calHits/logDays)*50+(protHits/logDays)*30+(logDays/days)*20));
}

function getMealTimingStats(){
  const days=analyticsPeriod==='7d'?7:analyticsPeriod==='30d'?30:365;
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const dates=[];
  for(let i=0;i<days;i++){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);dates.push(localDs(d));}
  const entries=S.nutrition.entries.filter(e=>dates.includes(e.date));
  // Try to categorize by meal type tag first, then by entry index per day
  const slots=[
    {label:'Breakfast',icon:'🌅',color:'#f5a623',count:0,totalCal:0},
    {label:'Lunch',icon:'☀️',color:'#4cdb8a',count:0,totalCal:0},
    {label:'Dinner',icon:'🌙',color:'#4a9eff',count:0,totalCal:0},
    {label:'Snacks',icon:'🍎',color:'#c084fc',count:0,totalCal:0},
  ];
  // Group by day and slot by position (1st=breakfast, 2nd=lunch, 3rd=dinner, rest=snacks)
  const byDay={};
  entries.forEach(e=>{if(!byDay[e.date])byDay[e.date]=[];byDay[e.date].push(e);});
  Object.values(byDay).forEach(dayEntries=>{
    dayEntries.forEach((e,i)=>{
      const si=i<3?i:3;
      slots[si].count++;
      slots[si].totalCal+=e.nutrients&&e.nutrients.cal||0;
    });
  });
  slots.forEach(s=>{s.avgCal=s.count?Math.round(s.totalCal/s.count):0;});
  return{slots,total:entries.length};
}

function getPersonalRecords(){
  const byName={};
  (S.workouts||[]).forEach(w=>{
    const k=w.name.toLowerCase();
    if(!byName[k])byName[k]={name:w.name,weight:0,reps:0,volume:0,date:w.date,sets:0};
    const vol=(w.sets||1)*(w.reps||1)*(w.weight||0);
    const cur=byName[k];
    if(w.weight>cur.weight||(w.weight===cur.weight&&(w.reps||0)>cur.reps)){
      byName[k]={name:w.name,weight:w.weight||0,reps:w.reps||0,sets:w.sets||0,volume:vol,date:w.date};
    }
  });
  return Object.values(byName).filter(r=>r.weight>0||r.reps>0).sort((a,b)=>b.volume-a.volume);
}

function getMuscleDistribution(){

}

function getWorkoutVolume(data){

  const values=data.map(d=>{

      return total+(S.workouts||[]).filter(w=>w.date===ds).reduce((a,w)=>a+(w.sets||0)*(w.reps||0)*(w.weight||0),0);
    },0);
  });
  return{values,hasData:values.some(v=>v>0)};
}

function getWorkoutDaysThisWeek(){
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const dates=[];for(let i=6;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);dates.push(localDs(d));}
  return new Set((S.workouts||[]).filter(w=>dates.includes(w.date)).map(w=>w.date)).size;
}

function calcRecoveryStats(){
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const days=analyticsPeriod==='7d'?7:analyticsPeriod==='30d'?30:365;
  const dates=[];for(let i=days-1;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);dates.push(localDs(d));}
  const workoutDates=new Set((S.workouts||[]).filter(w=>dates.includes(w.date)).map(w=>w.date));
  const restDays=dates.filter(ds=>!workoutDates.has(ds)).length;
  // Avg days between workouts
  const wdSorted=[...workoutDates].sort();
  let gaps=[];
  for(let i=1;i<wdSorted.length;i++){
    const diff=(new Date(wdSorted[i])-new Date(wdSorted[i-1]))/(86400000);
    if(diff>0)gaps.push(diff);
  }
  const avgRestBetween=gaps.length?Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length*10)/10+'d':'—';
  // Recovery score: 3-4 workouts per week = ideal
  const wkRate=workoutDates.size/(days/7);
  let score=0;
  if(wkRate>=3&&wkRate<=5)score=100;
  else if(wkRate>=2&&wkRate<3)score=75;
  else if(wkRate>5)score=60;
  else if(wkRate>=1)score=50;
  else score=30;
  const tip=score>=80?'✅ Great balance of training and rest — keep it up!':score>=60?'💡 Consider adding one more rest day this week.':'💤 You may be under-training. Aim for 3-4 sessions per week.';
  return{restDays,avgRestBetween,score,tip};
}

function calcBodyFatEst(bmi,age,gender){
  if(!bmi||!age)return null;
  const bf=Math.round((1.20*bmi+0.23*age-(gender==='male'?16.2:5.4))*10)/10;
  return Math.max(3,Math.min(60,bf));
}

function calcWeightPrediction(wl){
  if(!wl||wl.length<3)return null;
  const sorted=[...wl].sort((a,b)=>a.date.localeCompare(b.date));
  const last=sorted.slice(-7);
  const n=last.length;
  const xMean=(n-1)/2;
  const yMean=last.reduce((a,e)=>a+e.kg,0)/n;
  let num=0,den=0;
  last.forEach((e,i)=>{num+=(i-xMean)*(e.kg-yMean);den+=(i-xMean)**2;});
  const slope=den?num/den:0;
  const weeklyTrend=Math.round(slope*7*10)/10;
  const latest=sorted[sorted.length-1].kg;
  const in30=Math.round((latest+slope*30)*10)/10;
  const goal=S.profile&&S.profile.weightKg?S.profile.weightKg:null;
  let tip='';
  if(weeklyTrend>0.5)tip='⚠️ Gaining weight faster than optimal. Review calorie intake.';
  else if(weeklyTrend<-1)tip='⚠️ Losing weight too fast. Ensure adequate protein and calories.';
  else if(weeklyTrend<0)tip='📉 On a steady cut. Pace is healthy.';
  else tip='⚖️ Weight is stable. Adjust diet if you have a goal.';
  return{trend:weeklyTrend,in30,tip};
}

function calcCorrelations(data){
  const corrs=[];
  if(data.length<5)return corrs;
  // Correlation: hydration vs habits done
  const wDays=data.filter(d=>d.water>0&&d.habits>=0);
  if(wDays.length>=5){
    const highWater=wDays.filter(d=>d.water>=((S.water.dailyGoalMl||3000)/1000)*0.8);
    const lowWater=wDays.filter(d=>d.water<((S.water.dailyGoalMl||3000)/1000)*0.8);
    if(highWater.length>0&&lowWater.length>0){
      const hwHabits=highWater.reduce((a,d)=>a+d.habits,0)/highWater.length;
      const lwHabits=lowWater.reduce((a,d)=>a+d.habits,0)/lowWater.length;
      const diff=lwHabits>0?Math.round((hwHabits-lwHabits)/lwHabits*100):0;
      if(Math.abs(diff)>5)corrs.push({icon:'💧',label:'Hydration → Habits',detail:`On well-hydrated days, you complete ${Math.abs(diff)}% ${diff>0?'more':'fewer'} habits`,val:diff});
    }
  }
  // Correlation: workout days vs calorie balance
  const wkDays=data.filter(d=>d.burned>0);
  const restDays2=data.filter(d=>d.burned===0&&d.cal>0);
  if(wkDays.length>=3&&restDays2.length>=3){
    const wkCal=wkDays.reduce((a,d)=>a+d.cal,0)/wkDays.length;
    const rCal=restDays2.reduce((a,d)=>a+d.cal,0)/restDays2.length;
    const diff=rCal>0?Math.round((wkCal-rCal)/rCal*100):0;
    if(Math.abs(diff)>5)corrs.push({icon:'🏋️',label:'Training → Appetite',detail:`On workout days you eat ${Math.abs(diff)}% ${diff>0?'more':'less'} calories`,val:-Math.abs(diff)});
  }
  return corrs;
}

function getRecommendations(){

function buildHeatmap(){
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  let html='';
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=90;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=localDs(d);
    let intensity=0;
    const hasWater=(S.water.entries||[]).some(e=>e.date===ds);
    const habitsDone=(S.habits||[]).filter(h=>(h.completedDates||[]).includes(ds)).length;
    const hasWorkout=(S.workouts||[]).some(w=>w.date===ds);
    if(hasWater||habitsDone>0)intensity=1;
    if(hasWorkout||habitsDone>=2)intensity=2;
    if(hasWorkout&&habitsDone>=2&&hasWater)intensity=3;
    html+=`<div class="hm-cell hm-${intensity}" title="${ds}"></div>`;
  }
  return html;
}

function getIngNutrition(name){
  const k=name.toLowerCase().trim();
  if(INGREDIENT_NUTRITION[k]) return INGREDIENT_NUTRITION[k];
  // Fuzzy match
  for(const[key,val] of Object.entries(INGREDIENT_NUTRITION)){
    if(k.includes(key)||key.includes(k)) return val;
  }
  // Try API via nutritionix estimate if online
  return null;
}
function calcDishNutrition(){
  const method=dishState.method||'raw';
  const oilG=dishState.oil||0;
  const servings=dishState.servings||1;
  const mult=COOKING_METHODS[method]?.mult||1;
  let totalCal=0,totalProt=0,totalCarbs=0,totalFat=0,totalFiber=0;
  let missing=[];
  dishIngredients.forEach(ing=>{
    const g=parseFloat(ing.qty)||0;
    const n=getIngNutrition(ing.name);
    if(n){
      const factor=g/100;
      totalCal+=n[0]*factor;totalProt+=n[1]*factor;
      totalCarbs+=n[2]*factor;totalFat+=n[3]*factor;totalFiber+=n[4]*factor;
    } else { missing.push(ing.name); }
  });
  // Add oil calories
  if(oilG>0){ totalCal+=oilG*9; totalFat+=oilG; }
  // Apply cooking method multiplier (affects cal density)
  totalCal*=mult;
  // Per serving
  const ps=servings>0?servings:1;
  return{
    cal:Math.round(totalCal/ps),prot:Math.round(totalProt/ps*10)/10,
    carbs:Math.round(totalCarbs/ps*10)/10,fat:Math.round(totalFat/ps*10)/10,
    fiber:Math.round(totalFiber/ps*10)/10,missing
  };
}
function addDishIngredient(){
  saveDishState();
  const name=document.getElementById('ing-name')?.value?.trim();
  const qty=parseFloat(document.getElementById('ing-qty')?.value||0);
  if(!name||!qty||qty<=0){showNotif('Enter ingredient name and quantity','!');return;}
  dishIngredients.push({name,qty});
  document.getElementById('ing-name').value='';
  document.getElementById('ing-qty').value='';
  renderScreens();
}
function removeDishIngredient(i){dishIngredients.splice(i,1);renderScreens();}
function logCustomDish(){
  const dishName=document.getElementById('dish-name')?.value?.trim()||'Custom Dish';
  const n=calcDishNutrition();

  if(n.cal===0){
    showNotif('Add ingredients first','!');
    return;
  }

  const today=getTodayStr();

  // Log to nutrition diary
  S.nutrition.entries.push({
    id:Date.now(),
    name:dishName,
    date:today,
    mealType:'meal',
    nutrients:{
      cal:n.cal,
      protein:n.prot||n.protein||0,
      carbs:n.carbs,
      fat:n.fat,
      fiber:n.fiber||0
    }
  });

  // Save as reusable custom dish
  if(!S.customDishes) S.customDishes=[];

  const dishExists=S.customDishes.some(
    d=>d.name.toLowerCase()===dishName.toLowerCase()
  );

  if(!dishExists){
    S.customDishes.push({
      name:dishName,
      ingredients:[...dishIngredients],
      cal:n.cal,
      protein:n.prot||n.protein||0,
      carbs:n.carbs,
      fat:n.fat,
      fiber:n.fiber||0,
      source:'manual',
      date:today
    });
  }

  // Also add to searchable foods database
  if(!S.customFoods) S.customFoods=[];

  const foodExists=S.customFoods.some(
    f=>f.name.toLowerCase()===dishName.toLowerCase()
  );

  if(!foodExists){
    S.customFoods.push({
      name:dishName,
      cal:n.cal,
      protein:n.prot||n.protein||0,
      carbs:n.carbs,
      fat:n.fat,
      fiber:n.fiber||0,
      source:'dish'
    });
  }

  persistSave();

  showNotif(`${dishName} logged — ${n.cal} kcal`,'OK');

  dishIngredients=[];
  renderScreens();
}

let mealPlanItems=[];
function addMealItem(){
  const name=document.getElementById('mi-name')?.value?.trim();
  const qty=parseFloat(document.getElementById('mi-qty')?.value||100);
  const unit=document.getElementById('mi-unit')?.value||'g';
  if(!name){showNotif('Enter food item name','!');return;}
  const n=getIngNutrition(name);
  const cal=n?Math.round(n[0]*qty/100):0;
  mealPlanItems.push({name,qty,unit,cal,prot:n?Math.round(n[1]*qty/100*10)/10:0,carbs:n?Math.round(n[2]*qty/100*10)/10:0,fat:n?Math.round(n[3]*qty/100*10)/10:0});
  document.getElementById('mi-name').value='';
  document.getElementById('mi-qty').value='100';
  renderScreens();
}
function removeMealItem(i){mealPlanItems.splice(i,1);renderScreens();}

function editMealPlan(i){
  const mp=(S.mealPlans||[])[i];
  if(!mp){showNotif('Meal plan not found','!');return;}
  mealPlanItems=mp.items.map(function(it){return Object.assign({},it);});
  (S.mealPlans||[]).splice(i,1);
  persistSave();
  currentScreen='nutrition';nutritionTab='mealplans';
  renderScreens();
  setTimeout(function(){
    var el=document.getElementById('mp-name');
    if(el){el.value=mp.name||'';el.scrollIntoView({behavior:'smooth'});}
  },150);
  showNotif('Meal plan loaded for editing!','OK');
}
function duplicateMealPlan(i){
  const mp=(S.mealPlans||[])[i];
  if(!mp) return;
  const copy=Object.assign({},mp,{
    name:mp.name+' (Copy)',
    items:mp.items.map(function(it){return Object.assign({},it);}),
    date:getTodayStr()
  });
  (S.mealPlans||(S.mealPlans=[])) && S.mealPlans.push(copy);
  persistSave();
  showNotif('Meal plan duplicated!','OK');
  renderScreens();
}
function saveMealPlan(){
  const name=document.getElementById('mp-name')?.value?.trim();
  if(!name){showNotif('Enter meal plan name','!');return;}
  if(mealPlanItems.length===0){showNotif('Add at least one food item','!');return;}
  if(!S.mealPlans) S.mealPlans=[];
  const totalCal=mealPlanItems.reduce((a,i)=>a+i.cal,0);
  (S.mealPlans||(S.mealPlans=[])) && S.mealPlans.push({name,items:[...mealPlanItems],totalCal,date:getTodayStr()});
  persistSave();
  mealPlanItems=[];
  document.getElementById('mp-name').value='';
  showNotif(`Meal plan "${name}" saved!`,'OK');
  renderScreens();
}
function logMealPlan(i){
  const mp=S.mealPlans?.[i];if(!mp)return;
  const today=getTodayStr();
  mp.items.forEach(item=>{
    S.nutrition.entries.push({
      id:Date.now()+Math.random(),name:item.name,date:today,mealType:'meal',
      nutrients:{cal:item.cal,protein:item.prot||item.protein||0,carbs:item.carbs,fat:item.fat,fiber:0}
    });
  });
  persistSave();
  showNotif(`${mp.name} logged — ${mp.totalCal} kcal total`,'OK');
  renderScreens();
}
function deleteMealPlan(i){(S.mealPlans||[]).splice(i,1);persistSave();renderScreens();}
function renderMealPlanner(el){
  const plans=S.mealPlans||[];
  const tot=mealPlanItems.reduce((a,i)=>a+i.cal,0);
  el.innerHTML=`
  <div class="card mb12">
    <div class="section-title">Create Meal Plan</div>
    <input type="text" id="mp-name" placeholder="Meal name (e.g. Pre-workout Meal, Breakfast A)" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-end">
      <div style="flex:1">
        <label style="font-size:11px;color:var(--text-muted)">Food Item</label>
        <input type="text" id="mi-name" placeholder="e.g. Oats, Chicken Breast..." list="mi-list" style="margin-top:4px">
        <datalist id="mi-list">${COMMON_INGREDIENTS.map(i=>`<option value="${i}">`).join('')}</datalist>
      </div>
      <div style="width:80px">
        <label style="font-size:11px;color:var(--text-muted)">Amount</label>
        <input type="number" id="mi-qty" value="100" min="1" style="margin-top:4px">
      </div>
      <div style="width:70px">
        <label style="font-size:11px;color:var(--text-muted)">Unit</label>
        <select id="mi-unit" style="margin-top:4px">
          <option value="g">g</option><option value="ml">ml</option>
          <option value="cup">cup</option><option value="tbsp">tbsp</option>
          <option value="piece">piece</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addMealItem()" style="margin-bottom:1px">+</button>
    </div>
    ${mealPlanItems.length>0?`
    <div style="margin-bottom:10px">
      ${mealPlanItems.map((it,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-raised);border-radius:8px;margin-bottom:4px">
        <div style="flex:1">
          <span style="font-size:13px;font-weight:500">${it.name}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-left:8px">${it.qty}${it.unit}</span>
          <span style="font-size:11px;color:var(--warning);margin-left:8px">${it.cal} kcal</span>
          <span style="font-size:11px;color:var(--info);margin-left:4px">${it.prot}g prot</span>
        </div>
        <button class="btn btn-icon btn-sm" onclick="removeMealItem(${i})" style="color:var(--danger)">×</button>
      </div>`).join('')}
      <div style="padding:8px;border-top:1px solid var(--border-mid);margin-top:6px;display:flex;justify-content:space-between">
        <span style="font-size:13px;font-weight:600">Total</span>
        <span style="font-size:13px;color:var(--warning);font-weight:700">${tot} kcal</span>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveMealPlan()">Save Meal Plan</button>`:
    '<div style="color:var(--text-muted);font-size:12px;padding:12px 0">Add food items to build your meal plan</div>'}
  </div>

  ${plans.length>0?`<div class="section-title">Saved Meal Plans (${plans.length})</div>`:''} 
  ${plans.map((mp,i)=>`<div class="card mb10">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:600">${mp.name}</div>
        <div style="font-size:11px;color:var(--text-muted)">${mp.items.length} items · ${mp.totalCal} kcal</div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="logMealPlan(${i})">Log</button>
        <button class="btn btn-sm" onclick="editMealPlan(${i})" style="border-color:var(--primary);color:var(--primary)">Edit</button>
        <button class="btn btn-sm" onclick="duplicateMealPlan(${i})" style="border-color:var(--water);color:var(--water)">Copy</button>
        <button class="btn btn-icon btn-sm" onclick="deleteMealPlan(${i})" style="color:var(--danger)">×</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px">
      ${mp.items.map(it=>`<div style="font-size:12px;color:var(--text-secondary);display:flex;justify-content:space-between;padding:3px 8px;background:var(--bg-overlay);border-radius:5px">
        <span>${it.name} <span style="color:var(--text-muted)">${it.qty}${it.unit}</span></span>
        <span style="color:var(--warning)">${it.cal} kcal</span>
      </div>`).join('')}
    </div>
  </div>`).join('')}`;
}

}

    xp:{icon:'⚡',label:'XP Earned',color:'#f5a623',cls:'xp'}
  }[t]||{icon:'🏆',label:'Activity',color:'var(--primary)',cls:'xp'};
}

  }
  return html;
}

function createChallenge(){
  const type=document.getElementById('ch-type')?.value;
  if(!type){showNotif('Select a challenge type','!');return;}
  const titleInput=document.getElementById('ch-title')?.value?.trim();
  const customTitle=titleInput||({workouts:'💪 Most Workouts',habits:'✅ Most Habits',water:'💧 Most Hydration Days',xp:'⚡ Most XP'}[type]||'Challenge');
  const days=Math.max(1,Math.min(90,+document.getElementById('ch-days')?.value||7));
  const desc=document.getElementById('ch-desc')?.value?.trim()||'';
  const invited=[];
  const liveIds=Object.keys(peerConnections);
  (S.partners||[]).filter(p=>p.peerId&&liveIds.includes(p.peerId)).forEach(function(p){
    const safeId=(p.peerId||'').replace(/-/g,'');
    const cb=document.getElementById('ch-inv-'+safeId);
    if(cb&&cb.checked) invited.push(p.peerId);
  });
  if(!invited.length&&!S.partners?.length){showNotif('Add partners first!','!');return;}
  const challenge={
    id:'ch_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    type:type,
    title:customTitle,
    desc:desc,
    durationDays:days,
    createdBy:S.deviceId,
    participants:[{peerId:S.deviceId,name:S.player.name||'You',progress:0}],
    invitedPeerIds:invited,
    startsAt:Date.now(),
    endsAt:Date.now()+days*86400000,
    status:'active',
    winnerId:null
  };
  // Add invited partners as participants (they auto-track when synced)
  (S.partners||[]).forEach(function(p){
    if(invited.includes(p.peerId)) challenge.participants.push({peerId:p.peerId,name:p.name,progress:0});
  });
  if(!S.challenges) S.challenges=[];
  S.challenges.push(challenge);
  persistSave();
  showNotif('Challenge "'+customTitle+'" created! ('+days+' days)','⚔️');
  // Notify invited partners via P2P
  invited.forEach(function(pid){
    const conn=peerConnections[pid];
    if(conn&&conn.open){
      try{conn.send(JSON.stringify({type:'challenge_invite',data:{id:challenge.id,title:customTitle,type:type,desc:desc,durationDays:days,createdBy:S.player.name||'Warrior',deviceId:S.deviceId}}));}catch(e){}
    }
  });
  if(currentScreen==='leaderboard') renderLeaderboard(document.getElementById('screen-leaderboard'));
}

function trackChallengeProgress(){
  if(!S.challenges||!S.challenges.length) return;
  const active=S.challenges.filter(function(c){return c.status==='active';});
  if(!active.length) return;
  const deviceId=S.deviceId;
  active.forEach(function(c){
    const me=c.participants.find(function(p){return p.peerId===deviceId;});
    if(!me) return;
    let val=0;
    switch(c.type){
      case 'workouts': val=(S.workouts||[]).filter(function(w){var wd=new Date(w.date||w.timestamp||0).getTime();return wd>=c.startsAt&&wd<=c.endsAt;}).length; break;
      case 'habits': val=(S.habits||[]).filter(function(h){var done=(h.completedDates||[]).filter(function(d){var hd=new Date(d).getTime();return hd>=c.startsAt&&hd<=c.endsAt;});return done.length;}).length; break;
      case 'water': val=(S.water?.entries||[]).filter(function(w){var wd=new Date(w.date||w.timestamp||0).getTime();return wd>=c.startsAt&&wd<=c.endsAt;}).reduce(function(a,w){return a+((w.ml||0)>=200?1:0);},0); break;
      case 'xp': val=(S.player.xp||0); break;
    }
    if(val!==me.progress){me.progress=val;persistSave();}
    // Broadcast progress to live partners
    const liveIds=Object.keys(peerConnections);
    c.participants.forEach(function(p){
      if(p.peerId!==deviceId&&liveIds.includes(p.peerId)){
        const conn=peerConnections[p.peerId];
        if(conn&&conn.open){
          try{conn.send(JSON.stringify({type:'challenge_progress',data:{challengeId:c.id,deviceId:deviceId,progress:val}}));}catch(e){}
        }
      }
    });
  });
  checkChallengeCompletions();
}

function checkChallengeCompletions(){
  if(!S.challenges) return;
  var changed=false;
  S.challenges.forEach(function(c){
    if(c.status!=='active'||Date.now()<c.endsAt) return;
    c.status='completed';
    const sorted=c.participants.slice().sort(function(a,b){return b.progress-a.progress;});
    if(sorted.length){
      c.winnerId=sorted[0].peerId;
      const winner=c.participants.find(function(p){return p.peerId===c.winnerId;});
      if(winner&&c.winnerId===S.deviceId){
        S.player.xp=(S.player.xp||0)+100;
        showNotif('🏆 You won "'+c.title+'"! +100 XP','✅');
      }
    }
    changed=true;
  });
  if(changed){persistSave();if(currentScreen==='leaderboard')renderLeaderboard(document.getElementById('screen-leaderboard'));}
}

// Receive challenge progress from P2P (called from setupConn)
function handleChallengeProgress(data){
  if(!data||!data.challengeId||!S.challenges) return;
  const c=S.challenges.find(function(ch){return ch.id===data.challengeId;});
  if(!c) return;
  const id=data.deviceId;
  const p=c.participants.find(function(part){return part.peerId===id;});
  if(p) p.progress=data.progress;
  else c.participants.push({peerId:id,name:data.name||'Partner',progress:data.progress});
  persistSave();
  if(currentScreen==='leaderboard') renderLeaderboard(document.getElementById('screen-leaderboard'));
}

async function refreshPartnerData(){
  if(!S.partners||!S.partners.length) return;
  const deviceIds=S.partners.map(function(p){return p.peerId;}).filter(Boolean);
  if(!deviceIds.length) return;
  _partnersRefreshing=true;
  if(currentScreen==='leaderboard') renderLeaderboard(document.getElementById('screen-leaderboard'));
  try{
    const rows=await LeaderboardAPI.fetchByDeviceIds(deviceIds);

      const updated={};
      rows.forEach(function(r){updated[r.device_id]=r;});
      S.partners=S.partners.map(function(p){
        const fresh=p.peerId&&updated[p.peerId];
        if(fresh){
          return Object.assign({},p,{
            level:fresh.level||p.level,
            xp:fresh.xp||p.xp,
            rank:fresh.rank||p.rank,
            streak:fresh.streak||p.streak,
            name:fresh.name||p.name,
            avatar:fresh.avatar_b64||p.avatar,
            timestamp:Date.now()

        return p;
      });

    }

    console.warn('refreshPartnerData error:',e);

(function () {

  let sx = 0;
  let sy = 0;
  let locked = false;

  const THRESHOLD = 40;

  // Use SCREENS array directly
  function getScreenIds() {
    return SCREENS.map(s => s.id);
  }

  document.addEventListener('touchstart', e => {

    if (!e.touches.length) return;

    const t = e.touches[0];

    // Ignore swipe if touch starts inside a horizontally scrollable element
    // (analytics section bar, chart tab bar, nav, etc.)
    const target = e.target;
    const scrollable = target.closest('.an-sec-bar, .chart-tab-bar, nav, .bottom-nav, [data-no-swipe]');
    if (scrollable) { locked = true; return; }

    sx = t.clientX;
    sy = t.clientY;

    locked = false;

  }, { passive: true });

  document.addEventListener('touchmove', e => {

    if (locked) return;
    if (!e.touches.length) return;

    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;

    // Ignore vertical gestures
    if (Math.abs(dy) > Math.abs(dx)) return;

    // Ignore tiny movement
    if (Math.abs(dx) < THRESHOLD) return;

    locked = true;

    // Home intentionally disabled
    if (currentScreen === 'home') return;

    const SCREEN_IDS = getScreenIds();

    const ci = SCREEN_IDS.indexOf(currentScreen);

    if (ci === -1) return;

    // LEFT SWIPE
    if (
      dx < -THRESHOLD &&
      ci < SCREEN_IDS.length - 1
    ) {

      switchScreen(SCREEN_IDS[ci + 1]);

    }

    // RIGHT SWIPE
    else if (
      dx > THRESHOLD &&
      ci > 0
    ) {

      switchScreen(SCREEN_IDS[ci - 1]);

    }

    // RIGHT from first tab → home
    else if (
      dx > THRESHOLD &&
      ci === 0
    ) {

      switchScreen('home');

    }

  }, { passive: true });

})();

function getAnalyticsData(period){
  function localDs(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');}
  const days=[];
  const count=period==='7d'?7:period==='30d'?30:365;
  const step=period==='1y'?7:1;
  const isYear=period==='1y';
  const totalSlots=Math.ceil(count/step);
  for(let i=totalSlots-1;i>=0;i--){
    const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i*step);
    const ds=localDs(d);
    const label=period==='7d'?d.toLocaleDateString([],{weekday:'short'}):d.toLocaleDateString([],{month:'short',day:'numeric'});
    const slotDates=[];
    for(let j=0;j<step;j++){const dd=new Date(d);dd.setDate(dd.getDate()-j);slotDates.push(localDs(dd));}
    let cal=0,burned=0,waterL=0,study=0,habits=0;
    slotDates.forEach(function(dds){
      cal+=S.nutrition.entries.filter(e=>e.date===dds).reduce((a,e)=>a+(e.nutrients&&e.nutrients.cal||0),0);
      burned+=(S.burned||[]).filter(e=>e.date===dds).reduce((a,e)=>a+e.calories,0);
      waterL+=(S.water.entries||[]).filter(e=>e.date===dds).reduce((a,e)=>a+e.ml,0)/1000;
      study+=(S.study.sessions||[]).filter(s=>s.date===dds).reduce((a,b)=>a+b.duration,0);
      habits+=(S.habits||[]).filter(h=>h.completedDates&&h.completedDates.includes(dds)).length;
    });
    days.push({label,ds,slotDates,
      cal:Math.round(cal),
      burned:Math.round(burned),
      water:Math.round(waterL/step*10)/10,
      study:Math.round(study),
      habits:Math.round(habits/step*10)/10
    });
  }
  return days;
}

  return['#4a9eff','#f5a623','#00d4aa','#4cdb8a','#ff5a5a','#c084fc','#f472b6','#fb923c'];
}
function habitColor(i){const c=getHabitColors();return c[i%c.length];}
function miniCurve(dates,color){
  const today=new Date();
  const pts=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    pts.push(dates.includes(ds)?1:0);
  }
  // Build SVG polyline path
  const w=280,h=40,pad=4;
  const points=pts.map((v,i)=>{
    const x=pad+i*((w-2*pad)/13);
    const y=v===1?(h-pad-16):(h-pad);
    return`${x},${y}`;
  }).join(' ');
  // Smooth curve using bezier approximation
  let d2='';
  const coords=pts.map((v,i)=>({x:pad+i*((w-2*pad)/13),y:v===1?(h-pad-16):(h-pad)}));
  d2=`M ${coords[0].x},${coords[0].y}`;
  for(let i=1;i<coords.length;i++){
    const prev=coords[i-1],curr=coords[i];
    const cpx=(prev.x+curr.x)/2;
    d2+=` C ${cpx},${prev.y} ${cpx},${curr.y} ${curr.x},${curr.y}`;
  }
  // Fill area under curve
  const fillD=d2+` L ${coords[coords.length-1].x},${h} L ${coords[0].x},${h} Z`;
  return`<svg class="habit-curve" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="hg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
    </linearGradient></defs>
    <path d="${fillD}" fill="url(#hg${color.replace('#','')})" />
    <path d="${d2}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round"/>
    ${coords.map((c,i)=>pts[i]===1?`<circle cx="${c.x}" cy="${c.y}" r="3" fill="${color}" opacity="0.9"/>`:'').join('')}
  </svg>`;
}

function getAnalyticsSummary(data){
  const activeDays=data.filter(d=>d.cal>0||d.burned>0||d.water>0);
  const avgCal=activeDays.length?Math.round(activeDays.reduce((a,d)=>a+d.cal,0)/activeDays.length):0;
  const avgBurned=activeDays.length?Math.round(activeDays.reduce((a,d)=>a+d.burned,0)/activeDays.length):0;
  const totalDays=data.length;
  const loggedDays=data.filter(d=>d.cal>0).length;
  const consistency=totalDays?Math.round((loggedDays/totalDays)*100):0;
  const topStreak=(S.habits||[]).reduce((a,h)=>Math.max(a,h.streak||0),0);
  const calDays=data.filter(d=>d.cal>0);
  const bestCalDay=calDays.length?calDays.reduce((a,d)=>d.cal>a.cal?d:a,calDays[0]):null;
  return{avgCal,avgBurned,consistency,topStreak,bestCalDay};
}

function getMacroTotals(period){
  function localDs(date){return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');}
  const days=period==='7d'?7:period==='30d'?30:365;
  const dates=[];
  for(let i=0;i<days;i++){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);dates.push(localDs(d));}
  const entries=S.nutrition.entries.filter(e=>dates.includes(e.date));

    fat:Math.round(entries.reduce((a,e)=>a+(e.nutrients&&e.nutrients.fat||0),0))
  };
}

function getInsights(data){
  const ins=[];
  if(!data||!data.length)return ins;
  function localDs(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const last7=data.slice(-7);
  const last7WithCal=last7.filter(d=>d.cal>0);
  const avgCal=last7WithCal.length?Math.round(last7WithCal.reduce((a,d)=>a+d.cal,0)/last7WithCal.length):0;
  const avgWaterDays=last7.filter(d=>d.water>0);
  const avgWaterL=avgWaterDays.length?Math.round(avgWaterDays.reduce((a,d)=>a+d.water,0)/avgWaterDays.length*10)/10:0;
  const tdee=getTDEEfromProfile();
  const goalL=Math.round((S.water.dailyGoalMl||3000)/100)/10;

  if(avgCal>0&&avgCal<tdee*0.85)ins.push(`📉 Avg calories this week (${avgCal} kcal) are well below your TDEE — ensure this is intentional.`);
  else if(avgCal>tdee*1.15)ins.push(`⚠️ Avg calories this week (${avgCal} kcal) are above your maintenance. Adjust if cutting.`);
  else if(avgCal>0)ins.push(`✅ Calorie average this week (${avgCal} kcal) is close to your TDEE — well balanced.`);

  if(avgWaterL>0&&avgWaterL<goalL*0.7)ins.push(`💧 Avg hydration this week (${avgWaterL}L) is below your ${goalL}L goal. Try drinking a glass every 2 hours.`);
  else if(avgWaterL>=goalL)ins.push(`💧 Hydration on point! Averaging ${avgWaterL}L/day this week.`);

  const habits=S.habits||[];
  const topStreak=habits.reduce((a,h)=>Math.max(a,h.streak||0),0);
  const activeStreaks=habits.filter(h=>(h.streak||0)>=3);
  if(topStreak>=14)ins.push(`🔥 ${topStreak}-day streak! You're building a serious discipline engine.`);
  else if(topStreak>=7)ins.push(`🔥 ${topStreak}-day streak on your best habit. Keep the chain going.`);
  if(activeStreaks.length>=3)ins.push(`✦ ${activeStreaks.length} habits with 3+ day streaks. Momentum is building.`);

  const last7dates=[];for(let i=6;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);last7dates.push(localDs(d));}
  const workoutsThisWeek=new Set((S.workouts||[]).filter(w=>last7dates.includes(w.date)).map(w=>w.date)).size;
  if(workoutsThisWeek>=4)ins.push(`🏋️ ${workoutsThisWeek} active days this week — excellent consistency.`);
  else if(workoutsThisWeek===0&&last7WithCal.length>2)ins.push(`🏃 No workouts logged this week. Even a 20-min walk counts.`);

  const studyThisWeek=(S.study.sessions||[]).filter(s=>last7dates.includes(s.date)).reduce((a,b)=>a+b.duration,0);
  if(studyThisWeek>=300)ins.push(`📚 ${Math.round(studyThisWeek/60*10)/10}h of focused work this week — great output.`);

  const nut=todayNutrition();
  if(nut.protein>0&&nut.protein<(S.nutrition.dailyGoal.protein||150)*0.5)ins.push(`🥩 Protein low today (${nut.protein}g). Aim for ${S.nutrition.dailyGoal.protein||150}g daily.`);

  return ins;
}

function getTDEEfromProfile(){
  const pr=S.profile||{};
  if(!pr.heightCm||!pr.weightKg||!pr.age)return S.nutrition.dailyGoal.cal||2000;
  const bmr=calcBMR(pr.weightKg,pr.heightCm,pr.age,pr.gender||'male');
  return calcTDEE(bmr,pr.activityLevel||'moderate');
}
function getCalBalance(){
  const consumed=todayNutrition().cal;
  const burned=todayBurned();
  const tdee=getTDEEfromProfile();
  const net=consumed-burned;
  const diff=net-tdee;
  return{consumed,burned,tdee,net,diff,
    isDeficit:diff<0,
    label:diff<-50?'Deficit':diff>50?'Surplus':'Balanced'};
}

function exportData(){

  if(navigator.share){
    var file=new File([json],[filename],{type:'application/json'});
    navigator.share({files:[file],title:'ZenFit Backup',text:'ZenFit data backup'})
      .then(function(){showNotif('Backup shared!','OK');})
      .catch(function(e){
        // Share cancelled or files not supported - fall back to text share
        navigator.share({title:'ZenFit Backup '+getTodayStr(),text:json})
          .then(function(){showNotif('Data copied to share!','OK');})
          .catch(function(){exportFallback(json,filename);});
      });
  } else {
    exportFallback(json,filename);
  }
}
function exportFallback(json,filename){
  // Try clipboard
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(json).then(function(){
      showNotif('Backup copied to clipboard!','OK');
    }).catch(function(){exportDownload(json,filename);});

    exportDownload(json,filename);
  }
}

// ONLINE NUTRITION LOOKUP (Open Food Facts API)
// ════════════════════════════════════════════════════
async function fetchNutritionOnline(query){
  try{
    const r=await safeFetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&action=process&json=true&page_size=5`,
      {signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    const d=await r.json();
    const products=(d.products||[]).filter(p=>p.nutriments?.['energy-kcal_100g']>0);
    if(!products.length)return null;
    const p=products[0];
    const nm=p.nutriments;
    return{
      name:p.product_name||query,
      cal:Math.round(nm['energy-kcal_100g']||nm.energy_100g/4.18||0),
      prot:Math.round((nm.proteins_100g||0)*10)/10,
      carbs:Math.round((nm.carbohydrates_100g||0)*10)/10,
      fat:Math.round((nm.fat_100g||0)*10)/10,
      fiber:Math.round((nm.fiber_100g||0)*10)/10,
      brand:p.brands||'',
    };
  }catch(e){return null;}
}
async function lookupFoodOnline(){
  const q=document.getElementById('food-online-q')?.value?.trim();
  if(!q||q.length<2)return;
  const btn=document.getElementById('food-online-btn');
  if(btn)btn.textContent='Searching...';
  const result=await fetchNutritionOnline(q);
  if(btn)btn.textContent='Search';
  const resEl=document.getElementById('food-online-result');
  if(!resEl)return;
  if(!result){
    resEl.innerHTML='<div style="color:var(--danger);font-size:12px;padding:8px">Not found online. Try a more specific name.</div>';
    return;
  }
  resEl.innerHTML=`<div style="padding:10px;background:var(--bg-raised);border-radius:8px;margin-top:8px">
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">${escapeHtml(result.name)}${result.brand?` <span style="font-size:11px;color:var(--text-muted)">(${escapeHtml(result.brand)})</span>`:''}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px">
      <span style="color:var(--warning)">${result.cal} kcal</span>
      <span style="color:var(--info)">${result.prot}g protein</span>
      <span style="color:var(--success)">${result.carbs}g carbs</span>
      <span>Fat: ${result.fat}g</span>
    </div>
    <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="logOnlineFood(${JSON.stringify(result).replace(/"/g,'&quot;')})">Log to Nutrition</button>
  </div>`;
}
function logOnlineFood(food){
  const today=getTodayStr();
  S.nutrition.entries.push({
    id:Date.now(),name:food.name,date:today,mealType:'meal',
    nutrients:{cal:food.cal,protein:food.prot||food.protein||0,carbs:food.carbs,fat:food.fat,fiber:food.fiber||0}
  });
  persistSave();
  showNotif(`${food.name} logged — ${food.cal} kcal`,'OK');
  document.getElementById('food-online-result').innerHTML='<div style="color:var(--success);font-size:12px;padding:4px">Logged!</div>';
  var _nel=document.getElementById('screen-nutrition');if(_nel&&currentScreen==='nutrition')renderNutrition(_nel);else renderScreens();
}

let _stStart=Date.now();

  if(document.hidden){_stPaused=true;}

});
function getScreenTimeToday(){
  const today=getTodayStr();
  if(!S.screenTime) S.screenTime={};
  if(!S.screenTime[today]) S.screenTime[today]=0;
  return S.screenTime[today];
}
function addScreenTimeMinutes(mins){
  const today=getTodayStr();
  if(!S.screenTime) S.screenTime={};
  if(!S.screenTime[today]) S.screenTime[today]=0;
  S.screenTime[today]+=mins;
  persistSave();
  checkScreenTimeQuest();
}
function checkScreenTimeQuest(){
  const limit=S.screenTimeLimit||120; // default 2hr
  const today=getTodayStr();
  const used=getScreenTimeToday();
  if(used>limit){
    // Deduct XP penalty (once per day)
    const penaltyKey='st_penalty_'+today;
    if(!S[penaltyKey]){
      S[penaltyKey]=true;
      S.player.xp=Math.max(0,(S.player.xp||0)-50);
      persistSave();
      showNotif('Screen time limit exceeded! -50 XP','!');
    }
  }
}
// Log 1 minute of screen time every minute while app is open
setInterval(function(){
  if(!document.hidden){
    addScreenTimeMinutes(1);
  }
},60000);

function renderScreenTime(el){
  const today=getTodayStr();
  const limit=S.screenTimeLimit||120;
  const used=getScreenTimeToday();
  const pct=Math.min(100,Math.round(used/limit*100));
  const over=used>limit;
  const remaining=Math.max(0,limit-used);
  // Get last 7 days
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    days.push({label:d.toLocaleDateString([],{weekday:'short'}),mins:(S.screenTime||{})[ds]||0});
  }
  const maxMins=Math.max(...days.map(d=>d.mins),limit,1);

function uploadProfilePic(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){showNotif('Image too large — max 10MB','!');return;}
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        const MAX=200;
        let w=img.width,h=img.height;
        if(w>h){h=Math.round(h*(MAX/w));w=MAX;}else{w=Math.round(w*(MAX/h));h=MAX;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        S.profilePic=canvas.toDataURL('image/jpeg',0.8);
        persistSave();renderScreens();showNotif('Profile picture updated!','OK');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();
  setTimeout(function(){try{document.body.removeChild(inp);}catch(e){}},2000);
}

// ════════════════════════════════════════════════════
// P2P NETWORK via PeerJS + Share Codes
// ════════════════════════════════════════════════════
let peer=null, peerConnections={}, peerChatHistory={};

function getMyCard(){
  return {
    name:S.player.name||'Warrior',
    level:S.player.level||1,
    xp:S.player.xp||0,
    rank:calcRank(S.player),
    streak:(S.habits||[]).reduce(function(a,h){return a+(h.streak||0);},0),
    habits:S.habits.length,
    workouts:S.workouts?S.workouts.length:0,
    peerId:S.peerId||null,
    avatar:S.profilePic||null,
    timestamp:Date.now()
  };
}

function getShareCode(){
  const card=getMyCard();
  const json=JSON.stringify(card);
  return btoa(unescape(encodeURIComponent(json)));
}

function importPartnerCode(code){
  // Legacy alias — routes to the new request handshake
  return sendConnectRequest(code);
}

function sendConnectRequest(code){
  try{
    if(!code||!code.trim()){showNotif('Paste a share code first','!');return;}
    const json=decodeURIComponent(escape(atob(code.trim())));
    const card=JSON.parse(json);
    if(!card.name||!card.level){showNotif('Invalid share code','!');return;}
    if(!S.partners) S.partners=[];
    if(!S.sentRequests) S.sentRequests=[];
    if(!S.pendingRequests) S.pendingRequests=[];
    // Already a partner?
    if(S.partners.findIndex(function(p){return p.name===card.name;})>-1){
      showNotif(card.name+' is already in your leaderboard','!');return;
    }
    // Already pending (sent)?
    if(S.sentRequests.findIndex(function(p){return p.name===card.name;})>-1){
      showNotif('Request to '+card.name+' is already pending','!');return;
    }
    // Did this person already send US a request? Then accepting completes the handshake.
    const incomingIdx=S.pendingRequests.findIndex(function(p){return p.name===card.name;});
    if(incomingIdx>-1){
      acceptRequest(incomingIdx);
      return;
    }
    // Try live P2P first (sends a request, partner must accept)
    let sentLive=false;
    if(card.peerId && peer && !peer.destroyed){
      try{
        var conn=peer.connect(card.peerId,{reliable:true,metadata:{type:'connect_request'}});
        conn.on('open',function(){
          conn.send(JSON.stringify({type:'connect_request',data:getMyCard()}));
        });
        setupConn(conn);
        sentLive=true;
      }catch(e){}
    }
    // Always queue locally as a sent request so the offline path works too.
    S.sentRequests.push(Object.assign({},card,{ts:Date.now()}));
    persistSave();
    showNotif('Request sent to '+card.name+(sentLive?' (live)':' — they must accept'),'📨');
    renderScreens();
  }catch(e){showNotif('Invalid code: '+e.message,'!');}
}

function acceptRequest(i){
  if(!S.pendingRequests) S.pendingRequests=[];
  const req=S.pendingRequests[i];
  if(!req){showNotif('Request not found','!');return;}
  if(!S.partners) S.partners=[];
  // Add to my leaderboard
  const existing=S.partners.findIndex(function(p){return p.name===req.name;});
  const partnerCard=Object.assign({},req);
  delete partnerCard.ts;
  if(existing>-1) S.partners[existing]=partnerCard;
  else S.partners.push(partnerCard);
  // Remove from pending
  S.pendingRequests.splice(i,1);
  // Notify peer over live link if possible so they can register us too
  if(req.peerId && peerConnections[req.peerId] && peerConnections[req.peerId].open){
    try{ peerConnections[req.peerId].send(JSON.stringify({type:'connect_accept',data:getMyCard()})); }catch(e){}
  } else if(req.peerId && peer && !peer.destroyed){
    try{
      var conn=peer.connect(req.peerId,{reliable:true});
      conn.on('open',function(){
        conn.send(JSON.stringify({type:'connect_accept',data:getMyCard()}));
      });
      setupConn(conn);
    }catch(e){}
  }
  persistSave();
  showNotif(req.name+' is now in your leaderboard!','✅');
  renderScreens();
}

function rejectRequest(i){
  if(!S.pendingRequests) S.pendingRequests=[];
  const req=S.pendingRequests[i];
  if(!req) return;
  // Notify peer if live
  if(req.peerId && peerConnections[req.peerId] && peerConnections[req.peerId].open){
    try{ peerConnections[req.peerId].send(JSON.stringify({type:'connect_reject',name:S.player.name||'Warrior'})); }catch(e){}
  }
  S.pendingRequests.splice(i,1);
  persistSave();
  showNotif('Request from '+req.name+' rejected','OK');
  renderScreens();
}

function cancelSentRequest(i){
  if(!S.sentRequests) return;
  S.sentRequests.splice(i,1);
  persistSave();renderScreens();
}

function removePartner(i){
  if(i<0||!S.partners||!S.partners[i]) return;
  if(!confirm('Remove '+S.partners[i].name+' from your leaderboard?')) return;
  const removed=S.partners[i];
  S.partners.splice(i,1);
  if(S.partnerStats && removed && removed.name) delete S.partnerStats[removed.name];
  persistSave();renderScreens();
}

// PeerJS for real-time (loads dynamically)
function initPeerJS(){
  if(typeof Peer==='undefined'){
    var script=document.createElement('script');
    script.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
    script.onload=function(){startPeer();};
    document.head.appendChild(script);
  } else {startPeer();}
}
function startPeer(){
  if(peer&&!peer.destroyed) return;
  // Generate stable peer ID from device fingerprint (survives data resets!)
  const deviceId=getDeviceId(); // Format: zenfit-user-xxxxxxxx
  const pid=deviceId;
  S.peerId=pid; persistSave();
  peer=new Peer(pid,{debug:0});
  peer.on('open',function(id){
    S.peerId=id;persistSave();
    showNotif('Connected! Your ID: '+id,'OK');
    renderScreens();
  });
  peer.on('connection',function(conn){
    setupConn(conn);
  });
  peer.on('error',function(err){
    showNotif('P2P error: '+err.type,'!');
  });
}
function setupConn(conn){
  conn.on('open',function(){
    peerConnections[conn.peer]=conn;
    // Channel is open. We do NOT auto-share our card now — that would bypass the
    // accept/reject handshake. The initiator sends an explicit connect_request,
    // and only after acceptance do both sides exchange cards.
    showNotif(conn.peer.split('-')[1]+' channel open','OK');
    renderScreens();
  });
  conn.on('data',function(raw){
    try{
      var msg=JSON.parse(raw);
      if(msg.type==='connect_request'){
        // Incoming connection request — queue for user to accept/reject
        if(!S.pendingRequests) S.pendingRequests=[];
        var c=msg.data||{};
        c.peerId=conn.peer;
        var dup=S.pendingRequests.findIndex(function(p){return p.name===c.name;});
        if(dup>-1) S.pendingRequests[dup]=Object.assign({},c,{ts:Date.now()});
        else S.pendingRequests.push(Object.assign({},c,{ts:Date.now()}));
        // Already a partner? Auto-accept silently.
        if((S.partners||[]).findIndex(function(p){return p.name===c.name;})>-1){
          var idx=S.pendingRequests.findIndex(function(p){return p.name===c.name;});
          if(idx>-1) acceptRequest(idx);
        } else {
          persistSave();
          showNotif(c.name+' wants to connect — check Leaderboard','🔔');
          renderScreens();
        }
      } else if(msg.type==='connect_accept'){
        // Our request was accepted — add them as a partner and clear sent queue
        var card=msg.data||{};
        card.peerId=conn.peer;
        if(!S.partners) S.partners=[];
        var pIdx=S.partners.findIndex(function(p){return p.name===card.name;});
        if(pIdx>-1) S.partners[pIdx]=card;
        else S.partners.push(card);
        if(S.sentRequests){
          var sIdx=S.sentRequests.findIndex(function(p){return p.name===card.name;});
          if(sIdx>-1) S.sentRequests.splice(sIdx,1);
        }
        persistSave();
        showNotif(card.name+' accepted your request!','✅');
        renderScreens();
      } else if(msg.type==='connect_reject'){
        // Remove from sent
        if(S.sentRequests){
          var rIdx=S.sentRequests.findIndex(function(p){return p.name===msg.name;});
          if(rIdx>-1) S.sentRequests.splice(rIdx,1);
        }
        persistSave();
        showNotif((msg.name||'Request')+' declined your connection','!');
        renderScreens();
      } else if(msg.type==='card'){
        // Legacy: only refresh card if already a partner
        if((S.partners||[]).findIndex(function(p){return p.name===msg.data.name;})>-1){
          importFromPeer(conn.peer,msg.data);
        }
      } else if(msg.type==='chat'){
        if(!peerChatHistory[conn.peer]) peerChatHistory[conn.peer]=[];
        peerChatHistory[conn.peer].push({from:msg.name,text:msg.text,ts:Date.now(),mine:false});
        // Auto-expire after 24h
        peerChatHistory[conn.peer]=peerChatHistory[conn.peer].filter(function(m){return Date.now()-m.ts<86400000;});
        showNotif(msg.name+': '+msg.text.slice(0,40),'OK');
        if(currentScreen==='leaderboard') renderScreens();
      } else if(msg.type==='request_public_stats'){
        // Send only the limited public card (no logs)
        conn.send(JSON.stringify({type:'public_stats',data:getMyCard()}));
      } else if(msg.type==='public_stats'){
        // Refresh that partner's public card
        var pc=msg.data||{};
        pc.peerId=conn.peer;
        if(!S.partners) S.partners=[];
        var pi=S.partners.findIndex(function(p){return p.name===pc.name;});
        if(pi>-1){ S.partners[pi]=pc; persistSave(); renderScreens(); }
      } else if(msg.type==='highfive'){
        showNotif('✋ '+msg.name+' sent you a high five!','OK');
        if(!S.partnerStats) S.partnerStats={};
        if(!S.partnerStats[msg.name]) S.partnerStats[msg.name]={};
        S.partnerStats[msg.name].highFivesReceived=(S.partnerStats[msg.name].highFivesReceived||0)+1;
        persistSave();
        if(currentScreen==='leaderboard') renderScreens();
      } else if(msg.type==='challenge_invite'){
        var ci=msg.data||{};
        if(!S.challenges) S.challenges=[];
        var exists=S.challenges.some(function(ch){return ch.id===ci.id;});
        if(!exists){
          var dur=ci.durationDays||7;
          S.challenges.push({
            id:ci.id,
            type:ci.type||'workouts',
            title:ci.title||'Challenge',
            desc:ci.desc||'',
            durationDays:dur,
            createdBy:conn.peer||'',
            participants:[{peerId:ci.deviceId||conn.peer,name:ci.createdBy||'Partner',progress:0},{peerId:S.deviceId,name:S.player.name||'You',progress:0}],
            startsAt:Date.now(),
            endsAt:Date.now()+dur*86400000,
            status:'active',
            winnerId:null
          });
          persistSave();
          showNotif('⚔️ '+ci.createdBy+' invited you to "'+ci.title+'" ('+dur+' days)!','OK');
          if(currentScreen==='leaderboard'){_lbTab='challenges';renderLeaderboard(document.getElementById('screen-leaderboard'));}
        }
      } else if(msg.type==='challenge_progress'){
        handleChallengeProgress(msg.data);
      } else if(msg.type==='request_detail'){
        // Only honour detail requests from accepted partners
        var fromName=(msg.from||'');
        var allowed=(S.partners||[]).some(function(p){return p.peerId===conn.peer || p.name===fromName;});
        if(allowed) conn.send(JSON.stringify({type:'detail',data:getDetailedCard()}));
        else conn.send(JSON.stringify({type:'public_stats',data:getMyCard()}));
      }
    }catch(e){}
  });
  conn.on('close',function(){
    delete peerConnections[conn.peer];
    renderScreens();
  });
}
function connectToPeer(peerId){
  if(!peer){showNotif('Start P2P first','!');return;}
  if(!peerId||peerId.trim().length<4){showNotif('Enter a valid Peer ID','!');return;}
  var pid=peerId.trim();
  // Already a partner? Just open a chat channel.
  var alreadyPartner=(S.partners||[]).some(function(p){return p.peerId===pid;});
  var conn=peer.connect(pid,{reliable:true});
  setupConn(conn);
  if(!alreadyPartner){
    // Send a proper connect request the receiver must accept.
    conn.on('open',function(){
      try{ conn.send(JSON.stringify({type:'connect_request',data:getMyCard()})); }catch(e){}
      // Mirror it locally as a sent request
      if(!S.sentRequests) S.sentRequests=[];
      var card=getMyCard();
      // We don't know the receiver's name yet — use the peer ID as placeholder
      var displayName=pid.split('-').slice(1).join('-')||pid;
      if(S.sentRequests.findIndex(function(p){return p.peerId===pid;})===-1){
        S.sentRequests.push({name:displayName,level:'?',xp:0,peerId:pid,ts:Date.now()});
      }
      persistSave();
      showNotif('Connection request sent to '+displayName,'📨');
      renderScreens();
    });
  }
}
function importFromPeer(peerId,card){
  if(!S.partners) S.partners=[];
  card.peerId=peerId;
  var idx=S.partners.findIndex(function(p){return p.peerId===peerId||p.name===card.name;});
  if(idx>-1) S.partners[idx]=card;
  else S.partners.push(card);
  persistSave();renderScreens();
}
function sendChat(peerId,text){
  var conn=peerConnections[peerId];
  if(!conn||!conn.open){showNotif('Not connected to this partner','!');return;}
  if(!peerChatHistory[peerId]) peerChatHistory[peerId]=[];
  peerChatHistory[peerId].push({from:'You',text:text,ts:Date.now(),mine:true});
  // Expire 24h
  peerChatHistory[peerId]=peerChatHistory[peerId].filter(function(m){return Date.now()-m.ts<86400000;});
  conn.send(JSON.stringify({type:'chat',name:S.player.name||'Warrior',text:text}));
  renderScreens();
}
function requestDetail(peerId){
  var conn=peerConnections[peerId];
  if(conn&&conn.open) conn.send(JSON.stringify({type:'request_detail'}));
  else showNotif('Not connected live — view their shared card','!');
}
function sendHighFive(peerId){
  var conn=peerConnections[peerId];
  if(!conn||!conn.open){showNotif('Not connected to this partner','!');return;}
  conn.send(JSON.stringify({type:'highfive',name:S.player.name||'Warrior'}));
  showNotif('✋ High five sent!','OK');
  if(!S.partnerStats) S.partnerStats={};
  var pn=(S.partners||[]).find(function(p){return p.peerId===peerId;});
  if(pn){
    if(!S.partnerStats[pn.name]) S.partnerStats[pn.name]={};
    S.partnerStats[pn.name].highFivesSent=(S.partnerStats[pn.name].highFivesSent||0)+1;
    persistSave();
  }
}
function getDetailedCard(){
  return Object.assign(getMyCard(),{
    todayCalories:todayNutrition().cal,
    todayWaterMl:todayWater(),
    todayBurned:todayBurned(),
    habitsToday:(S.habits||[]).filter(function(h){return h.completedDates&&h.completedDates.includes(getTodayStr());}).length,
    totalHabits:S.habits.length,
    studyToday:(S.study.sessions||[]).filter(function(s){return s.date===getTodayStr();}).reduce(function(a,s){return a+s.duration;},0),
  });
}

// IMPORT DATA - works on both browser and Android
// ════════════════════════════════════════════════════
function importData(){
  // Try to use a persistent hidden input (more reliable on iOS/browser)
  var existing=document.getElementById('zenfit-import-inp');
  if(existing){existing.click();return;}
  // Create fresh input each time as fallback
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json,application/json,text/plain';
  inp.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px';
  inp.id='zenfit-import-inp';
  inp.onchange=function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var text=ev.target.result;
        var imported=JSON.parse(text);
        if(!imported.player||!imported.nutrition){
          showNotif('Invalid backup file','!');
          return;
        }
        // Deep merge - preserve new keys, restore old data
        S=Object.assign({},S,imported);
        // CRITICAL: restore the device ID from backup so friends + leaderboard still work
        if(imported.deviceId){
          localStorage.setItem(STORAGE_KEYS.DEVICE_ID, imported.deviceId);
          S.deviceId=imported.deviceId;
        }
        persistSave();
        renderScreens();
        showNotif('Data restored! Welcome back, '+imported.player.name+'!','OK');
      }catch(err){
        showNotif('Import failed: '+err.message,'!');
      }
      // Reset input so same file can be imported again
      inp.value='';
    };
    reader.onerror=function(){showNotif('Could not read file','!');};
    reader.readAsText(file);
  };
  document.body.appendChild(inp);
  inp.click();
}

// TASKS SYSTEM
// ════════════════════════════════════════════════════
const TASK_XP={easy:30,medium:70,hard:130,extreme:220};
const TASK_XP_LOSS={easy:15,medium:35,hard:65,extreme:110};
const TASK_DIFF_LABELS={easy:'Easy',medium:'Medium',hard:'Hard',extreme:'Extreme'};
const TASK_DIFF_COLORS={easy:'#4cdb8a',medium:'#f5a623',hard:'#ff5a5a',extreme:'#c084fc'};

function getTasksDueToday(){
  var today=getTodayStr();
  var todayDate=new Date();
  var dow=todayDate.getDay();
  return (S.tasks||[]).filter(function(t){
    if(t.completedAt){var age=Date.now()-t.completedAt;if(age<86400000)return false;}
    var repeat=t.repeat||'once';
    if(repeat==='once') return t.createdDate===today||(!t.createdDate);
    if(repeat==='daily') return true;
    if(repeat==='weekdays') return dow>=1&&dow<=5;
    if(repeat==='altdays'){
      if(!t.createdDate) return true;
      var start=new Date(t.createdDate);
      var diff=Math.floor((todayDate-start)/(1000*60*60*24));
      return diff%2===0;
    }
    if(repeat==='mon_sat') return dow>=1&&dow<=6;
    if(repeat==='custom'&&t.customDays&&t.customDays.length){return t.customDays.includes(dow);}
    return true;
  });
}

function checkOverdueTasks(){
  var today=getTodayStr();
  var now=Date.now();
  var due=getTasksDueToday();
  (S.tasks||[]).forEach(function(t){
    if(t.overdueCharged) return;
    if(t.completedAt) return;
    if(!t.deadlineTs) return;
    var isDue=due.find(function(x){return x.id===t.id;});
    if(!isDue) return;
    if(now>t.deadlineTs){
      t.overdueCharged=true;
      var loss=TASK_XP_LOSS[t.difficulty]||35;
      S.player.xp=Math.max(0,S.player.xp-loss);
      persistSave();
      showNotif('[ DISCIPLINE PENALTY ] -'+loss+' XP — "'+t.title+'" overdue','⚠️');
    }
  });
  (S.tasks||[]).forEach(function(t){
    if(t.repeat&&t.repeat!=='once'&&t.lastResetDate!==today){
      t.overdueCharged=false;t.completedAt=null;t.lastResetDate=today;
      if(t.allocatedHours){var midnight=new Date();midnight.setHours(0,0,0,0);t.deadlineTs=midnight.getTime()+(t.allocatedHours*3600000);}
    }
  });
}

function addTask(){
  var title=(document.getElementById('task-title')||{}).value||'';
  if(!title.trim()){showNotif('Enter a task name','!');return;}
  var diff=(document.getElementById('task-diff')||{}).value||'medium';
  var hours=parseFloat((document.getElementById('task-hours')||{}).value||0)||0;
  var repeat=(document.getElementById('task-repeat')||{}).value||'once';
  var customDays=[];
  if(repeat==='custom'){
    [0,1,2,3,4,5,6].forEach(function(d){var cb=document.getElementById('task-day-'+d);if(cb&&cb.checked)customDays.push(d);});
  }
  var today=getTodayStr();
  var now=Date.now();
  var deadlineTs=null;
  if(hours>0){var midnight=new Date();midnight.setHours(0,0,0,0);deadlineTs=midnight.getTime()+(hours*3600000);if(deadlineTs<now)deadlineTs=now+(hours*3600000);}
  var task={id:'t'+now,title:title.trim(),difficulty:diff,allocatedHours:hours,deadlineTs:deadlineTs,repeat:repeat,customDays:customDays,createdDate:today,completedAt:null,overdueCharged:false,lastResetDate:today,createdTs:now};
  if(!S.tasks) S.tasks=[];
  S.tasks.push(task);persistSave();
  showNotif('[ TASK ADDED ] "'+task.title+'"','⚔️');
  scheduleTaskReminder(task);
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function completeTask(taskId){
  var t=(S.tasks||[]).find(function(x){return x.id===taskId;});
  if(!t)return;
  if(t.completedAt&&Date.now()-t.completedAt<86400000){showNotif('Already completed!','✓');return;}
  var now=Date.now();
  var overdue=t.deadlineTs&&now>t.deadlineTs;
  t.completedAt=now;t.overdueCharged=false;
  var xpEarned=overdue?Math.floor(TASK_XP[t.difficulty]*0.5):TASK_XP[t.difficulty];
  addXP(xpEarned,'Task: '+t.title);updStat('discipline',overdue?1:3);persistSave();
  if(overdue)showNotif('[ TASK COMPLETE ] Late — +'+xpEarned+' XP (half reward)','⚡');
  else showNotif('[ TASK COMPLETE ] +'+xpEarned+' XP — Discipline +3','⚔️');
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function deleteTask(taskId){
  S.tasks=(S.tasks||[]).filter(function(t){return t.id!==taskId;});
  persistSave();
  var el=document.getElementById('screen-tasks');
  if(el&&currentScreen==='tasks')renderTasks(el);else renderScreens();
}

function toggleCustomDays(){
  var sel=document.getElementById('task-repeat');
  var box=document.getElementById('task-custom-days');
  if(sel&&box)box.style.display=sel.value==='custom'?'block':'none';
}

function renderTasks(el){
  checkOverdueTasks();
  var now=Date.now();
  var dueTasks=getTasksDueToday();
  var allTasks=S.tasks||[];
  var completedToday=dueTasks.filter(function(t){return t.completedAt&&now-t.completedAt<86400000;}).length;
  var pendingCount=dueTasks.filter(function(t){return !t.completedAt||now-t.completedAt>=86400000;}).length;
  var overdueCount=dueTasks.filter(function(t){return !t.completedAt&&t.deadlineTs&&now>t.deadlineTs;}).length;

  function timeLeft(t){
    if(!t.deadlineTs)return '';
    var diff=t.deadlineTs-now;
    if(diff<=0)return '<span class="task-timer-badge task-timer-over">⏰ OVERDUE</span>';
    var h=Math.floor(diff/3600000);var m=Math.floor((diff%3600000)/60000);
    var cls=diff<3600000?'task-timer-warn':'task-timer-ok';
    return '<span class="task-timer-badge '+cls+'">⏱ '+(h>0?h+'h ':'')+m+'m left</span>';
  }
  function repeatLabel(t){
    if(!t.repeat||t.repeat==='once')return '';
    var labels={daily:'Daily',weekdays:'Weekdays',altdays:'Alt Days',mon_sat:'Mon–Sat',custom:'Custom'};
    return '<span class="task-repeat-badge">🔁 '+(labels[t.repeat]||t.repeat)+'</span>';
  }

  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var taskRows=dueTasks.map(function(t){
    var isDone=t.completedAt&&now-t.completedAt<86400000;
    var isOverdue=!isDone&&t.deadlineTs&&now>t.deadlineTs;
    var dc=TASK_DIFF_COLORS[t.difficulty]||'var(--text-secondary)';
    return '<div class="task-card task-diff-'+t.difficulty+(isDone?' task-completed':isOverdue?' task-overdue':'')+'">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">'+
        '<div style="display:flex;align-items:flex-start;gap:8px;flex:1">'+
          '<div class="task-check'+(isDone?' done':'')+'" onclick="'+(isDone?'':'completeTask(\''+t.id+'\')')+'" style="margin-top:2px">'+
            (isDone?'✓':'')+'</div>'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;font-weight:600;color:'+(isDone?'var(--text-muted)':'var(--text-primary)')+(isDone?';text-decoration:line-through':'')+'">'+(isDone?'<span style="color:var(--success);margin-right:4px">✓</span>':'')+t.title+'</div>'+
            '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">'+
              '<span class="badge" style="background:'+dc+'22;color:'+dc+';border:1px solid '+dc+'44">'+TASK_DIFF_LABELS[t.difficulty]+'</span>'+
              (isDone?'<span class="badge badge-green">+'+TASK_XP[t.difficulty]+' XP</span>':'')+
              timeLeft(t)+repeatLabel(t)+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-shrink:0">'+
          (!isDone?'<button class="btn btn-sm btn-green" onclick="completeTask(\''+t.id+'\')" style="padding:5px 10px">✓</button>':'')+
          '<button class="btn btn-icon btn-sm" onclick="deleteTask(\''+t.id+'\')" style="color:var(--danger)">×</button>'+
        '</div>'+
      '</div>'+
      (t.allocatedHours&&!isDone?'<div style="font-size:11px;color:var(--text-muted);padding-left:30px">⏰ '+t.allocatedHours+'h window — miss: -'+TASK_XP_LOSS[t.difficulty]+' XP</div>':'')+
    '</div>';
  }).join('');

  var otherRepeat=allTasks.filter(function(t){return !dueTasks.find(function(x){return x.id===t.id;})&&t.repeat&&t.repeat!=='once';});
  var otherRows=otherRepeat.length?
    '<div class="section-title" style="margin-top:16px">Repeating (other days)</div>'+
    otherRepeat.map(function(t){
      var dc=TASK_DIFF_COLORS[t.difficulty]||'var(--text-secondary)';
