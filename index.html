*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--bg4:#21263a;
  --border:#2a3050;--border2:#3a4470;
  --text:#e8ecf8;--text2:#8a94b8;--text3:#5a6480;
  --purple:#7c6fff;--purple2:#5a4fe0;--purple3:#3a30a0;
  --teal:#00c8ff88;--amber:#f5a623;--red:#ff5a5a;--green:#4cdb8a;--blue:#4a9eff;--pink:#f472b6;
  --rank-e:#888;--rank-d:#4cdb8a;--rank-c:#4a9eff;--rank-b:#c084fc;--rank-a:#f5a623;--rank-s:#ff5a5a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:1100px;margin:0 auto;padding:0 12px}
nav{display:flex;gap:2px;padding:4px 8px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;background:#12141f;height:40px;align-items:center;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-btn{background:none;border:none;color:var(--text2);padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .2s;display:inline-flex;align-items:center;gap:4px;height:30px;vertical-align:middle;line-height:1}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--purple3);color:var(--purple);font-weight:500}
.screen{display:none;padding:16px 0 60px;animation:fadeIn .2s}
.screen.active{display:block}
.aw-home{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.aw-wrap{position:relative;width:380px;height:380px}
.aw-center{position:absolute;top:50%;left:50%;width:148px;height:148px;margin-top:-74px;margin-left:-74px;border-radius:50%;border:3px solid var(--purple);cursor:pointer;z-index:20;background:radial-gradient(circle at 35% 35%,#4a3a6a,#1a1030);box-shadow:0 0 36px rgba(124,111,255,.45),0 0 72px rgba(124,111,255,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease}
.aw-center:hover{transform:scale(1.1);box-shadow:0 0 54px rgba(124,111,255,.7),0 0 100px rgba(124,111,255,.3)}
.aw-ci{font-size:52px;line-height:1;filter:drop-shadow(0 0 8px rgba(124,111,255,.6))}
.aw-cl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text)}
.aw-orb{position:absolute;width:112px;height:112px;border-radius:50%;border:2px solid;cursor:pointer;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.5;filter:grayscale(65%) brightness(.85);transition:opacity .45s cubic-bezier(.34,1.56,.64,1),filter .45s ease,transform .45s cubic-bezier(.34,1.56,.64,1),box-shadow .45s ease}
.aw-orb:hover{opacity:1;filter:grayscale(0%) brightness(1.05);z-index:30}
.aw-oi{font-size:28px;transition:transform .3s ease,filter .3s ease;line-height:1}
.aw-orb:hover .aw-oi{transform:scale(1.22) translateY(-2px)}
.aw-ol{font-size:9.5px;font-weight:600;text-align:center;color:var(--text2);transition:color .3s;letter-spacing:.4px}
.aw-orb:hover .aw-ol{color:var(--text)}
.aw-o0{--oc:#4a9eff;border-color:#4a9eff;background:radial-gradient(circle at 35% 35%,#0d2a4d,#050f1a);left:50%;top:0;transform:translate(-50%,0%)}
.aw-o0:hover{transform:translate(-50%,-8px) scale(1.18);box-shadow:0 0 28px #4a9eff66}
.aw-o1{--oc:#f5a623;border-color:#f5a623;background:radial-gradient(circle at 35% 35%,#3d2000,#150a00);right:0;top:25%;transform:translate(0%,-50%)}
.aw-o1:hover{transform:translate(8px,-50%) scale(1.18);box-shadow:0 0 28px #f5a62366}
.aw-o2{--oc:#00d4aa;border-color:#00d4aa;background:radial-gradient(circle at 35% 35%,#053d2a,#011510);right:0;bottom:25%;transform:translate(0%,50%)}
.aw-o2:hover{transform:translate(8px,50%) scale(1.18);box-shadow:0 0 28px #00d4aa66}
.aw-o3{--oc:#4cdb8a;border-color:#4cdb8a;background:radial-gradient(circle at 35% 35%,#0a3d1a,#02100a);left:50%;bottom:0;transform:translate(-50%,0%)}
.aw-o3:hover{transform:translate(-50%,8px) scale(1.18);box-shadow:0 0 28px #4cdb8a66}
.aw-o4{--oc:#ff5a5a;border-color:#ff5a5a;background:radial-gradient(circle at 35% 35%,#3d0a0a,#150303);left:0;bottom:25%;transform:translate(0%,50%)}
.aw-o4:hover{transform:translate(-8px,50%) scale(1.18);box-shadow:0 0 28px #ff5a5a66}
.aw-o5{--oc:#c084fc;border-color:#c084fc;background:radial-gradient(circle at 35% 35%,#2a1050,#0d0520);left:0;top:25%;transform:translate(0%,-50%)}
.aw-o5:hover{transform:translate(-8px,-50%) scale(1.18);box-shadow:0 0 28px #c084fc66}
@keyframes awPulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(1.55);opacity:0}}
.aw-pulse{position:absolute;top:50%;left:50%;width:148px;height:148px;margin-top:-74px;margin-left:-74px;border-radius:50%;border:2px solid var(--purple);animation:awPulse 2.4s ease-out infinite;pointer-events:none;z-index:1}
@media(max-width:500px){.aw-wrap{width:300px;height:300px}.aw-center{width:118px;height:118px;margin-top:-59px;margin-left:-59px}.aw-orb{width:90px;height:90px}.aw-oi{font-size:22px}.aw-ol{font-size:8px}.aw-ci{font-size:40px}.aw-pulse{width:118px;height:118px;margin-top:-59px;margin-left:-59px}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.section-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-purple{background:#3a30a0;color:#c4bfff}.badge-green{background:#0a3d22;color:#4cdb8a}
.badge-amber{background:#3d2800;color:#f5a623}.badge-red{background:#3d0a0a;color:#ff7a7a}
.badge-blue{background:#0a2a4d;color:#4a9eff}.badge-teal{background:#003d2a;color:#00d4aa}
.xp-bar-wrap{background:var(--bg4);border-radius:20px;height:8px;overflow:hidden;margin:4px 0}
.xp-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--purple2),var(--purple));transition:width .6s ease}
.stat-bar-wrap{background:var(--bg4);border-radius:4px;height:6px;overflow:hidden}
.stat-bar{height:100%;border-radius:4px;transition:width .5s}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.btn:hover{background:var(--bg4);border-color:var(--purple)}
.btn-primary{background:var(--purple2);border-color:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple);transform:translateY(-1px)}
.btn-danger{background:#3d0a0a;border-color:var(--red);color:var(--red)}
.btn-green{background:#0a3d22;border-color:var(--green);color:var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px}
.btn-full{width:100%}
input[type=text],input[type=number],select,textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:50px}
.rank-badge{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border:2px solid}
.quest-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.quest-card.done{opacity:.5;border-color:var(--green)}
.quest-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quest-check.done{background:var(--green);border-color:var(--green);color:#000}
.notif{position:fixed;top:16px;right:16px;background:var(--bg2);border:1px solid var(--purple);border-radius:10px;padding:12px 16px;font-size:13px;z-index:9999;animation:slideIn .3s ease;max-width:280px;pointer-events:none}
@keyframes slideIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
.overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:center;justify-content:center;z-index:9998}
.overlay-box{background:var(--bg2);border:2px solid var(--purple);border-radius:16px;padding:28px;text-align:center;animation:popIn .4s ease;max-width:360px;width:90%}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.grade{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.grade-A{background:#0a3d22;color:#4cdb8a}.grade-B{background:#0a2a4d;color:#4a9eff}
.grade-C{background:#3d2800;color:#f5a623}.grade-D{background:#3d1a00;color:#ff8c42}.grade-E{background:#3d0a0a;color:#ff5a5a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--bg3);border:1px solid var(--border)}
.cal-day.done{background:#0a3d22;border-color:#1a6d3a;color:#4cdb8a}
.cal-day.today{border-color:var(--purple);color:var(--purple)}
.insight{background:var(--bg3);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:8px}
.bottle-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.bottle{width:50px;height:100px;border:2px solid var(--border2);border-radius:0 0 14px 14px;overflow:hidden;position:relative;background:var(--bg4)}
.bottle-top{width:26px;height:10px;background:var(--border2);border-radius:4px 4px 0 0;margin-bottom:-1px}
.bottle-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#00c8ff88, #0088ff);transition:height .8s ease;border-radius:0 0 12px 12px}
.bonus-card{background:var(--bg3);border:1px solid var(--amber);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.bonus-card.done{opacity:.4;border-color:var(--border)}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
/* TIMER */
.timer-ring{transform:rotate(-90deg)}
.timer-display{font-size:42px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:2px}
/* CHARACTER */
.char-wrap{position:relative;width:140px;height:200px;margin:0 auto}
/* CHARACTER CARD NEW */
/* CHARACTER CARD */
.char-card-box{border-radius:14px;border:1px solid var(--border);background:var(--bg2);overflow:hidden;padding:0}
.char-top-row{display:grid;grid-template-columns:1fr 1.4fr}
.char-avatar-col{background:var(--bg3);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:0px 0px 0px}
.char-panel-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;text-align:center}
.char-avatar-frame{position:relative;width:100%;max-width:250px;aspect-ratio:480/853;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg4);cursor:pointer;flex-shrink:0}
#charAvatarImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:filter .3s}
@keyframes avatarGlow{0%,100%{filter:drop-shadow(0 0 8px var(--purple))}50%{filter:drop-shadow(0 0 22px var(--purple)) brightness(1.15)}}
.avatar-acting #charAvatarImg{animation:avatarGlow .6s ease}
.char-name-block{margin-top:12px;text-align:center}
.char-name-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.char-rank-sub{font-size:11px;color:var(--text3);margin-top:3px}
.char-class-sub{font-size:11px;color:var(--text3);margin-top:1px}
.char-stats-col{background:var(--bg2);display:flex;flex-direction:column;padding:16px 18px}
.char-stat-bar-wrap{background:var(--bg4);border-radius:4px;height:5px;margin-top:4px;overflow:hidden}
.char-stat-bar-fill{height:100%;border-radius:4px}
.char-bottom-row{border-top:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.char-evo-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;width:100%}
.char-evo-step{background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:6px 4px;text-align:center;opacity:.32;transition:all .3s;min-width:0;overflow:hidden}
.char-evo-step.evo-past{opacity:.42}
.char-evo-step.evo-current{opacity:1;background:var(--bg3)}
.char-evo-rank{font-size:13px;font-weight:700;line-height:1;margin-bottom:3px;white-space:nowrap}
.char-evo-name{font-size:8px;color:var(--text3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* PLAN CARD */
.plan-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@media(max-width:600px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}

/*  ZENFIT ENHANCEMENTS  */
:root {
  --h0:#4a9eff; --h1:#f5a623; --h2:#00d4aa; --h3:#4cdb8a;
  --h4:#ff5a5a; --h5:#c084fc; --h6:#f472b6; --h7:#fb923c;
}
.habit-curve {width:100%;height:48px;margin-top:8px;overflow:visible}
.habit-card-0{border-left:3px solid var(--h0)!important}
.habit-card-1{border-left:3px solid var(--h1)!important}
.habit-card-2{border-left:3px solid var(--h2)!important}
.habit-card-3{border-left:3px solid var(--h3)!important}
.habit-card-4{border-left:3px solid var(--h4)!important}
.habit-card-5{border-left:3px solid var(--h5)!important}
.habit-card-6{border-left:3px solid var(--h6)!important}
.habit-card-7{border-left:3px solid var(--h7)!important}
#screens{touch-action:pan-y;user-select:none;-webkit-user-select:none}
.swipe-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#ffffff15;color:var(--text3);font-size:11px;padding:5px 14px;border-radius:20px;pointer-events:none;z-index:500;backdrop-filter:blur(4px);transition:opacity .4s}
.zf-logo{width:72px;height:72px;object-fit:contain;border-radius:50%;margin-bottom:2px}
.chart-tab-bar{display:flex;gap:4px;margin-bottom:12px;background:var(--bg3);border-radius:10px;padding:4px}
.chart-tab{flex:1;text-align:center;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .2s}
.chart-tab.active{background:var(--purple2);color:#fff}
.cal-balance-banner{border-radius:14px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.cal-balance-banner.deficit{background:linear-gradient(135deg,#0a3d22,#0d1f10);border:1px solid #4cdb8a44}
.cal-balance-banner.surplus{background:linear-gradient(135deg,#3d1500,#1f0e00);border:1px solid #f5a62344}
.cal-balance-banner.balanced{background:linear-gradient(135deg,#0a2a4d,#050f1a);border:1px solid #4a9eff44}

.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;border-radius:10px;transition:all .2s;min-width:0}
.bottom-nav-item.active .bni-icon{color:var(--purple);transform:translateY(-2px)}

/* TUTORIAL SYSTEM */
.tutorial-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.88);

  z-index: 999999;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 16px;

  animation: fadeInOverlay 0.3s ease;

  overflow-y: auto;
}

@keyframes fadeInOverlay {
  from { opacity: 0; backdrop-filter: blur(0px); }
  to { opacity: 1; backdrop-filter: blur(6px); }
}

.tutorial-card {
  background: linear-gradient(135deg, #13161e 0%, #1a1e2a 100%);
  border: 2px solid #7c6fff;
  border-radius: 16px;
  padding: 0;
  max-width: 420px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8),
              0 0 40px rgba(124, 111, 255, 0.3);
  animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tutorial-progress {
  height: 4px;
  background: var(--bg4);
  border-radius: 4px 4px 0 0;
  overflow: hidden;
}

.tutorial-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #7c6fff, #4a9eff);
  transition: width 0.6s ease;
  border-radius: 4px;
}

.tutorial-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.tutorial-icon {
  font-size: 36px;
  line-height: 1;
  flex-shrink: 0;
}

.tutorial-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.tutorial-subtitle {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.tutorial-close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.tutorial-close-btn:hover {
  background: var(--bg4);
  color: var(--text);
  border-color: var(--purple);
}

.tutorial-content {
  padding: 20px 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tutorial-text {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  word-wrap: break-word;
}

.tutorial-nav {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.tutorial-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.tutorial-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
  transition: all 0.3s;
  cursor: pointer;
}

.tutorial-dot.active {
  background: #7c6fff;
  width: 24px;
  border-radius: 4px;
}

.tutorial-dot:hover {
  background: #9b8fff;
}

.tutorial-tip {
  padding: 10px 16px;
  background: rgba(245, 166, 35, 0.1);
  border-top: 1px solid rgba(245, 166, 35, 0.3);
  font-size: 12px;
  color: #f5a623;
  line-height: 1.5;
}

.tutorial-highlight {
  animation: tutorialPulse 2s ease-in-out infinite;
}

@keyframes tutorialPulse {
  0%, 100% {
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(124,111,255,0.3);
  }
  50% {
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.7),
                inset 0 0 30px rgba(124,111,255,0.5);
  }
}

@media (max-width: 500px) {
  .tutorial-card {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 12px 12px 0 0;
  }

  .tutorial-header {
    padding: 12px;
    gap: 10px;
  }

  .tutorial-icon {
    font-size: 28px;
  }

  .tutorial-title {
    font-size: 14px;
  }

  .tutorial-content {
    padding: 16px 12px;
  }

  .tutorial-text {
    font-size: 13px;
  }

  .tutorial-nav {
    padding: 12px;
  }
}

<script>
(function(){
  var iv=setInterval(function(){
    var bar=document.getElementById('splash-bar');
    if(bar){var w=parseFloat(bar.style.width)||0;if(w<92)bar.style.width=Math.min(w+8,92)+'%';}
  },60);
  window._splashIv=iv;
  window.hideSplash=function(){
    clearInterval(iv);
    var bar=document.getElementById('splash-bar');
    if(bar)bar.style.width='100%';
    var s=document.getElementById('splash');
    if(s){
      s.style.transition='opacity 0.35s ease';
      s.style.opacity='0';
      setTimeout(function(){if(s&&s.parentNode)s.parentNode.removeChild(s);},400);

// DEVICE FINGERPRINTING FOR PERSISTENT USER ID
// ════════════════════════════════════════════════════════════════════════════
function generateDeviceFingerprint(){
  const data=navigator.userAgent+navigator.language+screen.width+'x'+screen.height+new Date().getTimezoneOffset();
  let hash=0;
  for(let i=0;i<data.length;i++){
    const char=data.charCodeAt(i);
    hash=((hash<<5)-hash)+char;
    hash=hash&hash;
  }
  return Math.abs(hash).toString(16).slice(0,8);
}

function getDeviceId(){
  let deviceId=localStorage.getItem(STORAGE_KEYS.DEVICE_ID);
  if(!deviceId){
    deviceId='zenfit-user-'+generateDeviceFingerprint();
    localStorage.setItem(STORAGE_KEYS.DEVICE_ID,deviceId);
  }
  return deviceId;
}

// ════════════════════════════
function migrateData(saved){
  const version=saved.dataVersion||1;
  
  if(version<2){
    // Preserve existing tutorial state, don't override it
    saved.featureFlags=saved.featureFlags||{
      tutorial_main:false, // Default to false
      tutorial_nutrition:true,
      tutorial_workout:true,
      tutorial_habits:true
    };
    saved.dataVersion=2;
  }
  
  return saved;
}  
function validateAndMergeData(saved,def){
  const merged=Object.assign({},def);
  
  if(!saved) return merged;
  
  for(let key in saved){
    if(SCHEMA.hasOwnProperty(key)){
      const schemaType=SCHEMA[key];
      if(schemaType==='array'){
        merged[key]=Array.isArray(saved[key])?saved[key]:[];
      }else if(schemaType==='object'){
        merged[key]=Object.assign({},def[key]||{},saved[key]||{});
      }else{
        merged[key]=saved[key];
      }
    }
  }
  
  for(let key in SCHEMA){
    if(!merged.hasOwnProperty(key)){
      if(SCHEMA[key]==='array') merged[key]=[];
      else if(SCHEMA[key]==='object') merged[key]={};
    }
  }
  
  return merged;
}

function parseFood(text){
  text=text.toLowerCase().trim().replace(/\b(ki|ka|ke|with|and|&)\b/g,' ').replace(/\s+/g,' ').trim();
  let qty=1;
  const nm=text.match(/^(\d+\.?\d*)\s+/);
  if(nm){qty=parseFloat(nm[1]);text=text.slice(nm[0].length).trim();}
  else{const qw={'half':0.5,'one':1,'two':2,'three':3,'four':4,'a ':1,'an ':1};for(const[w,v]of Object.entries(qw)){if(text.startsWith(w)){qty=v;text=text.slice(w.length).trim();break;}}}
  text=text.replace(/\b(bowl|piece|cup|glass|serving|plate|small|large|medium|full)\b/g,'').trim().replace(/\s+/g,' ');
  if(ALIASES[text]&&INGR_DB[ALIASES[text]]) return bE(ALIASES[text],text,qty);
  if(INGR_DB[text]) return bE(text,text,qty);
  let best=null,bs=0;
  for(const k of Object.keys(ALIASES)){if(text.includes(k)&&k.length>bs){best=k;bs=k.length;}}
  if(best&&INGR_DB[ALIASES[best]]) return bE(ALIASES[best],text,qty);
  best=null;bs=0;
  for(const k of Object.keys(INGR_DB)){if(text.includes(k)&&k.length>bs){best=k;bs=k.length;}}
  if(best) return bE(best,text,qty);
  for(const w of text.split(' ')){if(ALIASES[w]&&INGR_DB[ALIASES[w]]) return bE(ALIASES[w],text,qty);if(INGR_DB[w]) return bE(w,text,qty);}
  return null;
}
function bE(dbKey,orig,qty){
  const b=INGR_DB[dbKey];
  return{name:orig||dbKey,qty,nutrients:{cal:Math.round(b.cal*qty),protein:Math.round(b.p*qty*10)/10,carbs:Math.round(b.c*qty*10)/10,fat:Math.round(b.f*qty*10)/10,fiber:Math.round(b.fi*qty*10)/10}};
}
function gradeFood(n){

}

function parseActivityNLP(text){
  const t=text.toLowerCase();
  let duration=0;
  const dm=t.match(/(\d+\.?\d*)\s*(min|minute|minutes|mins|hr|hour|hours|h\b)/);
  if(dm){duration=parseFloat(dm[1]);if(dm[2].startsWith('h'))duration*=60;}
  let inclineDeg=0;
  const im=t.match(/(\d+\.?\d*)\s*(degree|deg|%|percent)?\s*(incline|grade|slope)/);
  if(im){inclineDeg=parseFloat(im[1]);if(im[2]==='%')inclineDeg=Math.atan(inclineDeg/100)*(180/Math.PI);}
  let speedKmh=0;
  const sm=t.match(/(\d+\.?\d*)\s*(km\/h|kmh|kph|mph)/);
  if(sm){speedKmh=parseFloat(sm[1]);if(sm[2]==='mph')speedKmh*=1.609;}
  let met=4.0,actName='activity',bl=0;
  for(const[k,v]of Object.entries(MET_DB)){if(t.includes(k)&&k.length>bl){met=v;actName=k;bl=k.length;}}
  if(actName.includes('walk')){
    if(speedKmh>=7)met=6.0;else if(speedKmh>=5.5)met=5.0;else if(speedKmh>=4.5)met=4.3;else if(speedKmh>0)met=2.5;
  }
  if(actName.includes('run')||actName.includes('jog')){
    if(speedKmh>=16)met=16.0;else if(speedKmh>=13)met=12.5;else if(speedKmh>=10)met=10.0;else if(speedKmh>=8)met=8.5;else if(speedKmh>=6)met=7.0;
  }
  if(inclineDeg>0)met=Math.min(met*(1+(inclineDeg*0.1)/5),20);
  return{actName,duration,met,inclineDeg,speedKmh};
}

function calcBMI(weightKg,heightCm){
  if(!weightKg||!heightCm)return 0;
  return Math.round((weightKg/Math.pow(heightCm/100,2))*10)/10;
}
function bmiCategory(bmi){
  if(bmi<18.5)return{label:'Underweight',color:'var(--blue)'};
  if(bmi<25)return{label:'Normal',color:'var(--green)'};
  if(bmi<30)return{label:'Overweight',color:'var(--amber)'};
  return{label:'Obese',color:'var(--red)'};
}
function calcBMR(w,h,age,gender){
  if(!w||!h||!age)return 0;
  if(gender==='male')return Math.round(10*w+6.25*h-5*age+5);
  return Math.round(10*w+6.25*h-5*age-161);
}
function calcTDEE(bmr,level){
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
  return Math.round(bmr*(mult[level]||1.55));
}
function calcBodyFat(bmi,age,gender){
  if(!bmi||!age)return 0;
  const s=gender==='male'?1:0;
  return Math.round((1.20*bmi+0.23*age-10.8*s-5.4)*10)/10;
}
function calcIdealWeight(heightCm,gender){
  const h=heightCm-100;
  return gender==='male'?Math.round((h-h*0.1)*10)/10:Math.round((h-h*0.15)*10)/10;
}
function calcWHR(waist,hip){
  if(!waist||!hip)return 0;
  return Math.round((waist/hip)*100)/100;
}
function macroSplit(tdee,goal){
  // Body Recomposition: maintenance cals, very high protein
  if(goal==='recomp'){return{cal:tdee,
    protein:Math.round(tdee*0.38/4),
    carbs:Math.round(tdee*0.40/4),
    fat:Math.round(tdee*0.22/9)};}
  // Aggressive cut: -750 kcal/day for higher BF%
  if(goal==='lose_aggressive'){var cal=Math.round(Math.max(tdee-750,1200));return{cal,
    protein:Math.round(cal*0.40/4),
    carbs:Math.round(cal*0.35/4),
    fat:Math.round(cal*0.25/9)};}
  // Standard weight loss: -500 kcal/day
  if(goal==='lose'){var cal=Math.round(tdee-500);return{cal,
    protein:Math.round(cal*0.35/4),
    carbs:Math.round(cal*0.40/4),
    fat:Math.round(cal*0.25/9)};}
  // Lean bulk / muscle gain: +350 kcal surplus
  if(goal==='gain'){var cal=Math.round(tdee+350);return{cal,
    protein:Math.round(cal*0.28/4),
    carbs:Math.round(cal*0.50/4),
    fat:Math.round(cal*0.22/9)};}
  // Athletic performance: +150 kcal, carb-dominant
  if(goal==='performance'){var cal=Math.round(tdee+150);return{cal,
    protein:Math.round(cal*0.25/4),
    carbs:Math.round(cal*0.55/4),
    fat:Math.round(cal*0.20/9)};}
  // Cardiovascular health: maintenance, balanced
  if(goal==='heart'){return{cal:tdee,
    protein:Math.round(tdee*0.20/4),
    carbs:Math.round(tdee*0.55/4),
    fat:Math.round(tdee*0.25/9)};}
  // Maintenance default
  return{cal:tdee,
    protein:Math.round(tdee*0.25/4),
    carbs:Math.round(tdee*0.50/4),
    fat:Math.round(tdee*0.25/9)};
}

    performance:'Athletic Performance (+150 kcal)',

}

  }catch(e){}

function parseFoodInput(){
  const val=document.getElementById('food-input')?.value||'';

  r.innerHTML=res.map(f=>`<div class="card-sm mb8 flex gap8"><div class="grade grade-${gradeFood(f.nutrients)}">${gradeFood(f.nutrients)}</div><div><div style="font-size:13px;font-weight:500;text-transform:capitalize">${f.name} × ${f.qty}</div><div style="font-size:11px;color:var(--text2)">${nn(f.nutrients.cal)} kcal · P:${nn(f.nutrients.protein||f.nutrients.prot)}g · C:${nn(f.nutrients.carbs)}g</div></div></div>`).join('');

function logParsedFood(){
  if(!parsedFood?.length)return;
  parsedFood.forEach(f=>S.nutrition.entries.push({...f,date:getTodayStr()}));
  updStat('health',parsedFood.length);addXP(30*parsedFood.length,'Meals logged!');checkAutoQuests();parsedFood=null;renderScreens();
}
async function doBC(){
  const bc=document.getElementById('bc-input')?.value?.trim();if(!bc)return;
  const r=document.getElementById('bc-res');if(r)r.innerHTML=`<div style="color:var(--text2)">Looking up...</div>`;
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${bc}.json`);
    const d=await res.json();
    if(d.status!==1){if(r)r.innerHTML=`<div style="color:var(--red)">Not found.</div>`;return;}
    const p=d.product,n=p.nutriments||{};
    const e={name:p.product_name||'Product',qty:1,nutrients:{cal:Math.round(n['energy-kcal_100g']||0),protein:Math.round((n['proteins_100g']||0)*10)/10,carbs:Math.round((n['carbohydrates_100g']||0)*10)/10,fat:Math.round((n['fat_100g']||0)*10)/10,fiber:Math.round((n['fiber_100g']||0)*10)/10}};
    if(r)r.innerHTML=`<div class="card-sm flex gap12"><div class="grade grade-${gradeFood(e.nutrients)}">${gradeFood(e.nutrients)}</div><div style="flex:1"><div style="font-size:13px;font-weight:500">${e.name}</div><div style="font-size:11px;color:var(--text2)">${nn(e.nutrients.cal)} kcal</div></div><button class="btn btn-primary btn-sm" onclick='logBCE(${JSON.stringify(e).replace(/'/g,"&#39;")})'>Log</button></div>`;
  }catch(ex){if(r)r.innerHTML=`<div style="color:var(--red)">Lookup failed.</div>`;}
}
function logBCE(e){S.nutrition.entries.push({...e,date:getTodayStr()});updStat('health');addXP(30,'Meal logged!');checkAutoQuests();renderScreens();}

// Live workout preview - called on every input change
function wLivePreview(){
  const name=(document.getElementById('w-name')||{}).value||'';
  const type=(document.getElementById('w-type')||{}).value||'Strength';
  const sets=+(document.getElementById('w-sets')||{}).value||0;
  const reps=+(document.getElementById('w-reps')||{}).value||0;
  const weight=+(document.getElementById('w-weight')||{}).value||0;
  const dur=+(document.getElementById('w-duration')||{}).value||0;
  const wt=S.player.weightKg||S.profile?.weightKg||70;

  const preview=document.getElementById('w-preview');
  if(!preview) return;
  if(!name&&!sets&&!dur){preview.style.display='none';return;}
  preview.style.display='block';

  // Find MET for this exercise
  const nameLow=name.toLowerCase();
  let met=MET_DB[nameLow];
  if(!met){
    for(const[k,v] of Object.entries(MET_DB)){
      if(nameLow.includes(k)||k.includes(nameLow)){met=v;break;}
    }
  }
  if(!met) met=type==='Cardio'?7:type==='HIIT'?10:type==='Yoga'?3:3.5;

  // Estimate effective duration: if no explicit duration, estimate from sets/reps
  let effectiveDur=dur;
  if(!dur&&sets>0){
    // ~3 min per set for strength (rest+work), ~1.5 min for bodyweight
    effectiveDur=sets*(weight>0?2.5:1.5);
  }

  const cal=effectiveDur>0?Math.round(calcBurn(met,effectiveDur,wt)):0;
  const vol=sets*reps*weight;
  const tdee=getTDEEfromProfile();
  const pct=tdee>0?Math.min(100,Math.round(cal/tdee*100)):0;

  const calEl=document.getElementById('wp-cal');
  const volEl=document.getElementById('wp-vol');
  const metEl=document.getElementById('wp-met');
  const barEl=document.getElementById('wp-bar-fill');
  const lnkEl=document.getElementById('wp-link');

  if(calEl) calEl.innerHTML=cal+'<span style="font-size:12px;color:var(--text3);font-weight:400"> kcal est.</span>';
  if(volEl) volEl.textContent=vol>0?'Volume: '+(vol>=1000?(vol/1000).toFixed(1)+'k':vol)+' kg·reps':'';
  if(metEl) metEl.textContent='MET: '+met.toFixed(1)+(dur?'':' · '+effectiveDur.toFixed(1)+'min est.');
  if(barEl) barEl.style.width=pct+'%';
  if(lnkEl) lnkEl.textContent=cal>0?'Will add '+cal+' kcal to Burned tab → tap to view':'';
}
function logWorkout(override=null){
  const name=override?.name||document.getElementById('w-name')?.value?.trim();
  if(!name)return showNotif('Enter exercise name','!');
  const type=override?.type||document.getElementById('w-type')?.value||'Strength';
  const duration=override?.duration||+document.getElementById('w-duration')?.value||0;
  const metKey=type==='Cardio'?'running':type==='HIIT'?'hiit':type==='Yoga'?'yoga':'weight training';
  const met=MET_DB[metKey]||3.5;
  const caloriesBurned=duration>0?calcBurn(met,duration,S.player.weightKg||70):0;
  const entry={
    name,type,
    sets:override?.sets||+document.getElementById('w-sets')?.value||0,
    reps:override?.reps||+document.getElementById('w-reps')?.value||0,
    weight:override?.weight||+document.getElementById('w-weight')?.value||0,
    duration,notes:override?.notes||document.getElementById('w-notes')?.value||'',
    date:getTodayStr(),ts:Date.now(),caloriesBurned
  };
  S.workouts.push(entry);
  if(S._pendingWorkout) S._pendingWorkout='';
  if(caloriesBurned>0){
    if(!S.burned)S.burned=[];
    S.burned.push({activity:name,duration,met,weightKg:S.player.weightKg||70,calories:caloriesBurned,date:getTodayStr(),ts:Date.now(),source:'workout'});
  }
  updStat('strength',5);updStat('endurance',2);
  // Live refresh - update workout tab immediately without full re-render
  const el=document.getElementById('screen-workout');
  if(el&&currentScreen==='workout'){renderWorkout(el);}
  else{persistSave();renderScreens();}
  addXP(entry.caloriesBurned>0?15:8,'Exercise logged');
  return entry;
}
function delW2(i){
  S.workouts.splice(i,1);persistSave();
  var el=document.getElementById('screen-workout');
  if(el&&currentScreen==='workout')renderWorkout(el);else renderScreens();
}

function editPlan(i){
  const allPlans=S.workoutPlans||[];

  setTimeout(function(){

function savePlan(){
  const name=document.getElementById('plan-name')?.value?.trim();
  if(!name)return showNotif('Enter plan name','!');
  if(planExercises.length===0)return showNotif('Add at least one exercise','!');
  if(!S.workoutPlans)S.workoutPlans=[];
  S.workoutPlans.push({name,description:document.getElementById('plan-desc')?.value||'',exercises:[...planExercises],createdAt:getTodayStr()});
  planExercises=[];
  showNotif(`Plan "${name}" saved!`,'📋');
  persistSave();renderScreens();

function delPlan(i){if(confirm('Delete this plan?')){(S.workoutPlans||[]).splice(i,1);persistSave();renderScreens();}}
function copyPlan(i){
  const plan=(S.workoutPlans||[])[i];
  if(!plan){showNotif('Plan not found','!');return;}
  const copy={
    name:plan.name+' (Copy)',
    description:plan.description||'',
    exercises:(plan.exercises||[]).map(function(ex){return Object.assign({},ex);}),
    createdAt:getTodayStr()
  };
  if(!S.workoutPlans) S.workoutPlans=[];
  S.workoutPlans.push(copy);
  persistSave();
  showNotif('Plan "'+plan.name+'" duplicated!','📋');
  renderScreens();
}
function estimatePlanDuration(plan){
  return plan.exercises.reduce((a,ex)=>{
    if(ex.duration)return a+ex.duration;
    return a+(ex.sets||3)*2;
  },0);
}
function logPlan(i){
  const plan=S.workoutPlans[i];if(!plan)return;
  let totalCal=0;
  plan.exercises.forEach(ex=>{
    const metKey=ex.type==='Cardio'?'running':ex.type==='HIIT'?'hiit':ex.type==='Yoga'?'yoga':'weight training';
    const met=MET_DB[metKey]||3.5;
    const dur=ex.duration||(ex.sets||3)*2;
    const cal=calcBurn(met,dur,S.player.weightKg||70);
    totalCal+=cal;
    S.workouts.push({name:ex.name,type:ex.type,sets:ex.sets||0,reps:ex.reps||0,weight:ex.weight||0,duration:dur,notes:`From plan: ${plan.name}`,date:getTodayStr(),ts:Date.now(),caloriesBurned:cal});
    if(cal>0){if(!S.burned)S.burned=[];S.burned.push({activity:ex.name,duration:dur,met,weightKg:S.player.weightKg||70,calories:cal,date:getTodayStr(),ts:Date.now(),source:'workout'});}
  });
  updStat('strength',plan.exercises.length*3);updStat('endurance',plan.exercises.length*2);
  addXP(80+plan.exercises.length*15,`${plan.name} complete!`);
  autoQ('q3');checkAutoQuests();persistSave();
  showNotif(`${plan.name} logged! ${plan.exercises.length} exercises, ~${totalCal} kcal burned`,'🏋️');
  switchScreen('workout');
}

let pendingActivity=null;
function renderBurned(el){
  const today=getTodayStr();
  const allT=(S.burned||[]).filter(e=>e.date===today);
  const fromW=allT.filter(e=>e.source==='workout');
  const fromA=allT.filter(e=>e.source!=='workout');
  const total=allT.reduce((a,e)=>a+e.calories,0);
  const nut=todayNutrition();
  const tdee=getTDEEfromProfile();
  const net=nut.cal-total;
  const diff=net-tdee;

function burnCalcPreview(){
  const actEl=document.getElementById('calc-act');
  const durEl=document.getElementById('calc-dur');
  const intEl=document.getElementById('calc-int');
  const metRow=document.getElementById('calc-met-row');
  const resEl=document.getElementById('calc-result');
  const wtEl=document.getElementById('calc-wt');
  if(!actEl||!resEl) return;

  const act=actEl.value;
  const isCustom=act==='custom';
  if(metRow) metRow.style.display=isCustom?'block':'none';

  const dur=parseFloat((durEl||{}).value)||0;
  const intMult=parseFloat((intEl||{}).value)||1.0;
  const wt=parseFloat((wtEl||{}).value)||S.player.weightKg||70;
  let met=MET_DB[act]||MET_DB[act.toLowerCase()]||4;
  if(isCustom) met=parseFloat((document.getElementById('calc-met-val')||{}).value)||4;
  met*=intMult;

  if(dur<=0){
    resEl.innerHTML='<div style="font-size:12px;color:var(--text3)">Enter duration above ↑</div>';
    return;
  }

  const cal=Math.round(calcBurn(met,dur,wt));
  const tdee=getTDEEfromProfile();
  const pct=tdee>0?Math.min(100,Math.round(cal/tdee*100)):0;
  const perMin=Math.round(cal/dur);

  resEl.innerHTML=
    '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:8px">' +
      '<span style="font-size:32px;font-weight:800;color:var(--red)">'+cal+'</span>' +
      '<span style="font-size:14px;color:var(--text2)">kcal</span>' +
      '<span style="font-size:12px;color:var(--text3)">('+perMin+' kcal/min)</span>' +
    '</div>' +
    '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-bottom:8px">' +
      '<span>MET: <b style="color:var(--text)">'+met.toFixed(1)+'</b></span>' +
      '<span>Duration: <b style="color:var(--text)">'+dur+'min</b></span>' +
      '<span>Body weight: <b style="color:var(--text)">'+wt+'kg</b></span>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--text3);margin-bottom:6px">'+pct+'% of your daily maintenance ('+tdee+' kcal TDEE)</div>' +
    '<div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">' +
      '<div style="height:100%;width:'+pct+'%;background:var(--red);border-radius:3px;transition:width .4s"></div>' +
    '</div>';
}

function logFromCalc(){
  const actEl=document.getElementById('calc-act');

  const intEl=document.getElementById('calc-int');
  const wtEl=document.getElementById('calc-wt');

  const act=actEl.value||'exercise';

  if(dur<=0){showNotif('Enter a duration first','!');return;}
  const intMult=parseFloat((intEl||{}).value)||1.0;
  const wt=parseFloat((wtEl||{}).value)||S.player.weightKg||70;
  const isCustom=act==='custom';
  let met=(isCustom?parseFloat((document.getElementById('calc-met-val')||{}).value)||4:MET_DB[act]||4)*intMult;
  const cal=Math.round(calcBurn(met,dur,wt));
  if(!S.burned) S.burned=[];
  S.burned.push({activity:act,duration:dur,met,weightKg:wt,calories:cal,date:getTodayStr(),ts:Date.now(),source:'manual'});
  persistSave();

function miniCal(dates){
  const days=[],today=new Date();
  for(let i=13;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);days.push(`<div class="cal-day${dates.includes(ds)?' done':''}${i===0?' today':''}">${d.getDate()}</div>`);}
  return`<div class="cal-grid" style="margin-top:8px">${days.join('')}</div>`;
}
function addHabit(){
  const name=document.getElementById('h-name')?.value?.trim();if(!name)return;
  S.habits.push({name,difficulty:document.getElementById('h-diff')?.value||'easy',category:document.getElementById('h-cat')?.value?.trim()||'',icon:document.getElementById('h-icon')?.value?.trim()||'✅',description:document.getElementById('h-desc')?.value?.trim()||'',streak:0,completedDates:[],createdAt:getTodayStr()});
  persistSave();var _hel=document.getElementById('screen-habits');if(_hel&&currentScreen==='habits')renderHabits(_hel);else renderScreens();
}
function toggleHabit(i){
  const today=getTodayStr();
  const h=S.habits[i];
  if(!h) return;
  if(!h.completedDates) h.completedDates=[];
  const wasDone=h.completedDates.includes(today);
  if(wasDone){
    h.completedDates=h.completedDates.filter(d=>d!==today);
  } else {
    h.completedDates.push(today);
    const xM={easy:20,medium:40,hard:70};
    addXP(xM[h.difficulty]||20,'Habit: '+h.name);
    updStat('discipline',2);
  }
  // Recalculate streak accurately from dates
  h.streak=calcHabitStreak(h.completedDates);
  persistSave();
  const el=document.getElementById('screen-habits');
  if(el&&currentScreen==='habits') renderHabits(el);
  else renderScreens();
}
function calcHabitStreak(dates){
  if(!dates||!dates.length) return 0;
  const sorted=[...dates].sort().reverse();
  let streak=0;
  const today=new Date(); today.setHours(0,0,0,0);
  let check=new Date(today);
  for(let i=0;i<sorted.length;i++){
    const d=new Date(sorted[i]); d.setHours(0,0,0,0);
    const diff=Math.round((check-d)/86400000);
    if(diff===0||(i===0&&diff===1)){streak++;check=d;if(diff===1)check=d;}
    else if(diff===1){streak++;check=d;}
    else break;
  }
  return streak;
}
function delHabit(i){S.habits.splice(i,1);persistSave();var _hel=document.getElementById('screen-habits');if(_hel&&currentScreen==='habits')renderHabits(_hel);else renderScreens();}

// TIMER FUNCTIONS
function startTimer(){
  const subj=document.getElementById('t-subject')?.value?.trim();
  if(!subj&&timerSeconds===0)return showNotif('Enter a subject first','!');
  timerSubject=document.getElementById('t-subject')?.value?.trim()||timerSubject;
  timerTopic=document.getElementById('t-topic')?.value?.trim()||timerTopic;
  timerDiff=document.getElementById('t-diff')?.value||timerDiff;
  if(timerInterval) clearInterval(timerInterval);
  timerRunning=true;
  // Update button states immediately
  var startBtn=document.querySelector('[onclick="startTimer()"]');
  var pauseBtn=document.querySelector('[onclick="pauseTimer()"]');
  if(startBtn)startBtn.style.display='none';
  if(pauseBtn)pauseBtn.style.display='inline-flex';
  timerInterval=setInterval(()=>{
    timerSeconds++;
    // update display elements if they exist (won't after re-render but that's OK)
    const td=document.querySelector('.timer-display');
    const mins=Math.floor(timerSeconds/60).toString().padStart(2,'0');
    const secs=(timerSeconds%60).toString().padStart(2,'0');
    if(td) td.textContent=`${mins}:${secs}`;
    // Update ring every 10s to avoid too many DOM ops
    if(timerSeconds%10===0){
      const ring=document.querySelector('.timer-ring-fill');
      if(ring){
        const circ=2*Math.PI*54;
        const prog=Math.min(timerSeconds/3600,1);
        ring.style.strokeDashoffset=circ*(1-prog);
      }
    }
  },1000);
  // Just update button visibility, not full re-render
  renderScreens();
}
function pauseTimer(){
  timerRunning=false;
  clearInterval(timerInterval);
  renderScreens();
}
function resetTimer(){
  timerRunning=false;clearInterval(timerInterval);timerSeconds=0;renderScreens();
}
function stopTimer(){
  timerRunning=false;clearInterval(timerInterval);
  const dur=Math.max(1,Math.round(timerSeconds/60));
  const subj=timerSubject||'Study';
  const xp=calcStudyXP(dur,timerDiff);
  const session={subject:subj,topic:timerTopic,duration:dur,difficulty:timerDiff,notes:'Timer session',date:getTodayStr(),ts:Date.now(),xp,timerBased:true};
  if(!S.study.sessions)S.study.sessions=[];
  if(!S.study.subjects)S.study.subjects=[];
  S.study.sessions.push(session);
  if(!S.study.subjects.includes(subj))S.study.subjects.push(subj);
  updStat('discipline',3);if(timerDiff==='hard')updStat('discipline',2);
  addXP(xp,`${subj} study session!`);
  checkAutoQuests();persistSave();
  timerSeconds=0;timerSubject='';timerTopic='';timerDiff='medium';
  showNotif(`Session saved: ${dur} min of ${subj} (+${xp} XP)`,'📚');
  renderScreens();
}

function previewSXP(){
  const dur=+document.getElementById('s-duration')?.value||0;
  const diff=document.getElementById('s-diff')?.value||'medium';
  const el=document.getElementById('s-xp-prev');
  if(el&&dur>0)el.innerHTML=`Estimated: <span style="color:var(--amber);font-weight:600">+${calcStudyXP(dur,diff)} XP</span>`;
}
function calcStudyXP(dur,diff){
  const m={easy:1,medium:1.5,hard:2.2};
  return Math.round(dur*1.5*(m[diff]||1.5));
}
function logStudySession(){
  const subject=document.getElementById('s-subject')?.value?.trim();
  const dur=+document.getElementById('s-duration')?.value||0;
  if(!subject)return showNotif('Enter a subject','!');
  if(dur<=0)return showNotif('Enter duration','!');
  const diff=document.getElementById('s-diff')?.value||'medium';
  const xp=calcStudyXP(dur,diff);
  if(!S.study.sessions)S.study.sessions=[];if(!S.study.subjects)S.study.subjects=[];
  S.study.sessions.push({subject,topic:document.getElementById('s-topic')?.value?.trim()||'',duration:dur,difficulty:diff,notes:document.getElementById('s-notes')?.value?.trim()||'',date:getTodayStr(),ts:Date.now(),xp});
  if(!S.study.subjects.includes(subject))S.study.subjects.push(subject);
  updStat('discipline',3);addXP(xp,'Study session logged!');checkAutoQuests();persistSave();renderScreens();
}
function delStudy(i){S.study.sessions.splice(i,1);persistSave();renderScreens();}

     backgroundColor:nets.map(n=>n<tdee?'#4cdb8a44':'#ff5a5a44'),
     borderColor:nets.map(n=>n<tdee?'#4cdb8a':'#ff5a5a'),

  ]},options:{...opts(),scales:{x:{grid:{color:'#2a305022'},ticks:{color:'#8a94b8',font:{size:9},maxRotation:45}},y:{grid:{color:'#2a305022'},ticks:{color:'#8a94b8',font:{size:9}}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#4cdb8a',font:{size:9}}}}}});
  // c3: Study
  const c3el=document.getElementById('c3');if(!c3el)return;

    {label:'Study (min)',data:data.map(d=>d.study),backgroundColor:'#4a9eff44',borderColor:'#4a9eff',borderWidth:1.5,borderRadius:3}

function getInsights(){
  const today=getTodayStr(),ins=[];
  const water=todayWater();
  if(water<S.water.dailyGoalMl*0.5)ins.push('💧 Low hydration! Drink more water now.');
  else if(water>=S.water.dailyGoalMl)ins.push('✅ Hydration goal smashed!');
  const nut=todayNutrition();
  if(nut.protein<S.nutrition.dailyGoal.protein*0.6)ins.push('[!] Protein is low — add eggs, dal, or paneer.');
  if(nut.cal>S.nutrition.dailyGoal.cal)ins.push('⚠️ Calorie goal exceeded.');
  const burned=todayBurned();if(burned>300)ins.push(`🔥 Great job burning ${burned} kcal today!`);
  const studyMins=(S.study.sessions||[]).filter(s=>s.date===today).reduce((a,b)=>a+b.duration,0);
  if(studyMins>=60)ins.push(`📚 ${studyMins} minutes of study — impressive!`);
  const topStreak=(S.habits||[]).reduce((a,h)=>Math.max(a,h.streak||0),0);
  if(topStreak>=7)ins.push(`🔥 ${topStreak}-day streak! You are unstoppable.`);
  if(ins.length===0)ins.push('📊 Keep logging to unlock insights!');
  return ins;
}

function getIngNutrition(name){
  const k=name.toLowerCase().trim();
  if(INGREDIENT_NUTRITION[k]) return INGREDIENT_NUTRITION[k];
  // Fuzzy match
  for(const[key,val] of Object.entries(INGREDIENT_NUTRITION)){
    if(k.includes(key)||key.includes(k)) return val;
  }
  // Try API via nutritionix estimate if online
  return null;
}
function calcDishNutrition(){
  const method=dishState.method||'raw';
  const oilG=dishState.oil||0;
  const servings=dishState.servings||1;
  const mult=COOKING_METHODS[method]?.mult||1;
  let totalCal=0,totalProt=0,totalCarbs=0,totalFat=0,totalFiber=0;
  let missing=[];
  dishIngredients.forEach(ing=>{
    const g=parseFloat(ing.qty)||0;
    const n=getIngNutrition(ing.name);
    if(n){
      const factor=g/100;
      totalCal+=n[0]*factor;totalProt+=n[1]*factor;
      totalCarbs+=n[2]*factor;totalFat+=n[3]*factor;totalFiber+=n[4]*factor;
    } else { missing.push(ing.name); }
  });
  // Add oil calories
  if(oilG>0){ totalCal+=oilG*9; totalFat+=oilG; }
  // Apply cooking method multiplier (affects cal density)
  totalCal*=mult;
  // Per serving
  const ps=servings>0?servings:1;
  return{
    cal:Math.round(totalCal/ps),prot:Math.round(totalProt/ps*10)/10,
    carbs:Math.round(totalCarbs/ps*10)/10,fat:Math.round(totalFat/ps*10)/10,
    fiber:Math.round(totalFiber/ps*10)/10,missing
  };
}

let mealPlanItems=[];
function addMealItem(){
  const name=document.getElementById('mi-name')?.value?.trim();
  const qty=parseFloat(document.getElementById('mi-qty')?.value||100);
  const unit=document.getElementById('mi-unit')?.value||'g';
  if(!name){showNotif('Enter food item name','!');return;}
  const n=getIngNutrition(name);
  const cal=n?Math.round(n[0]*qty/100):0;
  mealPlanItems.push({name,qty,unit,cal,prot:n?Math.round(n[1]*qty/100*10)/10:0,carbs:n?Math.round(n[2]*qty/100*10)/10:0,fat:n?Math.round(n[3]*qty/100*10)/10:0});
  document.getElementById('mi-name').value='';
  document.getElementById('mi-qty').value='100';
  renderScreens();
}
function removeMealItem(i){mealPlanItems.splice(i,1);renderScreens();}

function editMealPlan(i){
  const mp=(S.mealPlans||[])[i];
  if(!mp){showNotif('Meal plan not found','!');return;}
  mealPlanItems=mp.items.map(function(it){return Object.assign({},it);});
  (S.mealPlans||[]).splice(i,1);
  persistSave();
  currentScreen='mealplanner';
  renderScreens();
  setTimeout(function(){
    var el=document.getElementById('mp-name');
    if(el){el.value=mp.name||'';el.scrollIntoView({behavior:'smooth'});}
  },150);
  showNotif('Meal plan loaded for editing!','OK');
}
function duplicateMealPlan(i){
  const mp=(S.mealPlans||[])[i];
  if(!mp) return;
  const copy=Object.assign({},mp,{
    name:mp.name+' (Copy)',
    items:mp.items.map(function(it){return Object.assign({},it);}),
    date:getTodayStr()
  });
  (S.mealPlans||(S.mealPlans=[])) && S.mealPlans.push(copy);
  persistSave();
  showNotif('Meal plan duplicated!','OK');
  renderScreens();
}
function saveMealPlan(){
  const name=document.getElementById('mp-name')?.value?.trim();
  if(!name){showNotif('Enter meal plan name','!');return;}
  if(mealPlanItems.length===0){showNotif('Add at least one food item','!');return;}
  if(!S.mealPlans) S.mealPlans=[];
  const totalCal=mealPlanItems.reduce((a,i)=>a+i.cal,0);
  (S.mealPlans||(S.mealPlans=[])) && S.mealPlans.push({name,items:[...mealPlanItems],totalCal,date:getTodayStr()});
  persistSave();
  mealPlanItems=[];
  document.getElementById('mp-name').value='';
  showNotif(`Meal plan "${name}" saved!`,'OK');
  renderScreens();
}
function logMealPlan(i){
  const mp=S.mealPlans?.[i];if(!mp)return;
  const today=getTodayStr();
  mp.items.forEach(item=>{
    S.nutrition.entries.push({
      id:Date.now()+Math.random(),name:item.name,date:today,mealType:'meal',
      nutrients:{cal:item.cal,protein:item.prot||item.protein||0,carbs:item.carbs,fat:item.fat,fiber:0}
    });
  });
  persistSave();
  showNotif(`${mp.name} logged — ${mp.totalCal} kcal total`,'OK');
  renderScreens();
}
function deleteMealPlan(i){(S.mealPlans||[]).splice(i,1);persistSave();renderScreens();}

  el.innerHTML=`

      ${mealPlanItems.map((it,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:8px;margin-bottom:4px">
        <div style="flex:1">
          <span style="font-size:13px;font-weight:500">${it.name}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:8px">${it.qty}${it.unit}</span>

  </div>

  ${plans.length>0?`<div class="section-title">Saved Meal Plans (${plans.length})</div>`:''} 
  ${plans.map((mp,i)=>`<div class="card mb10">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:600">${mp.name}</div>
        <div style="font-size:11px;color:var(--text3)">${mp.items.length} items · ${mp.totalCal} kcal</div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="logMealPlan(${i})">Log</button>
        <button class="btn btn-sm" onclick="editMealPlan(${i})" style="border-color:var(--purple);color:var(--purple)">Edit</button>
        <button class="btn btn-sm" onclick="duplicateMealPlan(${i})" style="border-color:var(--teal);color:var(--teal)">Copy</button>
        <button class="btn btn-icon btn-sm" onclick="deleteMealPlan(${i})" style="color:var(--red)">×</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px">
      ${mp.items.map(it=>`<div style="font-size:12px;color:var(--text2);display:flex;justify-content:space-between;padding:3px 8px;background:var(--bg4);border-radius:5px">

function renderLeaderboard(el){
  if(!S.partners) S.partners=[];
  const myCard=getMyCard();
  const allUsers=[...S.partners,{...myCard,isMe:true}]
    .sort(function(a,b){return b.xp-a.xp;});
  const myPos=allUsers.findIndex(function(u){return u.isMe;})+1;
  const liveIds=Object.keys(peerConnections);
  const RANK_COLORS={S:'#f5a623',A:'#4cdb8a',B:'#4a9eff',C:'#c084fc',D:'#00d4aa',E:'#8a94b8'};

  function buildLiveSection(){
    if(!liveIds.length) return '';
    let h='<div class="section-title">Live Connections ('+liveIds.length+')</div>';
    liveIds.forEach(function(pid){
      const msgs=(peerChatHistory[pid]||[]).slice(-20);
      const shortId=pid.split('-').slice(1).join('-');
      const safeId=pid.replace(/-/g,'');
      let msgHtml=msgs.length
        ? msgs.map(function(m){return '<div style="padding:4px 8px;border-radius:6px;font-size:11px;max-width:85%;'+(m.mine?'align-self:flex-end;background:var(--purple2);color:#fff':'align-self:flex-start;background:var(--bg3);color:var(--text2)')+'">'+m.text+'</div>';}).join('')
        : '<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px">No messages yet · disappear after 24h</div>';
      h+='<div class="card mb10" style="border:1px solid var(--green)">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--green)">&#9679; '+shortId+'</div>';
      h+='<button class="btn btn-sm" style="border-color:var(--blue);color:var(--blue);font-size:10px" onclick="requestDetail(\''+pid+'\')">View Stats</button>';
      h+='</div>';
      h+='<div style="max-height:120px;overflow-y:auto;margin-bottom:6px;display:flex;flex-direction:column;gap:3px">'+msgHtml+'</div>';
      h+='<div style="display:flex;gap:6px">';
      h+='<input type="text" id="ci'+safeId+'" placeholder="Message..." style="flex:1;font-size:11px" onkeydown="if(event.key===\'Enter\'){var v=this.value;if(v){sendChat(\''+pid+'\',v);this.value=\'\';}}">';
      h+='<button class="btn btn-primary btn-sm" onclick="var i=document.getElementById(\'ci'+safeId+'\');if(i&&i.value){sendChat(\''+pid+'\',i.value);i.value=\'\';}">Send</button>';
      h+='</div></div>';
    });
    return h;
  }

  function buildUserRow(u,i){
    const medal=i===0?'&#127945;':i===1?'&#129352;':i===2?'&#129353;':'';
    const rc=RANK_COLORS[u.rank]||'#8a94b8';
    const isLive=u.peerId&&liveIds.includes(u.peerId);
    let h='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:'+(u.isMe?'linear-gradient(135deg,#1a2040,#0d1520)':'var(--bg2)')+';border-radius:10px;margin-bottom:6px;border:1px solid '+(u.isMe?'var(--purple)':isLive?'var(--green)':'var(--border)')+'">';
    h+='<div style="width:28px;text-align:center;font-size:'+(i<3?'18':'12')+'px;font-weight:700;color:var(--text3)">'+(medal||('#'+(i+1)))+'</div>';
    h+='<div style="width:36px;height:36px;border-radius:50%;background:'+rc+'22;border:2px solid '+rc+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+rc+';flex-shrink:0;overflow:hidden">'+(u.avatar?'<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover" alt="">':u.rank)+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:'+(u.isMe?'var(--purple)':'var(--text)')+'">'+u.name+(u.isMe?' (You)':'')+(isLive?' <span style="color:var(--green);font-size:9px">&#9679; LIVE</span>':'')+'</div>';
    h+='<div style="font-size:11px;color:var(--text3)">Lv.'+u.level+' &middot; '+u.xp.toLocaleString()+' XP &middot; '+u.streak+'d streak</div></div>';
    if(!u.isMe){
      var partnerIdx=S.partners.findIndex(function(p){return p.name===u.name;});
      h+='<button class="btn btn-sm" onclick="viewPartnerStats('+partnerIdx+')" style="border-color:var(--blue);color:var(--blue);font-size:10px;padding:4px 8px">Stats</button>';
      h+='<button class="btn btn-icon btn-sm" onclick="removePartner('+partnerIdx+')" style="color:var(--red)">&#215;</button>';
    }
    h+='</div>';
    return h;
  }

  function buildPendingSection(){
    const incoming=S.pendingRequests||[];
    const outgoing=S.sentRequests||[];
    if(!incoming.length && !outgoing.length) return '';
    let h='';
    if(incoming.length){
      h+='<div class="section-title">Connection Requests ('+incoming.length+')</div>';
      incoming.forEach(function(req,idx){
        const rc=RANK_COLORS[req.rank]||'#8a94b8';
        h+='<div class="card mb10" style="border:1px solid var(--blue)">';
        h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
        h+='<div style="width:36px;height:36px;border-radius:50%;background:'+rc+'22;border:2px solid '+rc+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+rc+';flex-shrink:0;overflow:hidden">'+(req.avatar?'<img src="'+req.avatar+'" style="width:100%;height:100%;object-fit:cover" alt="">':req.rank||'?')+'</div>';
        h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text)">'+req.name+'</div>';
        h+='<div style="font-size:11px;color:var(--text3)">Lv.'+(req.level||1)+' &middot; '+(req.xp||0).toLocaleString()+' XP &middot; wants to connect</div></div></div>';
        h+='<div style="display:flex;gap:8px">';
        h+='<button class="btn btn-primary btn-sm" style="flex:1" onclick="acceptRequest('+idx+')">Accept</button>';
        h+='<button class="btn btn-sm" style="flex:1;border-color:var(--red);color:var(--red)" onclick="rejectRequest('+idx+')">Reject</button>';
        h+='</div></div>';
      });
    }
    if(outgoing.length){
      h+='<div class="section-title">Sent Requests ('+outgoing.length+')</div>';
      outgoing.forEach(function(req,idx){
        h+='<div class="card mb10" style="border:1px dashed var(--text3);opacity:0.85">';
        h+='<div style="display:flex;align-items:center;gap:10px">';
        h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text2)">'+req.name+'</div>';
        h+='<div style="font-size:11px;color:var(--text3)">Lv.'+(req.level||1)+' &middot; awaiting response…</div></div>';
        h+='<button class="btn btn-icon btn-sm" onclick="cancelSentRequest('+idx+')" style="color:var(--red)">&#215;</button>';
        h+='</div></div>';
      });
    }
    return h;
  }

  const peerStatus=peer&&!peer.destroyed;
  let html='';
  // Rank banner
  html+='<div class="card mb12" style="background:linear-gradient(135deg,#1a1230,#0d1020);border:1px solid var(--purple2);text-align:center;padding:16px">';
  html+='<div style="font-size:11px;color:var(--text3);letter-spacing:2px">YOUR GLOBAL RANK</div>';
  html+='<div style="font-size:40px;font-weight:800;color:var(--purple)">#'+myPos+'</div>';
  html+='<div style="font-size:12px;color:var(--text2)">'+allUsers.length+' warriors &middot; Lv.'+myCard.level+' &middot; '+myCard.xp+' XP</div></div>';
  // P2P panel
  html+='<div class="card mb12"><div class="section-title">P2P Network <span style="color:'+(peerStatus?'var(--green)':'var(--red)')+';font-size:10px">&#9679; '+(peerStatus?'LIVE':'OFFLINE')+'</span></div>';
  if(peerStatus){
    html+='<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Your ID: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--purple);font-size:11px">'+(S.peerId||'...')+'</code></div>';
    html+='<div style="display:flex;gap:8px;margin-bottom:8px"><input type="text" id="peer-connect-id" placeholder="Enter partner Peer ID..." style="flex:1;font-size:12px"><button class="btn btn-primary btn-sm" onclick="connectToPeer(document.getElementById(\'peer-connect-id\').value)">Connect</button></div>';
  } else {
    html+='<button class="btn btn-primary" onclick="initPeerJS()">Start Live P2P</button>';

(function () {

  let sx = 0;
  let sy = 0;
  let locked = false;

  const THRESHOLD = 40;

  // Use SCREENS array directly
  function getScreenIds() {
    return SCREENS.map(s => s.id);
  }

  document.addEventListener('touchstart', e => {

    if (!e.touches.length) return;

    const t = e.touches[0];

    sx = t.clientX;
    sy = t.clientY;

    locked = false;

  }, { passive: true });

  document.addEventListener('touchmove', e => {

    if (locked) return;
    if (!e.touches.length) return;

    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;

    // Ignore vertical gestures
    if (Math.abs(dy) > Math.abs(dx)) return;

    // Ignore tiny movement
    if (Math.abs(dx) < THRESHOLD) return;

    locked = true;

    // Home intentionally disabled
    if (currentScreen === 'home') return;

    const SCREEN_IDS = getScreenIds();

    const ci = SCREEN_IDS.indexOf(currentScreen);

    if (ci === -1) return;

    // LEFT SWIPE
    if (
      dx < -THRESHOLD &&
      ci < SCREEN_IDS.length - 1
    ) {

      switchScreen(SCREEN_IDS[ci + 1]);

    }

    // RIGHT SWIPE
    else if (
      dx > THRESHOLD &&
      ci > 0
    ) {

      switchScreen(SCREEN_IDS[ci - 1]);

    }

    // RIGHT from first tab → home
    else if (
      dx > THRESHOLD &&
      ci === 0
    ) {

      switchScreen('home');

    }

  }, { passive: true });

})();

function getAnalyticsData(period){
  const days=[];
  const count=period==='7d'?7:period==='30d'?30:365;
  const step=period==='1y'?7:1;
  const totalSlots=Math.ceil(count/step);
  for(let i=totalSlots-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i*step);
    const ds=d.toISOString().slice(0,10);
    const label=period==='1y'
      ? d.toLocaleDateString([],{month:'short',day:'numeric'})
      : period==='30d'
        ? d.toLocaleDateString([],{month:'short',day:'numeric'})
        : d.toLocaleDateString([],{weekday:'short'});
    // For year, aggregate the week
    let cal=0,burned=0,waterL=0,study=0,habits=0;
    for(let j=0;j<step;j++){
      const dd=new Date(d);dd.setDate(dd.getDate()-j);const dds=dd.toISOString().slice(0,10);
      cal+=S.nutrition.entries.filter(e=>e.date===dds).reduce((a,e)=>a+e.nutrients.cal,0);
      burned+=(S.burned||[]).filter(e=>e.date===dds).reduce((a,e)=>a+e.calories,0);
      waterL+=(S.water.entries||[]).filter(e=>e.date===dds).reduce((a,e)=>a+e.ml,0)/1000;
      study+=(S.study.sessions||[]).filter(s=>s.date===dds).reduce((a,b)=>a+b.duration,0);
      habits+=(S.habits||[]).filter(h=>h.completedDates?.includes(dds)).length;
    }
    days.push({label,cal:Math.round(cal/step),burned:Math.round(burned/step),water:Math.round(waterL/step*10)/10,study:Math.round(study/step),habits:Math.round(habits/step*10)/10});
  }
  return days;
}
function getHabitColors(){
  return['#4a9eff','#f5a623','#00d4aa','#4cdb8a','#ff5a5a','#c084fc','#f472b6','#fb923c'];
}
function habitColor(i){const c=getHabitColors();return c[i%c.length];}
function miniCurve(dates,color){
  const today=new Date();
  const pts=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    pts.push(dates.includes(d.toISOString().slice(0,10))?1:0);
  }
  // Build SVG polyline path
  const w=280,h=40,pad=4;
  const points=pts.map((v,i)=>{
    const x=pad+i*((w-2*pad)/13);
    const y=v===1?(h-pad-16):(h-pad);
    return`${x},${y}`;
  }).join(' ');
  // Smooth curve using bezier approximation
  let d2='';
  const coords=pts.map((v,i)=>({x:pad+i*((w-2*pad)/13),y:v===1?(h-pad-16):(h-pad)}));
  d2=`M ${coords[0].x},${coords[0].y}`;
  for(let i=1;i<coords.length;i++){
    const prev=coords[i-1],curr=coords[i];
    const cpx=(prev.x+curr.x)/2;
    d2+=` C ${cpx},${prev.y} ${cpx},${curr.y} ${curr.x},${curr.y}`;
  }
  // Fill area under curve
  const fillD=d2+` L ${coords[coords.length-1].x},${h} L ${coords[0].x},${h} Z`;
  return`<svg class="habit-curve" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="hg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
    </linearGradient></defs>
    <path d="${fillD}" fill="url(#hg${color.replace('#','')})" />
    <path d="${d2}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round"/>
    ${coords.map((c,i)=>pts[i]===1?`<circle cx="${c.x}" cy="${c.y}" r="3" fill="${color}" opacity="0.9"/>`:'').join('')}
  </svg>`;
}

  const consumed=todayNutrition().cal;

  const tdee=getTDEEfromProfile();

  return{consumed,burned,tdee,net,diff,
    isDeficit:diff<0,

}

async function fetchNutritionOnline(query){
  try{
    const r=await safeFetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&action=process&json=true&page_size=5`,
      {signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    const d=await r.json();
    const products=(d.products||[]).filter(p=>p.nutriments?.['energy-kcal_100g']>0);
    if(!products.length)return null;
    const p=products[0];
    const nm=p.nutriments;
    return{
      name:p.product_name||query,
      cal:Math.round(nm['energy-kcal_100g']||nm.energy_100g/4.18||0),
      prot:Math.round((nm.proteins_100g||0)*10)/10,
      carbs:Math.round((nm.carbohydrates_100g||0)*10)/10,
      fat:Math.round((nm.fat_100g||0)*10)/10,
      fiber:Math.round((nm.fiber_100g||0)*10)/10,
      brand:p.brands||'',
    };
  }catch(e){return null;}
}

// P2P NETWORK via PeerJS + Share Codes
// ════════════════════════════════════════════════════
let peer=null, peerConnections={}, peerChatHistory={};

function getMyCard(){
  return {
    name:S.player.name||'Warrior',
    level:S.player.level||1,
    xp:S.player.xp||0,
    rank:calcRank(S.player),
    streak:(S.habits||[]).reduce(function(a,h){return a+(h.streak||0);},0),
    habits:S.habits.length,
    workouts:S.workouts?S.workouts.length:0,
    peerId:S.peerId||null,
    avatar:S.profilePic||null,
    timestamp:Date.now()
  };
}

function getShareCode(){
  const card=getMyCard();
  const json=JSON.stringify(card);
  return btoa(unescape(encodeURIComponent(json)));
}

function importPartnerCode(code){
  // Legacy alias — routes to the new request handshake
  return sendConnectRequest(code);
}

function sendConnectRequest(code){
  try{
    if(!code||!code.trim()){showNotif('Paste a share code first','!');return;}
    const json=decodeURIComponent(escape(atob(code.trim())));
    const card=JSON.parse(json);
    if(!card.name||!card.level){showNotif('Invalid share code','!');return;}
    if(!S.partners) S.partners=[];
    if(!S.sentRequests) S.sentRequests=[];
    if(!S.pendingRequests) S.pendingRequests=[];
    // Already a partner?
    if(S.partners.findIndex(function(p){return p.name===card.name;})>-1){
      showNotif(card.name+' is already in your leaderboard','!');return;
    }
    // Already pending (sent)?
    if(S.sentRequests.findIndex(function(p){return p.name===card.name;})>-1){
      showNotif('Request to '+card.name+' is already pending','!');return;
    }
    // Did this person already send US a request? Then accepting completes the handshake.
    const incomingIdx=S.pendingRequests.findIndex(function(p){return p.name===card.name;});
    if(incomingIdx>-1){
      acceptRequest(incomingIdx);
      return;
    }
    // Try live P2P first (sends a request, partner must accept)
    let sentLive=false;
    if(card.peerId && peer && !peer.destroyed){
      try{
        var conn=peer.connect(card.peerId,{reliable:true,metadata:{type:'connect_request'}});
        conn.on('open',function(){
          conn.send(JSON.stringify({type:'connect_request',data:getMyCard()}));
        });
        setupConn(conn);
        sentLive=true;
      }catch(e){}
    }
    // Always queue locally as a sent request so the offline path works too.
    S.sentRequests.push(Object.assign({},card,{ts:Date.now()}));
    persistSave();
    showNotif('Request sent to '+card.name+(sentLive?' (live)':' — they must accept'),'📨');
    renderScreens();
  }catch(e){showNotif('Invalid code: '+e.message,'!');}
}

function acceptRequest(i){
  if(!S.pendingRequests) S.pendingRequests=[];
  const req=S.pendingRequests[i];
  if(!req){showNotif('Request not found','!');return;}
  if(!S.partners) S.partners=[];
  // Add to my leaderboard
  const existing=S.partners.findIndex(function(p){return p.name===req.name;});
  const partnerCard=Object.assign({},req);
  delete partnerCard.ts;
  if(existing>-1) S.partners[existing]=partnerCard;
  else S.partners.push(partnerCard);
  // Remove from pending
  S.pendingRequests.splice(i,1);
  // Notify peer over live link if possible so they can register us too
  if(req.peerId && peerConnections[req.peerId] && peerConnections[req.peerId].open){
    try{ peerConnections[req.peerId].send(JSON.stringify({type:'connect_accept',data:getMyCard()})); }catch(e){}
  } else if(req.peerId && peer && !peer.destroyed){
    try{
      var conn=peer.connect(req.peerId,{reliable:true});
      conn.on('open',function(){
        conn.send(JSON.stringify({type:'connect_accept',data:getMyCard()}));
      });
      setupConn(conn);
    }catch(e){}
  }
  persistSave();
  showNotif(req.name+' is now in your leaderboard!','✅');
  renderScreens();
}

function rejectRequest(i){
  if(!S.pendingRequests) S.pendingRequests=[];
  const req=S.pendingRequests[i];
  if(!req) return;
  // Notify peer if live
  if(req.peerId && peerConnections[req.peerId] && peerConnections[req.peerId].open){
    try{ peerConnections[req.peerId].send(JSON.stringify({type:'connect_reject',name:S.player.name||'Warrior'})); }catch(e){}
  }
  S.pendingRequests.splice(i,1);
  persistSave();
  showNotif('Request from '+req.name+' rejected','OK');
  renderScreens();
}

function cancelSentRequest(i){
  if(!S.sentRequests) return;
  S.sentRequests.splice(i,1);
  persistSave();renderScreens();
}

function removePartner(i){
  if(i<0||!S.partners||!S.partners[i]) return;
  if(!confirm('Remove '+S.partners[i].name+' from your leaderboard?')) return;
  const removed=S.partners[i];
  S.partners.splice(i,1);
  if(S.partnerStats && removed && removed.name) delete S.partnerStats[removed.name];
  persistSave();renderScreens();
}

// PeerJS for real-time (loads dynamically)
function initPeerJS(){
  if(typeof Peer==='undefined'){
    var script=document.createElement('script');
    script.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
    script.onload=function(){startPeer();};
    document.head.appendChild(script);
  } else {startPeer();}
}
function startPeer(){
  if(peer&&!peer.destroyed) return;
  // Generate stable peer ID from device fingerprint (survives data resets!)
  const deviceId=getDeviceId(); // Format: zenfit-user-xxxxxxxx
  const pid=deviceId;
  S.peerId=pid; persistSave();
  peer=new Peer(pid,{debug:0});
  peer.on('open',function(id){
    S.peerId=id;persistSave();
    showNotif('Connected! Your ID: '+id,'OK');
    renderScreens();
  });
  peer.on('connection',function(conn){
    setupConn(conn);
  });
  peer.on('error',function(err){
    showNotif('P2P error: '+err.type,'!');
  });
}
function setupConn(conn){
  conn.on('open',function(){
    peerConnections[conn.peer]=conn;
    // Channel is open. We do NOT auto-share our card now — that would bypass the
    // accept/reject handshake. The initiator sends an explicit connect_request,
    // and only after acceptance do both sides exchange cards.
    showNotif(conn.peer.split('-')[1]+' channel open','OK');
    renderScreens();
  });
  conn.on('data',function(raw){
    try{
      var msg=JSON.parse(raw);
      if(msg.type==='connect_request'){
        // Incoming connection request — queue for user to accept/reject
        if(!S.pendingRequests) S.pendingRequests=[];
        var c=msg.data||{};
        c.peerId=conn.peer;
        var dup=S.pendingRequests.findIndex(function(p){return p.name===c.name;});
        if(dup>-1) S.pendingRequests[dup]=Object.assign({},c,{ts:Date.now()});
        else S.pendingRequests.push(Object.assign({},c,{ts:Date.now()}));
        // Already a partner? Auto-accept silently.
        if((S.partners||[]).findIndex(function(p){return p.name===c.name;})>-1){
          var idx=S.pendingRequests.findIndex(function(p){return p.name===c.name;});
          if(idx>-1) acceptRequest(idx);
        } else {
          persistSave();
          showNotif(c.name+' wants to connect — check Leaderboard','🔔');
          renderScreens();
        }
      } else if(msg.type==='connect_accept'){
        // Our request was accepted — add them as a partner and clear sent queue
        var card=msg.data||{};
        card.peerId=conn.peer;
        if(!S.partners) S.partners=[];
        var pIdx=S.partners.findIndex(function(p){return p.name===card.name;});
        if(pIdx>-1) S.partners[pIdx]=card;
        else S.partners.push(card);
        if(S.sentRequests){
          var sIdx=S.sentRequests.findIndex(function(p){return p.name===card.name;});
          if(sIdx>-1) S.sentRequests.splice(sIdx,1);
        }
        persistSave();
        showNotif(card.name+' accepted your request!','✅');
        renderScreens();
      } else if(msg.type==='connect_reject'){
        // Remove from sent
        if(S.sentRequests){
          var rIdx=S.sentRequests.findIndex(function(p){return p.name===msg.name;});
          if(rIdx>-1) S.sentRequests.splice(rIdx,1);
        }
        persistSave();
        showNotif((msg.name||'Request')+' declined your connection','!');
        renderScreens();
      } else if(msg.type==='card'){
        // Legacy: only refresh card if already a partner
        if((S.partners||[]).findIndex(function(p){return p.name===msg.data.name;})>-1){
          importFromPeer(conn.peer,msg.data);
        }
      } else if(msg.type==='chat'){
        if(!peerChatHistory[conn.peer]) peerChatHistory[conn.peer]=[];
        peerChatHistory[conn.peer].push({from:msg.name,text:msg.text,ts:Date.now(),mine:false});
        // Auto-expire after 24h
        peerChatHistory[conn.peer]=peerChatHistory[conn.peer].filter(function(m){return Date.now()-m.ts<86400000;});
        showNotif(msg.name+': '+msg.text.slice(0,40),'OK');
        if(currentScreen==='leaderboard') renderScreens();
      } else if(msg.type==='request_public_stats'){
        // Send only the limited public card (no logs)
        conn.send(JSON.stringify({type:'public_stats',data:getMyCard()}));
      } else if(msg.type==='public_stats'){
        // Refresh that partner's public card
        var pc=msg.data||{};
        pc.peerId=conn.peer;
        if(!S.partners) S.partners=[];
        var pi=S.partners.findIndex(function(p){return p.name===pc.name;});
        if(pi>-1){ S.partners[pi]=pc; persistSave(); renderScreens(); }
      } else if(msg.type==='request_detail'){
        // Only honour detail requests from accepted partners
        var fromName=(msg.from||'');
        var allowed=(S.partners||[]).some(function(p){return p.peerId===conn.peer || p.name===fromName;});
        if(allowed) conn.send(JSON.stringify({type:'detail',data:getDetailedCard()}));
        else conn.send(JSON.stringify({type:'public_stats',data:getMyCard()}));
      }
    }catch(e){}
  });
  conn.on('close',function(){
    delete peerConnections[conn.peer];
    renderScreens();
  });
}
function connectToPeer(peerId){
  if(!peer){showNotif('Start P2P first','!');return;}
  if(!peerId||peerId.trim().length<4){showNotif('Enter a valid Peer ID','!');return;}
  var pid=peerId.trim();
  // Already a partner? Just open a chat channel.
  var alreadyPartner=(S.partners||[]).some(function(p){return p.peerId===pid;});
  var conn=peer.connect(pid,{reliable:true});
  setupConn(conn);
  if(!alreadyPartner){
    // Send a proper connect request the receiver must accept.
    conn.on('open',function(){
      try{ conn.send(JSON.stringify({type:'connect_request',data:getMyCard()})); }catch(e){}
      // Mirror it locally as a sent request
      if(!S.sentRequests) S.sentRequests=[];
      var card=getMyCard();
      // We don't know the receiver's name yet — use the peer ID as placeholder
      var displayName=pid.split('-').slice(1).join('-')||pid;
      if(S.sentRequests.findIndex(function(p){return p.peerId===pid;})===-1){
        S.sentRequests.push({name:displayName,level:'?',xp:0,peerId:pid,ts:Date.now()});
      }
      persistSave();
      showNotif('Connection request sent to '+displayName,'📨');
      renderScreens();
    });
  }
}
function importFromPeer(peerId,card){
  if(!S.partners) S.partners=[];
  card.peerId=peerId;
  var idx=S.partners.findIndex(function(p){return p.peerId===peerId||p.name===card.name;});
  if(idx>-1) S.partners[idx]=card;
  else S.partners.push(card);
  persistSave();renderScreens();
}
function sendChat(peerId,text){
  var conn=peerConnections[peerId];
  if(!conn||!conn.open){showNotif('Not connected to this partner','!');return;}
  if(!peerChatHistory[peerId]) peerChatHistory[peerId]=[];
  peerChatHistory[peerId].push({from:'You',text:text,ts:Date.now(),mine:true});
  // Expire 24h
  peerChatHistory[peerId]=peerChatHistory[peerId].filter(function(m){return Date.now()-m.ts<86400000;});
  conn.send(JSON.stringify({type:'chat',name:S.player.name||'Warrior',text:text}));
  renderScreens();
}
function requestDetail(peerId){
  var conn=peerConnections[peerId];
  if(conn&&conn.open) conn.send(JSON.stringify({type:'request_detail'}));

// IMPORT DATA - works on both browser and Android
// ════════════════════════════════════════════════════
function importData(){
  // Try to use a persistent hidden input (more reliable on iOS/browser)
  var existing=document.getElementById('zenfit-import-inp');
  if(existing){existing.click();return;}
  // Create fresh input each time as fallback
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json,application/json,text/plain';
  inp.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px';
  inp.id='zenfit-import-inp';
  inp.onchange=function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var text=ev.target.result;
        var imported=JSON.parse(text);
        if(!imported.player||!imported.nutrition){
          showNotif('Invalid backup file','!');
          return;
        }
        // Deep merge - preserve new keys, restore old data
        S=Object.assign({},S,imported);
        persistSave();
        renderScreens();
        showNotif('Data restored! Welcome back, '+imported.player.name+'!','OK');
      }catch(err){
        showNotif('Import failed: '+err.message,'!');
      }
      // Reset input so same file can be imported again
      inp.value='';
    };
    reader.onerror=function(){showNotif('Could not read file','!');};
    reader.readAsText(file);
  };
  document.body.appendChild(inp);
  inp.click();
}
